 "site": "현장선착순42", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": ".............", "author": "캠퍼810800", "date": 1750067746109, "zone": "선착순존", "site": "현장선착순44", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "캠핑장은 좋은데 부대시설이 아쉬웠어요.\r\n화장실 바닥 청소해주시면 좋을 것 같아요\r\n따뜻한 물도 너무 안나와서 냉수샤워 할 수 밖에 없었어요", "author": "캠퍼226858", "date": 1749424781533, "zone": "선착순존", "site": "현장선착순29", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "장점\r\nㅡ아이들 방방이있고, 바로옆 계곡이있음\r\n\r\n단점\r\nㅡ사이트수에 비해 턱없이 부족한 화장실칸. 2칸에 뒤에 1칸 더있음\r\nㅡ온수는..... 진짜 거의 안나온다고보면됨. 2박하면서 금요일4시경, 일요일 아침9시경 그리고나머지는 찬물로설거지하고 애씻기고 샤워해야했음\r\nㅡ매너타임이 안지켜져서 밤늦게 애들떠들고, 새벽일찍 소리지름서 뛰어다님\r\nㅡ바로옆근처공사장에서 아침6시정도부터 공사소리 다들림\r\nㅡ관리가안됨.,.... 샤워실화장실 거미줄도많코, 여자화장실 휴지통은 항상풀. 각칸마다 휴지가 없고 입구에 돌돌이하나가 끝\r\nㅡ사이트 크기작음. 사이트간격도좁아서 옆텐트소리다들리고, 공간도 넘 좁음\r\nㅡ화장실뒤편으로 계곡가는길 귀곡산장같은 폐건물이 그대로방치되어있음\r\nㅡ방방에 6명넘으면 할아버지사장님이 애들에게 소리지르심.. 안나오면 잠궈버릴거라고... 그후 무서워서 애들이 가질못함\r\n\r\n연휴캠이다보니 풀예약인건알겠지만, 그것에 비하면 관리도안되고 온수량도 말해뭐해고, 그냥 집에 있을걸. 키카나 가서 맘껏 뛰놀게할걸 싶었음", "author": "캠퍼678724", "date": 1749384932132, "zone": "선착순존", "site": "현장선착순41", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000013405_f9e2ea07c2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000013405_f9e2ea07c2.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000013399_4049b04c34.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000013399_4049b04c34.jpg"}]}, {"source": "camfit", "text": "화장실과 개수대가 많이 부족해보여요.\r\n사이트 수에 비해 너무 열악했어요.\r\n아 뜨거운물이 아무때나 나오는게 아니라...\r\n진짜 꼭두새벽에 가서 씻었어요 ㅜㅜ \r\n애들있는 가족캠은 괜찮은데 쉬고싶어서 캠핑 하시는분들은\r\n비추천입니다!", "author": "유저 비공개", "date": 1749375965997, "zone": "선착순존", "site": "현장선착순02", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000060516_5e29722f4a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000060516_5e29722f4a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000060517_5a2f0daecf.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000060517_5a2f0daecf.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000060511_1b9a227a1a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000060511_1b9a227a1a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000060515_72a0d275b9.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000060515_72a0d275b9.jpg"}]}, {"source": "camfit", "text": "커플이라면 절대가지마세요 2박동안 너무집에가고싶었습니다. 캠핑 7년을했지만 최악의캠핑장입니다.\r\n일단 95%가 가족단위 캠핑장이구요 말그대로 떼캠 난민캠 입니다. 그냥 말그대로 바로옆에 사이트 붙어있어서 말소리발소리 다들립니다. 프라이버시는 기대도하지마세요 심지어 금,토,일 어딘지모르겠는데 앞에서 공사겁나합니다. 포크레인소리덕에 힐링은 개나줬구요 이상한 먼지같은것도 겁나날아옵니다. 저희사이트가 안좋은건지 뷰는 요양원뷰에 펜션뷰라서 앞에서 술마시고 노는 어르신들 보입니다. 그리고 앞에 펜션에서 아침부터 저녁10시까지 노래틉니다. 제일 최악인건 모든사이트 통틀어서 가족단위라치면 대충 인원100명은 넘을것같은데 남자화장실 변기 2개입니다. 심지어 하나씩있고 하나는  좀 올라가야해요 여자화장실도 2칸입니다. 샤워실은 더럽구요, 보니깐 하루에한번 저녁에만  청소하십니다. 그리고 오후에 샤워하려고갔는데 온수안나오고 거의 계곡물에서 씻는정도로 냉수였습니다. 제일최악은 사이트청소도 안하는것같습니다. 개미들이 겁나많습니다. 그냥 같이 살아야해요.\r\n그냥 가지말고 집에서 쉬세요.", "author": "캠퍼20135", "date": 1749363769384, "zone": "선착순존", "site": "현장선착순34", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000052167_6e1eb70984.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000052167_6e1eb70984.jpg"}]}, {"source": "camfit", "text": "좋은 자리에서 즐겁게 2박했어요. \r\n주변에 카페도 많고 마장호수도 산책하기 좋아요^^", "author": "캠퍼308825", "date": 1746534645259, "zone": "선착순존", "site": "현장선착순40", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000037768_61a8653e81.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000037768_61a8653e81.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000037785_0f4aee051e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000037785_0f4aee051e.jpg"}]}, {"source": "camfit", "text": "캠핑장 사이트가 엄청많은데 여자화장실이 두개라는 리뷰가 많고 분위기 별로라던데 생각보다 2박3일동안 줄은 한번 잠깐 서봤고 나름 깔끔해서 걱정한것보다 좋았어여~\r\n옆에 마장호수로 나들이도 갈수있다는 장점~", "author": "유저 비공개", "date": 1746525155913, "zone": "선착순존", "site": "현장선착순14", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000033856_3c86f00e6d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000033856_3c86f00e6d.jpg"}]}, {"source": "camfit", "text": "새로산 타츠 피칭해보고 싶어서 달려간ㅎㅎ\r\n낮엔 폭염주의보 밤엔 폭우주의보 ㅋㅋㅋ\r\n하지만 전세캠이었네요~ 파란만장 🤣", "author": "캠퍼526455", "date": 1746514027357, "zone": "선착순존", "site": "현장선착순01", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006475_0af19d8e87.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006475_0af19d8e87.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006478_d9caf0ee87.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006478_d9caf0ee87.jpg"}]}, {"source": "camfit", "text": "생각보다 저녁에 조용해서 좋았고 샤워실, 화장실 적당히 괜찮았네요. 방방이 있어서 애들이 재미있게 잘 놀다왔습니다^^", "author": "유저 비공개", "date": 1746416130200, "zone": "선착순존", "site": "현장선착순42", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029874_ec5f97a31a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029874_ec5f97a31a.jpg"}]}, {"source": "camfit", "text": "선착순이라 부지런하면 좋은자리 선점가능한곳, 비장의카드", "author": "유저 비공개", "date": 1732864787218, "zone": "선착순존", "site": "현장선착순19", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비예보가 있어서 예약자가 없더라고요~예약만하고 사이트는 선착순지정이라서..  덕분에 좋은자리에서 캠했어요~", "author": "캠퍼718352", "date": 1731827461190, "zone": "선착순존", "site": "현장선착순02", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000007865_368c99324f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000007865_368c99324f.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000007875_6aa05fe6cd.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000007875_6aa05fe6cd.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000007877_dc9ccc40c5.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000007877_dc9ccc40c5.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000007876_586aba3fe2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000007876_586aba3fe2.jpg"}]}, {"source": "camfit", "text": "자연은 너무 좋은데 진짜 관리가 안돼요\r\n매너타임 전혀 아무도 터치 안해서 떠드는 사람반 화난사람 반입니다\r\n특히 저번주말 6세 초록상하세트 입은 남아 11시 50분부터 계속 울고 소리치는데 그 부모 제재조차 안하더라구요? 공공장소 늦은시간 애가 민폐끼치면 잘못된거라 가르치는 것이 부모입니다 이 글 보시면 반성하세요 그옆집도 완전 싫은 눈치던데 계속 옆텐트 가서 술먹던 어머님 반성하세요 진짜 눈쌀 찌푸려집니다", "author": "캠퍼559044", "date": 1730724607748, "zone": "선착순존", "site": "현장선착순12", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "2박3일 잘 쉬다갑니다~큰 나무들 그늘도 좋고, 사장님들도 친절하시고, 화장실 샤워실 개수대 다 깨끗해서 좀더라구요 방방이도 있어서 아이들도 즐겁게 보내고갑니다☺️ 옆집을 잘만나야한다는걸 이번에 처음느꼈어요ㅠ새벽3시넘어서까지 블루투스노래틀고, 얘기소리가 계속들리는데😭 그거빼곤 날씨도 너무좋고 행복하게보내다갑니다~", "author": "백긍정백남정🌟", "date": 1730282157345, "zone": "선착순존", "site": "현장선착순02", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000033493_3ae2f3bd5e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000033493_3ae2f3bd5e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000033497_025a305d57.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000033497_025a305d57.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000033476_ef201bd0f7.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000033476_ef201bd0f7.jpg"}]}, {"source": "camfit", "text": "가족캠핑을 주로 하는 캠퍼로서 세번째 방문하였고, 이번 캠핑 후로 이 캠핑장은 절대 다시는 재방문은 하지 않을것입니다\r\n이곳은 캠핑장이라기보다는 유원지에 가깝습니다\r\n인원제한을 두는 일반캠핑장과 달리 제한이 없는 것으로 보입니다 \r\n일부 개념없는 4~50대 아재 아줌마들께서 사이트 내에서 흡연도 하시고 저녁시간임에도 술에취해 고성방가와 욕설과 함께 큰소리로 싸워도 캠핑장에서는 강경한 제지도 없으시고 멀찌감치 지켜보면서 직접적으로 조치를 취하지 않는 모습에서 여기는 다시 오면 안되겠다고 굳게 결심했네요 \r\n이곳은 캠핑에서의 휴식이라기보다는 2가족 이상에 사람들이 오랜만에 모여 음주가무와 밤늦게까지 웃고 떠들 수 있는 장소가 더 적합할거 같습니다 \r\n시설 부분 차치하고 저와 같이 아이가 있는 캠퍼분들께 정말 추천드리고 싶지 않습니다 진심입니다", "author": "캠퍼95436", "date": 1730027325659, "zone": "선착순존", "site": "현장선착순38", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "마음 편하게 잘 놀다 갑니다 ^^ 일요일날 당일로 이용했는데 새벽 같이 다들 돌아간 건지 한산해서 좋았어요~ 화장실은 오래되긴 했지만 괜찮았고 .. 나무도 크고 조용했습다. 딸이랑 배드민턴 실컷 치고 왔어요", "author": "캠퍼693174", "date": 1728811152324, "zone": "선착순존", "site": "현장선착순07", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "너무 편하게 지내다가 오고 연세지긋하신 남자 사장님은 친절하시며 안내 잘 해주셨어요^*^ \r\n시설은 오래 되었지만 사장님이 자주 라운딩 돌면서 이것저것 잘 정리정돈 해주셔서 불편함이 전혀 없었습니다. \r\n다음에 또 방문 할 의향 100%입니다.", "author": "캠퍼628832", "date": 1728209116655, "zone": "선착순존", "site": "현장선착순08", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7978_85ab72dad8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7978_85ab72dad8.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7977_abf69e35c1.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7977_abf69e35c1.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7972_ea6d067e2c.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7972_ea6d067e2c.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7983_17d79a17cf.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7983_17d79a17cf.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7979_696fd446f8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7979_696fd446f8.jpeg"}]}, {"source": "camfit", "text": "캠핑장 방문객입니다\r\n캠핑장 사이트내 주차한차 바로 옆에서 어른아이  공차기 놀이하고 있는데 밥먹다가 신경쓰여서 밥도 재대로 못먹었습니다 그리고 재활용버리는곳 근처에서 애들둘이 불꽃스틱 들고다니고 마지막에는 그냥 매점이랑 자기 사이트 계곡 사이트 딱 중간에 분수불꽃놀이 하고 있어도 아무런 제제는 신경도 안쓰는거같네요\r\n캠핑 운영정책에 왜 적어논지도 모르겟네요\r\n불편한 캠핑 하다갑니다", "author": "미니미웨이브", "date": 1728185987531, "zone": "선착순존", "site": "현장선착순03", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_2106_8e350691c6.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_2106_8e350691c6.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_2111_110de1190c.png", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_2111_110de1190c.png"}]}, {"source": "camfit", "text": "조용하고 시설은 조금 낙후됐지만 화장실 벌레 없이 깨끗합니다.\r\n샤워실도 온수 잘 나오고요.\r\n사이트 간격은 좁은편이네요. 가족단위가 많습니다.\r\n잘 쉬고 갑니다!", "author": "캠퍼363740", "date": 1727613396665, "zone": "선착순존", "site": "현장선착순06", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0276_7888bc58d8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0276_7888bc58d8.jpeg"}]}, {"source": "camfit", "text": "(장점) \r\n1. 조용하고 고즈넉한 캠핑장. \r\n2. 쏠캠족이 있어서 조용함\r\n3. 낮에는.산새소리.밤에는.풀벌레소리 좋음\r\n4. 넓은 사이트,.주변 붐비지.않아 주말에도 이용하시 좋음\r\n5. 입실시간 13시,  퇴실 12시\r\n(딘점)\r\n1. 맞은편 캠장소리가 들림\r\n2. 가족단위 캠손님의 고성이 거슬림\r\n3. 화장실 좌변기 부족\r\n\r\n전반적으로 무난하고 1박쉬기 좋은 캠장", "author": "도시탈출", "date": 1725782374710, "zone": "선착순존", "site": "현장선착순07", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010664_f5f44932d2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010664_f5f44932d2.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010666_3215951963.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010666_3215951963.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010674_8f04c0d52d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010674_8f04c0d52d.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010676_aa8887067f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010676_aa8887067f.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010690_8c741254c2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/1000010690_8c741254c2.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010709_057361afbf.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010709_057361afbf.jpg"}]}, {"source": "camfit", "text": "좋습니다 꽉차면 불편하겟지만 사람들이 다 널찍하게 떨어지니 좋앗습니다", "author": "캠퍼594360", "date": 1719332253236, "zone": "선착순존", "site": "현장선착순08", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "여긴 너무너무 좋아요~~~~~", "author": "캠퍼494082", "date": 1718354498891, "zone": "선착순존", "site": "현장선착순16", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "나무그늘이 하늘을 가릴만큼 좋은 명당에서\r\n힐링하고 갑니다.\r\n다시 올 것 같아요^^\r\n계곡도 참 좋았어요~~~", "author": "주말캠퍼", "date": 1717482256819, "zone": "선착순존", "site": "현장선착순06", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000002716_cdddbef038.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000002716_cdddbef038.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000002720_73321837ae.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000002720_73321837ae.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000002724_22d971261f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000002724_22d971261f.jpg"}]}, {"source": "camfit", "text": "자리가 다 차지않아서 주말인데도\r\n한적하고 조용하게 잘 다녀왔습니다\r\n큰나무 많아서 그늘도 많고 \r\n비교적 깨끗했어요\r\n건너편 자리와도 간격이 넓어서\r\n좋았구요~\r\n선착순은 어떨까 했는데\r\n좋은 자리 선택할수 있는게\r\n장점도 있네요\r\n다음에 재방문 의사 있습니다", "author": "유저 비공개", "date": 1716163506354, "zone": "선착순존", "site": "현장선착순10", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018902_c56561fb37.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018902_c56561fb37.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018900_767f9831b8.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018900_767f9831b8.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018901_66e0969088.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018901_66e0969088.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018888_acbf891987.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018888_acbf891987.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018899_ac174095c7.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018899_ac174095c7.heic"}]}, {"source": "camfit", "text": "너무좋아요.!2주째 가는중", "author": "캠퍼494082", "date": 1716156748083, "zone": "선착순존", "site": "현장선착순22", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "인생 캠핑장입니다.", "author": "캠퍼494082", "date": 1716156665309, "zone": "선착순존", "site": "현장선착순05", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "갑자기 예약하고 가게 되었는데 아무도 없었고 저희 일행만 2팀 예약하고 갔어요. 그렇게 다 같이 모여 신나게 놀다가 비 오기전에 출수 해서 다행이었어요.\r\n\r\n49개 사이트가 있는데 화장실은 앞 건물에 2개, 뒷 건물에 1개 있어요. 사이트 대비 화장실 개수가 적긴해요. 화장실 깔끔하고 샤워실도 나쁘지 않았어요. 화장실에서 손 씻다 물이 갑자기 콸콸 나와 놀랬어요. 샤워실은 이용은 하지 않았고 사진만 찍었네요. \r\n\r\n매점은 사장님이 거주하시는 집 겸용인가봐요. 뭔가 용돈 정도 벌료고 하시는 듯 한 느낌? 우리가 왔는지 가는지 뭐하는지 관심을 1도 안 주시더라구요. 너무 관심을 안 가져주시니 관심 좀 가져주세요. 하게 되는 것 같아요. \r\n\r\n개울이 있어 올챙이도 잡고 했는데 날파리가 많았어요. 장작이 아주 잘타요. 저희 일행만 전세캠했더니 너무 좋네요. 한참을 놀다가 잤어요. \r\n\r\n아침에 밥 먹고 커피 마시고 있는데 고라니가 캠핑장 안으로 뛰어들어왔다가 나갔어요. 다들 보고 놀래면서 추억 쌓아가요! 파쇄석이고 나무 그들도 많아요.", "author": "파워엄마레인저", "date": 1715766635513, "zone": "선착순존", "site": "현장선착순01", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0098_995b188970.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0098_995b188970.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0101_299b45f21b.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0101_299b45f21b.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0100_80eb31dbea.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0100_80eb31dbea.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0099_1a3f0d06d9.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0099_1a3f0d06d9.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0103_a165d1f333.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0103_a165d1f333.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0108_3c3f2271be.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0108_3c3f2271be.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0117_8f045a9bf4.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0117_8f045a9bf4.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0133_ee5cd533fc.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0133_ee5cd533fc.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0130_6552c64512.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0130_6552c64512.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0131_e6e2e3fbb9.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0131_e6e2e3fbb9.jpeg"}]}, {"source": "camfit", "text": "구청소상태는 괜찮았구요 좁은닭장에서 아침에 닭들이 너무 싸워서 시끄럽더라구요 ㅋㅋ\r\n첫날은 축구 경기가 있었는데도 매너타임이 잘 지켜졌는데 둘쨋날은 전혀 안지켜지더라구요.", "author": "유저 비공개", "date": 1696847979669, "zone": "선착순존", "site": "현장선착순15", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "물 엄청 따뜻하고\r\n매너타임 전체적으로 잘 지키네요\r\n휴지 떨어지면 바로 갈아주세요\r\n조용히 잘 놀다 갑니다", "author": "캠퍼390565", "date": 1696738009142, "zone": "선착순존", "site": "현장선착순07", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20231007_182321_02623fbd6c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20231007_182321_02623fbd6c.jpg"}]}, {"source": "camfit", "text": "잘 다녀왔습니다~ 급히 예약해서 남은 곳중에서 골라 조금 걱정했는데 생각보다 괜찮았어요~\r\n화장실 칸이 적긴 한데 깨끗했어요\r\n소금 안가져가서 사러갔는데 맛소금밖에 없다고 하시면서 굵은소금을 나눠주셨어요 ㅜㅜ 사장님 감사합니다\r\n주변에 마장호수도 가깝고 애들 데리고 출렁다리도 잠깐 다녀왔어요 산책하기에도 너무 좋았어요\r\n사이트 간격은 좁긴 좁아요.. 옆텐트에서 코고는 소리에 잠을 자기가 조금 힘이 들었어요.. 그래도 즐겁게 잘 다녀왔습니다", "author": "캠퍼450913", "date": 1696737948600, "zone": "선착순존", "site": "현장선착순14", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "다신 가고싶지 않네요\r\n불친절하시고\r\n화장실 작고\r\n매너타임도 안지켜지고\r\n지금까지 다닌 캠핑장중 최악 ㅠ", "author": "유저 비공개", "date": 1696557337573, "zone": "선착순존", "site": "현장선착순14", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "급히캠핑가려고 경기인천 알아보던중 양주가 가까워 전날저녁예약하고  아침에고고!  샤워실도 깨끗!  화장실도 관리가 잘되있었어요 자유롭게 선착순으로 자리를잡는 캠핑장입니다  다음에 방문또 하고싶네요!  마장호수 출녕다리 한바뀌돌고  피자집에서 피자 스파게리 사들고 갬핑장서 즐거운한때를 보냈습니다~", "author": "캠퍼143683", "date": 1696168558674, "zone": "선착순존", "site": "현장선착순09", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230929_190026_07ee728795.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230929_190026_07ee728795.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230929_190329_4afffccb5d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230929_190329_4afffccb5d.jpg"}]}, {"source": "camfit", "text": "다음에 재방문 할게요", "author": "캠퍼459761", "date": 1695536700747, "zone": "선착순존", "site": "현장선착순10", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "일단 관리를 하는건지 마는건지 전반적으로 지저분합니다. 특히 제가 사용한 사이트는 파쇄석 돌 사이사이에 담배꽁초가 어찌나 많은지 ... 담배꽁초가 많다는 소리는 바닥에 담뱃재도 많다는 소린데 애들 데리고 캠핑가서 너무 짜증나더라구요. 저녁에도 담배들 아무데서나 피우는데 진짜 짜증이 ... 최악입니다 가지마세요 여긴 ... 아 참 ... 화장실도 최악 ... 아 그냥 불쾌 합니다 더럽고", "author": "유저 비공개", "date": 1687689115097, "zone": "선착순존", "site": "현장선착순07", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "앞캠핑장 진짜..매너가1도없었어요\r\n새벽1시넘어서까지 심각하게도 시끄러웠는제\r\n결국 큰소리났는데, 저희 캠핑장 관리자님전혀  신경도 안써주시더라구요. 다시는 안갈듯합니다\r\n자연계곡있는건 좋아요~", "author": "유저 비공개", "date": 1687001914352, "zone": "선착순존", "site": "현장선착순09", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "매너타임과 닭 울음소리가 좀 아쉽긴 했지만\r\n편히 잘 놀다왔습니다~^^", "author": "캠퍼300888", "date": 1686126277976, "zone": "선착순존", "site": "현장선착순07", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "2년전부터 연휴때 꾸준히 이용합니다. 나무가 워낙 잘되어 있고 마장호수.기산저수지둘레길까지 좋아요.", "author": "캠퍼277430", "date": 1685941057382, "zone": "선착순존", "site": "현장선착순08", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "매너타임이 너무안지켜지네요…", "author": "캠퍼382768", "date": 1685861492880, "zone": "선착순존", "site": "현장선착순06", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "나무가 많고 계곡이 있어 아이들도 잼나게 놀고 그리고 사장님도 친절하셔서  넘 즐거운 캠 하고 왔습니다^^", "author": "캠퍼371623", "date": 1684663325744, "zone": "선착순존", "site": "현장선착순02", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "잘쉬었다가 왔습니다. 조용한 캠핑장은 아닙니다.", "author": "탑캠퍼", "date": 1684160120973, "zone": "선착순존", "site": "현장선착순09", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "어떠한 설명도 없이 아무데나 텐트펴라는 사장님, 이용 방법과 주의사항 어떠한 설명도 없었습니다. \r\n새벽 2시가 되어도 술먹고 떠드는 사람들을 제재를 가할 생각이 없어보이더군요.\r\n결국 나가서 뛰쳐나가 옆 사이트를 싸웠습니다.\r\n11시가 넘었어도 차들은 왔다갔다하고 주변에 편션이 많아 굉장히 시끄럽습니다. 이틀 예약했지만 하루 하고 도망나왔습니다. 다신 갈 마음이 없네요", "author": "유저 비공개", "date": 1684124545698, "zone": "선착순존", "site": "현장선착순02", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "딱 한마디로 정리하면 더럽고 불친절해요.\r\n연휴에 예약가능한 근처 캠핑장이 딱 이곳뿐이라 방문했는데 자리가 남아있는건 다 이유가 있더라구요..공짜로 가서 놀라고해도 안갈것같아요...", "author": "난민", "date": 1683464354690, "zone": "선착순존", "site": "현장선착순09", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230505_154207_4410ef338e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230505_154207_4410ef338e.jpg"}]}, {"source": "camfit", "text": "화장실 샤워장 최악\r\n관리 손 놓은 캠장 같아요.", "author": "성로", "date": 1683441259231, "zone": "선착순존", "site": "현장선착순11", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "참고하세요\r\n6M * 8M는 매점 앞만 그런거 같아요\r\n초입  나무 사이는 6M * 4M입니다\r\n\r\nZED  7 2 리빙쉘 텐트 피칭하면 꽉 차서 여유 공간이 없네요", "author": "캠퍼350623", "date": 1683437580353, "zone": "선착순존", "site": "현장선착순11", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "잘 보내고왔어요\r\n화장실은 협소해요. 비가와서 힘들었지만,캠핑자체는 좋았어요", "author": "캠퍼351236", "date": 1683360136304, "zone": "선착순존", "site": "현장선착순17", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230504_184917_26f0c0261b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230504_184917_26f0c0261b.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230504_184928_d6667cb529.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230504_184928_d6667cb529.jpg"}]}, {"source": "camfit", "text": "화장실이 너무 관리가안되네요..\r\n서울근교인것빼곤 딱히 재방문의사는 없습니다", "author": "맨발캠", "date": 1682853333841, "zone": "선착순존", "site": "현장선착순08", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "눈내리는 크리스마스를 즐겼어요~화장실도 깨끗하고 좋았어용~^^", "author": "캠퍼289362", "date": 1671942045223, "zone": "선착순존", "site": "현장선착순03", "season": "winter", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "조용하게 할로윈 캠을 잘 즐기고 왔어요^^", "author": "하늘연달보름열매", "date": 1669020351091, "zone": "통나무 쉼터 (민박형)", "site": "통나무쉼터03", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "다시는 안가요! 더럽고불친절", "author": "유저 비공개", "date": 1668922563537, "zone": "선착순존", "site": "현장선착순03", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "텐트치는 과정에서 똥이있었습니다.\r\n애견금지 캠핑장인걸로 알고있는데,애견인건지,사람인건지..당황스러웠습니다.발견못하고 텐트쳤으면 기분이 안좋을뻔했네요.", "author": "유저 비공개", "date": 1668650092815, "zone": "선착순존", "site": "현장선착순01", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "역대급 최악의 캠핑장. 화장실 변기뚜껑 깨져있고 화장실 문 안닫힘 휴지디스펜서 망가진거 안고치고 휴지통 휴지넘쳐도 안비움 변기 2개 있는데 좁고 관리안되서 드럽고 지저분. 퇴실은 12시이나 11시에 그냥 전기 끊어버림. 전기 왜 쓰냐 정리하고 빨리 가라고함 불친절 끝판왕", "author": "캠퍼237894", "date": 1667792418666, "zone": "선착순존", "site": "현장선착순05", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "오전 11시30분에 전기 끊습니다", "author": "휘뤼뤽뿅", "date": 1667727853480, "zone": "선착순존", "site": "현장선착순15", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "금요일 늦게 도착해서 피칭했는데 따로 가로등이 없습니다. 아무리 늦어도 오후 5시까지는 해야 좋을듯 합니다.\r\n편의시설 탁히 나쁘지 않았고 전자렌지는 매점겸관리실에 있습니다.\r\n싸이트간격이 굉장히 붙어있고\r\n두집싸이드 옆쪽이라 많이 힘들었습니다. \r\n아이들 노는 소리는 괜찮은데 어른들 음주소음은 힘드네요. 특히 여성분의 괴성 가까운 웃음소리에 힐링은 저 산 넘어갑니다.\r\n매너타임아니라도 싸이트가 가까우면 배려 좀 해줬더라면 하는 맘이 간절한 캠핑이였습니다.\r\n캠핑 뷰는 없습니다. \r\n세척실이 밀려 왠만큼 빠진 후에 철수완료 되니 오후2시가 됐는데 2만원 추가 받으시니 철수타임은 꼭 지켜주시는 것이 좋으실듯 합니다.\r\n나름 장점이라면 수도권에서 가까운거  말고 여러모로 좋은 추억은 저에겐 이번 캠핑엔 없었습니다.", "author": "루프탑좋아", "date": 1667712556291, "zone": "선착순존", "site": "현장선착순02", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_20221105_160441_168_28fdbc468b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_20221105_160441_168_28fdbc468b.jpg"}]}, {"source": "camfit", "text": "조용한 캠핑을 원하신다면 비추~ ㅜㅜ", "author": "유저 비공개", "date": 1667711865815, "zone": "선착순존", "site": "현장선착순12", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "전반적으로 괜찮았는데.. 이튿날  전기를 너무 일찍 끊으신건 좀 … 저의 텐트가 올블랙이라 이너텐트안에서 정리하는데 너무 어두웠어요 ~~", "author": "sunny kim", "date": 1667189582265, "zone": "선착순존", "site": "현장선착순19", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "사이트간격이 너무 좁아요. 다닥다닥 붙어있어요\r\n옆집사람이 저희 텐트들어와서 얘기하는줄 알았네요.ㅜ\r\n매너타임 잘지켜지고, 화장실 나름 깨끗해요.", "author": "유저 비공개", "date": 1667185074662, "zone": "선착순존", "site": "현장선착순08", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "가을이라 단풍이 이쁘네요. 장점보다 단점만 이야기하면 화장실이 너무 작다. 줄서는건 기본. 이용료를  현금으로 지불하는데 현금영수증 안해준다. 퇴실시간 되면 바로 전기 차단한다. 사이트가 크지는 않다.", "author": "캠퍼11134", "date": 1667113146715, "zone": "선착순존", "site": "현장선착순05", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}], "other_reviews": [{"source": "camfit", "text": "아르보리아는 항상 좋은 추억을 만들어 준 곳이에요!", "rating": null, "author": "이애기", "date": ""}, {"source": "camfit", "text": "사장님이 친절하시고. 설명이 자세하셔서 편하게 잘놀다갑니다.\r\n충주로 다시 오게된다면 꼭 다시 여기로오고싶네요.", "rating": null, "author": "캠퍼660252", "date": ""}, {"source": "camfit", "text": "반달곰숲아이들이 놀거리많고 동물도보고 좋아요 체험하는것도 많고 굿", "rating": null, "author": "캠퍼177857", "date": ""}, {"source": "camfit", "text": "시설 깨끗하고 아이 놀기 좋습니다\r\n즐겨찾는 캠핑장 입니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "리버뷰가 끝내줍니다. 낚시도 하시던데 다음에 도전해보겠습니다", "rating": null, "author": "캠퍼456487", "date": ""}, {"source": "camfit", "text": "작년 한글날 캠핑~\r\n만휴림 싸이트 아주 넓고 좋았습니다\r\n처음이었어요 이렇게 여유롭게 즐긴 캠핑이.. \r\n중딩도 초딩도 다 만족하는 수영장 일단 너무 좋구요,,\r\n뷰~캬~캠은 편의시설가까운게 최고라여기며 뷰는 늘 뒷전이었는데 와우~이런맛이군요..뻥뚫린 시야에 초록초록과 맑은 하늘..너무 너무 행복했습니다\r\n올 여름휴가는 여기!! 에용~~^^", "rating": null, "author": "캠퍼78663", "date": ""}, {"source": "camfit", "text": "진짜 너무 좋아요 !!\r\n매번 가는 캠핑장 입니다 강추 시설 너무 깨끗하고 너무 좋아요", "rating": null, "author": "캠퍼703930", "date": ""}, {"source": "camfit", "text": "모든게 완벽한 캠핑장!!! 개별화장실은 너무 깨끗하고\r\n사이트도 엄청넓음\r\n캠핑장에있는 강아지들도 사람좋아하고 강아지들이 뛰어놀수있는\r\n공간도있어 좋음\r\n새벽에 닭이 우는데 ㅋㅋㅋㅋ 저희가족은 그냥 그려려니해서 \r\n귀마개주시는데 안해도 잘잤음\r\n담에 또 가고싶은 캠핑장!!!", "rating": null, "author": "윤빵이", "date": ""}, {"source": "camfit", "text": "명당자리에 갔던 캠핑장중 최고였어요~~", "rating": null, "author": "캠퍼520299", "date": ""}, {"source": "camfit", "text": "시설 좋고 조용한 캠핑장이었습니다. 방문의사100%", "rating": null, "author": "방가루", "date": ""}, {"source": "camfit", "text": "생각보다 아담한 캠핑장이였어요~\r\n계단형식에 옆사이트에 방해없어 좋았구요~\r\n화장실이나 개수대도 가까웠어요~\r\n지붕(?)아래에서랑 데크위에서는 화롯대사용불가하니 참고해주세요~\r\n매점도 무인으로 운영되고 있는데 카드는 안되고 입금만 가능해요~~~\r\n날씨도 좋았고  근처에 갈만한 리스트도 알려주셔서 둘째날은 수타사랑 농촌체험마을까지 가서 구경갔어요\r\n또 가고싶어서 5월달까지 예약해버렸네요", "rating": null, "author": "키다리레몬", "date": ""}, {"source": "camfit", "text": "최고였습니다. 바닷가에 채집. 바다뷰. 날씨", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "처음 다녀왔는데 좋았습니다. \r\n아이들 놀거리가 많아요", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "풍경이 정말 멋져요.\r\n화장실 개수대 모두 깨끗하고 온수도 엄청 잘 나와요.\r\n샤워실도 탈의하는 공간은 함께 쓰지만 샤워 부스가 나눠져 있어서 좋았어요.\r\n걸어서 갈만한 거리에 카페도 있고 작은 마트도 있어서 편리했어요.", "rating": null, "author": "캠퍼90538", "date": ""}, {"source": "camfit", "text": "매너타임 없음 밤까지 중국인들 기타치고 소리치고 난리남 난생처음 경험함 ㅋㅋㅋㅋㅋ", "rating": null, "author": "캠퍼692023", "date": ""}, {"source": "camfit", "text": "너무 좋아하는 캠핑장입니다 머물수록울산바위의 기를 받는 느낌~~^^ 눈호강하며 즐거운캠핑하고 왔어요", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "예약하기 힘든 이유가 다 있는법이죠 잘 쉬었다 갑ㄴㄱ다", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "조용한 분위기 즐길수있는 캠핑장이예요\r\n매너시간도 잘지키고 시설도 깔끔해요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "너무 좋았어요  \r\n화장실깨끗하고 사이트넓고 바로앞 바다라 전망도 좋아았어요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "올해 첫 캠 어디로 가지 ~ 하다가 캠프더쉼 또 방문 했어요 ㅎ ㅎ 역시 언제와도 관리 정말 잘 되있고 사장님 너무 친절하셔요. 매점도 잘 되어있어서 급히 필요한것들 다 구매 가능하구요. 곧 또 봬요 ㅎ ㅎ", "rating": null, "author": "캠퍼880932", "date": ""}, {"source": "camfit", "text": "좋아요  작년갔던곳인데 이제  올리네요\r\n거의 전세캠 하고  왔네요 사이트 널찍 널찍하고  조용하게  잘 지내다  왔습니다\r\n뒷집 고양이 인지  고양이가  너무너무  귀여웠던  기억이  있어요 ^^", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋은 캠핑장이에요. 바다/갯벌 뷰이고, 바다보다 고도가 높은 층에 있어서 멀리 좋은 뷰를 감상할 수 있었어요.", "rating": null, "author": "캠퍼806200", "date": ""}, {"source": "camfit", "text": "비가와서 아쉬웠지만 ㅠㅠ\r\n화장실 샤워장 깔끔하니 너무 좋았습니다^^", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "뷰는 끝내줍니다\r\n사장님도 친절하시고 개별 화장실이라 편하고 씻고  지냈네요  사진이  별로 없네요  눈으로만  저장 했네요~~^^\r\n다시 가고 싶네요", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋아요 시설도 깨끗하고 캠장님도 너무 친절하시고 저희 강아지 마주치고 이뻐라 해주셔서 감사합다 . 저만 알고 싶은 캠핑장이라 소문 안났으면 좋겠지만 ㅠㅠ그만큼 만족 했습니다.조만간 또 방문할 예정이용 :) 덕분에 좋은 시간 보냈습니다!    감사합니다❤️", "rating": null, "author": "캠퍼941903", "date": ""}, {"source": "camfit", "text": "첫캠핑장소였습니다👍🏻\r\n집에서 가까워 좋았고 깔끔하니 좋았습니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "4번 사이트였는데 사람이 많이 없어서\r\n데크8번으로 옮겼어요.\r\n데크팩도 없었는데 캠장님 빌려주셔서 감사합니당~\r\n사람이 없어서 화장실 혼자쓰고. 개수대도 깔끔하고 \r\n나만 노래 틀어서 시끄럽고 분위기 좋았어요\r\n혼자라 낯가림 이슈로 캠프파이어 못나가고 \r\n알콜섭취로  잠을 잤어요.  훗\r\n담에 또 조용히 솔캠하러 방문하겠습니다~~~~", "rating": null, "author": "캠퍼385453", "date": ""}, {"source": "camfit", "text": "신생캠핑장인만큼 전체적으로 깨끗하고 정비되어있어서\r\n이용하는동안 너무 편하게 잘 쉴 수 있었습니다~\r\n사이트들이 약간의 계단식형태라서 공간분리도 좋고\r\n주변이 산으로 둘러쌓여있어서 계절별로 매력있을 것 같아요\r\n매점에도 등유를 포함해서 다양하게 준비되어 있고\r\n와이파이도 준비되어 있어 산속이라 데이터가 안터질 때\r\n연결해서 잘 사용했네요! 조만간 또 방문하려합니다!", "rating": null, "author": "캠퍼107782", "date": ""}, {"source": "camfit", "text": "아이들위한 이벤트도 있어 즐거웠어요 \r\n캠핑장도 여유롭고 맥주도 👍", "rating": null, "author": "캠퍼370880", "date": ""}, {"source": "camfit", "text": "첫 차박이었는데 너무 좋았어서 바로 다음주 또 예약했습니다.. ㅎ", "rating": null, "author": "캠퍼942114", "date": ""}, {"source": "naver", "text": "경기도 마장호수 근처 겨울캠핑 감성 불멍! 서울근교 노지캠핑장 양주산막골캠핑장 추천", "rating": null, "author": "", "date": "2023-03-04"}, {"source": "naver", "text": "서울근교 계곡캠핑장 양주산막골캠핑장, 마장호수 근처 오토캠핑장에서 감성 불멍", 핑하고 마장호수 산책까지 | 여행이야기 | 추천여행", "rating": null, "author": "", "date": ""}]}, {"kid": "838740161", "name": "양주장흥VIP캠핑장", "rating": 1.7, "review_count": 3, "naver_visitor": 0, "naver_blog": 0, "address": "경기 양주시 장흥면 권율로 102-26", "distance_km": 2.7, "place_url": "http://place.map.kakao.com/838740161", "camfit_count": 47, "cf_reviews": [{"source": "camfit", "text": "깨끗하고 사장님 친절\r\n퇴실날 눈예보있으니 천천히 정리해서 가라고 \r\n배려해 주셔서 맘편히 느긋히 정리했네요\r\n넘 감사했어요~\r\n편의점이나 맛집 가까워서 넘 좋고 \r\n집이랑도 가까워 좋아요\r\n내년? 올해? 어린이시설도 만들예정이라고 하시던데 얼른생기면 좋겠네요^^", "author": "캠퍼은짱", "date": 1774177960483, "zone": "A구역 (텐트)", "site": "09", "season": "winter", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000068908_b2b3c65fb2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000068908_b2b3c65fb2.jpg"}]}, {"source": "camfit", "text": "집가까운곳이라 너무좋았어요.아이들도 가까워서좋았다고 하네요", "author": "깜고넬", "date": 1773640702358, "zone": "A구역 (텐트)", "site": "05", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "---------------------------------", "author": "유저 비공개", "date": 1772001274122, "zone": "B구역(텐트&자동차)", "site": "04타프4*6", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "프라이빗하고 바람 많이 분다고 하여 걱정했는데 뒤에 바로 산이 있구 앞에 건물들이 가로막고 있어 바람이 좀 덜불었네요\r\n사장님도 매우 친절하시고 집이랑 가까워 자주 올것 같습니다.", "author": "유저 비공개", "date": 1771733591708, "zone": "C구역(텐트&자동차)", "site": "C-08", "season": "winter", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000014607_aed175029d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000014607_aed175029d.jpg"}]}, {"source": "camfit", "text": "사장님..친절은 기본이고. 관리동 너무 청결했습니다.\r\n이지캠 두번째 이용입니다. 피칭안하고 편하게 즐기다왔습니다.\r\n농장 텃밭에 쌈 채소 수확해서 고기와 같이 맛있게 먹었습니다. \r\n토끼풀...이 가득한 곳에서  \"5잎\" 을 찾아 키링 만들기 체험도 했답니다.\r\n5잎은 금전,부를 상징한다죠..와웃....대박.\r\n빌라뷰..였지만..도심속 캠핑 답게 주변 자원이 좋아..편의시설 이용하기 좋았습니다.\r\n꼭 재방문 하겠습니다...", "author": "유저 비공개", "date": 1770520760384, "zone": "A구역(이지캠핑)", "site": "A-04", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/Kakao_Talk_20260208_120142569_dc7c218eb1.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_Kakao_Talk_20260208_120142569_dc7c218eb1.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/Kakao_Talk_20260208_120156138_90a0d3d919.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_Kakao_Talk_20260208_120156138_90a0d3d919.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/Kakao_Talk_20260208_121031992_0be902639e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_Kakao_Talk_20260208_121031992_0be902639e.jpg"}]}, {"source": "camfit", "text": "덕분에 화목난로도 이용해보고 편하게 잘쉬다왔습니다\r\n화장실 개수대 다 깨끗했고 \r\n사장님 진짜 엄청 친절하셨어요\r\n매너타임도 잘지켜졌고 가까이 편의시설이 많아서 좋았어요", "author": "캠퍼909602", "date": 1768304460525, "zone": "A구역 (이지캠핑)", "site": "A-02", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000031265_e137d8a641.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000031265_e137d8a641.jpg"}]}, {"source": "camfit", "text": "사장님 너무너무 친절하시고 화장실 샤워실 너무 깨끗해서 좋았습니다", "author": "캠퍼923108", "date": 1765156394152, "zone": "B구역(텐트&자동차)", "site": "13", "season": "winter", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "추석연휴에 급하게 예약해서 갔는데 사장님들 친절하셔서 좋았어요ㅎㅎ 빌라뷰는 처음이라 당황했는데 또 금방 적응되더라구요ㅋㅋㅋ 걸어서 편의점&근처 음식점도 갈 수 있어서 먹다가 부족한 거 추가로 사서 온 거는 좋았어유. 서울이랑 가까운게 가장 큰 장점.. 근데 비 와서 그랬는지 사이트 관리가 조금 덜 되어있는 느낌이라 아쉬웠어요ㅠ 파쇄석도 고르지 않고 흙도 너무 많아서ㅠㅠㅠ 그래도 잘 다녀왔습니다~", "author": "캠퍼801815", "date": 1762935890741, "zone": "B구역(텐트&자동차)", "site": "15", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5894_8b62941281.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5894_8b62941281.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0208_a9c2fd089f.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0208_a9c2fd089f.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0212_c5bc472124.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0212_c5bc472124.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0223_5c5ea7f3e8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0223_5c5ea7f3e8.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0222_0477314c06.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0222_0477314c06.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0224_b093c454f6.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0224_b093c454f6.jpeg"}]}, {"source": "camfit", "text": "관리동 깔끔하고 온수 잘나옵니다.\r\n주변에 볼거리 먹을거리도 많아서 좋았습니다.\r\n사이트 사이에 나무 등으로 사이트 사이를 좀 떨어뜨려놓는다면 더욱 좋을거 같습니다~!\r\n추천해요", "author": "캠퍼589793", "date": 1762684724372, "zone": "B구역(텐트&자동차)", "site": "06", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/5916_08eec796bf.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_5916_08eec796bf.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/5918_570052bf8d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_5918_570052bf8d.jpg"}]}, {"source": "camfit", "text": "집에서 가깝고 시설도 좋고 좋았습니다", "author": "캠퍼728262", "date": 1762678847234, "zone": "B구역(텐트&자동차)", "site": "08", "season": "winter", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "접근성도 좋고 사장님들도 너무 친절해서 좋았습니다\r\n자주 가고싶은 캠핑장이에요!\r\n화장실 샤워장 개수대 너무너무 깨끗하고 좋아요!\r\n걸어서 5분거리에 편의점도 있습니다", "author": "캠퍼918904", "date": 1762672488836, "zone": "A구역 (텐트)", "site": "05", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4654_a3dcb0bf5d.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4654_a3dcb0bf5d.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4657_aa5e36a768.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4657_aa5e36a768.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4667_c9fe947205.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4667_c9fe947205.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4682_b09750c012.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4682_b09750c012.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4688_70a74646a9.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4688_70a74646a9.jpeg"}]}, {"source": "camfit", "text": "도심속에있는 캠핑장인데도 조용했어요~\r\n일요일에 비가 오긴했지만 타프존덕분에 비안맞았습니다\r\n또 놀러가겠습니다", "author": "캠퍼270424", "date": 1761631310146, "zone": "B구역(텐트&자동차)", "site": "07", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009438_b9e938a7b0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009438_b9e938a7b0.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009441_a7ac47627d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009441_a7ac47627d.jpg"}]}, {"source": "camfit", "text": "인생 두번째 캠핑이였습니다 \r\n딸아이와 강아지랑 갔습니다 \r\n애가 집에갈려고를 안해요 ㅎㅎ\r\n공기좋고 분위기좋고 사장님 사모님 너무좋고(언제든지 나타나셔서 해결해주시고 조언해주십니다) \r\nA구역 멀다 그러는데 별로 멀지도 않고 길도 잘되있어서 좋았습니다 !", "author": "캠퍼909748", "date": 1761488580845, "zone": "A구역 (텐트)", "site": "08", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000007022_2b65da5ece.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000007022_2b65da5ece.jpg"}]}, {"source": "camfit", "text": "캠핑장이 너무 깨끗하고 사장님 내외분이 친절하시고 계속 신경쓰이는게 보였어요. 새로 지어서가 아니라 계수대 화장실 샤워실 더러운적이 없었습니다. 할로윈 자체 행사는 안하지만 꾸민 텐드들도 많았고, 저희집에도 많이 들려서 서로 잘 놀았어요. 아이들이 네잎클로버 찾으면 사장님께서 키링도 만들어주십니다~", "author": "모모마미", "date": 1761448330660, "zone": "A구역 (텐트)", "site": "05", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_2014_f180601418.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_2014_f180601418.jpeg"}]}, {"source": "camfit", "text": "조용하고 힐링캠핑하기 딱 좋은 장소인데 빌라뷰가 좀 아쉬웠습니다", "author": "캠퍼868236", "date": 1760916248403, "zone": "B구역(텐트&자동차)", "site": "11타프3*5", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20251003_162930_9498901ad4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20251003_162930_9498901ad4.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20251003_162951_e9b48dcfac.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20251003_162951_e9b48dcfac.jpg"}]}, {"source": "camfit", "text": "첫 캠핑장소 였습니다 \r\n앞에는 물소리들리고 뒤에는 숲이 예쁘게 있고 \r\n넓고 큰 캠핑장이였습니다 \r\n\r\n사장님 사모님이 너무 잘해주셔서 너무 재밌고 행복하게 다녀왔습니다 (에어펌프 랜턴 뭐 없는거 다 빌려주시고 챙겨주심)\r\n나중엔 술사러간다니까 소주도 챙겨주심 ㅋㅋㅋ\r\n\r\n너무너무 좋은 캠핑장입니다", "author": "캠퍼909748", "date": 1760889976205, "zone": "B구역(텐트&자동차)", "site": "08", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "모기없어서 너무좋았어요 \r\n물소리 최고!!\r\n진짜 또가야겠어요", "author": "유저 비공개", "date": 1760852013462, "zone": "B구역(텐트&자동차)", "site": "13", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "두번째 방문입니다\r\n언제나 친절하시고 시설물도 깔끔해서\r\n강아지랑 좋은시간 보내고 왔네요^^", "author": "캠퍼703128", "date": 1760413332573, "zone": "B구역(텐트&자동차)", "site": "13", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000058699_c383f930f4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000058699_c383f930f4.jpg"}]}, {"source": "camfit", "text": "사장님도 친절하시도 사이트도 넓어서 좋아요\r\n재방문의사 있습니다:-)", "author": "캠퍼789301", "date": 1759992714906, "zone": "B구역(텐트&자동차)", "site": "15", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4430_4ce645c074.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4430_4ce645c074.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4432_96733c772e.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4432_96733c772e.jpeg"}]}, {"source": "camfit", "text": "아이들이랑 연휴동안 재밌게 잘 놀고 왔어요:)", "author": "캠퍼893994", "date": 1759900957825, "zone": "A구역 (텐트)", "site": "09", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "텐트와 잠자리 세팅을 안해도되니 편했어요.\r\n즐거운 캠핑이었습니다.", "author": "바람났네", "date": 1759886676810, "zone": "A구역 (이지캠핑)", "site": "A-02", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3197_0d2da57c8b.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3197_0d2da57c8b.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3198_2ec6915daa.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3198_2ec6915daa.jpeg"}]}, {"source": "camfit", "text": "푹 쉬고 경험하고 즐기다 갑니다~^^", "author": "캠퍼634143", "date": 1757896846511, "zone": "A구역(이지캠핑)", "site": "A-04", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000023296_556c6bd4d8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000023296_556c6bd4d8.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000023295_e60b0339c7.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000023295_e60b0339c7.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000023322_a8b11b2736.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000023322_a8b11b2736.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000023522_8aea8f00ae.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000023522_8aea8f00ae.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000023523_b12b9c5936.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000023523_b12b9c5936.jpg"}]}, {"source": "camfit", "text": "차를 못대니 너무 힘들었습니다. 카트로도 한계가 있더군요. 입실 시간엔 카트 대기자도 많고... A구역은 절대 안갈랍니다.", "author": "유저 비공개", "date": 1757037293573, "zone": "A구역 (텐트)", "site": "08", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/4971_23bcc3976e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_4971_23bcc3976e.jpg"}]}, {"source": "camfit", "text": "봄에 갈때는 몰랐는데 앞에 계곡물이 흐르는 천가(?)에서 너무나 잘놀다가요. 화장실,샤워실 다 깨끗하고요 무엇보다 여자사장님 늘 선한인상에  아이들에게 그리고 저희에게 친절히 대해주셔서 늘 감사하답니다^^", "author": "캠퍼209965", "date": 1756686792588, "zone": "B구역(텐트&자동차)", "site": "03", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000054663_c3cd4913e4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000054663_c3cd4913e4.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000054635_c8fe9de14b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000054635_c8fe9de14b.jpg"}]}, {"source": "camfit", "text": "텐트가 너무 낡고 지저분해서 내내 찝찝했습니다 ㅜㅜ\r\n주차구역에서 언덕길 조금 올라가야하니 참고하시구요", "author": "유저 비공개", "date": 1756268795748, "zone": "A구역(이지캠핑)", "site": "A-04", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "두 번째 방문이네요!\r\n\r\n처음엔 집에서 가까워서 가볍게 들러보자 했는데, 첫 방문 때 사장님의 친절함 덕분에 ‘다음에 또 와야지’ 하고 생각했었어요. 그래서 이렇게 다시 찾게 되었네요.\r\n\r\n아이와 함께 오는 가족 손님이 많고, 재방문 고객이 많은 이유가 다 있는 것 같아요. \r\n아이랑 텃밭 체험으로 방울토마토랑 고구마를 직접 캘 수 있어서 아이가 무척 즐거워했답니다. \r\n고기 먹을 땐 사장님네 텃밭에서 먹을만큼 상추, 고추 따서\r\n한끼를 해결했어요!\r\n\r\n다음에도 사장님의 따뜻한 미소가 떠올라 또 방문하게 될 것 같네요. 잘 쉬다가 갑니다🫶", "author": "캠퍼863142", "date": 1755991033507, "zone": "B구역(텐트&자동차)", "site": "10타프4*6", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7367_a9c67cdac8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7367_a9c67cdac8.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7436_898160122f.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7436_898160122f.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7428_f8fda8baf2.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7428_f8fda8baf2.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7405_805b76a570.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7405_805b76a570.jpeg"}]}, {"source": "camfit", "text": "사장님 너무친절하시고\r\n앞에 계곡 까지 있어서 너무 시원하고\r\n즐거운 캠핑했습니다\r\n텃밭에서 기르신 야채도 먹을수 있게 해주셔서\r\n너무 좋았네요^^  또 가고싶은곳 입니다!!!\r\n강추👍", "author": "캠퍼703128", "date": 1755432832254, "zone": "A구역 (텐트)", "site": "14타프3*5", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000053653_70cadf10d2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000053653_70cadf10d2.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000053671_b21ee1ce62.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000053671_b21ee1ce62.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000053643_bb10cc67ef.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000053643_bb10cc67ef.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000053663_acd7d4743a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000053663_acd7d4743a.jpg"}]}, {"source": "camfit", "text": "아이랑 처음 하는 카라반캠핑 정말 즐거웠어요.\r\n계곡도 가깝고 카라반 컨디션도 깨끗해서 묵기 쾌적했어요. 사장님도 정말 친절하시고 기분 좋게 놀다갑니다.\r\n퇴실하고 아이가 빠방이집 가고 싶다고 계속 얘기 하네요.또 예약하고 놀러오겠습니다 :)b", "author": "캠퍼855057", "date": 1754191855257, "zone": "C구역(카라반) 03", "site": "03", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000049219_01bddcee2e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000049219_01bddcee2e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000049128_c51f05d662.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000049128_c51f05d662.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000049158_1fea628222.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000049158_1fea628222.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000049175_7bd6ce9663.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000049175_7bd6ce9663.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000049151_e969f93520.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000049151_e969f93520.jpg"}]}, {"source": "camfit", "text": "도저히 텐트를 못치겠다는 남편의 요청으로  이번에는 이지 캠핑을 선택했습니다. \r\n\r\n네, 그렇습니다. \r\n저희는 초보 캠퍼입니다. ^^ 지금이 온갖 시행착오를 제일 많이 겪을시기거든요. 그래서 여름에도 한번 겪어보자 싶어서 다녀왔습니다. \r\n\r\n1. 더웠다는 후기 / 여름이 더운거 아니겠습니까. 개인풀있는 곳으로 해둬서 애들이 그냥 물에서 못나오게 했네요. 그나마 시원하게 보낼수있도록 쥔장님이 신경 써주셔서 일사병은 면했습니다. (깊은 배려 감사합니다^^)\r\n\r\n2. 주변에 빌라촌과 공존/ 빌라촌이 있다는건 바로 10분이내 편의점이 있다는거거든요. 너무 더우니 얼음 공수가 필수인데 준비를 덜해가서 어찌나 식겁했던지... 편의시설이 CU라서 편의점가격이 널뛸필요도 없구요. \r\n\r\n3.환경도 Best / 텃밭에서 가지,깻잎,상추,옥수수,고구마까지 무료로 따서 먹을수 있어서 구황작물을 추가로 안사갔어요. 우찌나 마음이 가볍던지요.\r\n그리고 바로 앞 계곡이요. 깊지 않아서 이틀내내 가족들이 첨벙거렸어요. 좋아하는 아이때문에 집가자고 꼬시는게 힘들었어유\r\n\r\n4. 화장실~ 개수대까지 깔끔/ 엄청 깨끗해요. 흔히 있는 물때는 커녕 오래된 냄새따윈 없어요. 아주깨끗했습니다. (우리 집 보다 더 깨끗;;)\r\n\r\n또, 중간중간 작고 소중한 수영장이 있어요. 진짜 단비같으ㅏ 수영장 3개가 어떤 워터파크 보다 귀했습니다.  저희는 그중 1개를 독차지 ~~!\r\n\r\n가족들 모두 담에 또 가자고 해서 한번 더 들릴게요.", "author": "캠퍼816131", "date": 1754187269970, "zone": "A구역 (이지캠핑)", "site": "A-02", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036674_15e83e64ba.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036674_15e83e64ba.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036672_4648607ef0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036672_4648607ef0.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036679_6f77061eaf.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036679_6f77061eaf.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036692_83e0f23f2b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036692_83e0f23f2b.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036710_7abea42355.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036710_7abea42355.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036715_12bc50a5ad.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036715_12bc50a5ad.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036717_e3f26d403f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036717_e3f26d403f.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036718_a10585d9db.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036718_a10585d9db.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036720_70f967ef29.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036720_70f967ef29.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036721_3e72dff732.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036721_3e72dff732.jpg"}]}, {"source": "camfit", "text": "깔끔하고 좋았습니다. 가깝고 시설도 괜찮았어요", "author": "캠퍼494196", "date": 1753856418543, "zone": "A구역 (텐트)", "site": "06", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}], "other_reviews": [{"source": "camfit", "text": "아르보리아는 항상 좋은 추억을 만들어 준 곳이에요!", "rating": null, "author": "이애기", "date": ""}, {"source": "camfit", "text": "사장님이 친절하시고. 설명이 자세하셔서 편하게 잘놀다갑니다.\r\n충주로 다시 오게된다면 꼭 다시 여기로오고싶네요.", "rating": null, "author": "캠퍼660252", "date": ""}, {"source": "camfit", "text": "반달곰숲아이들이 놀거리많고 동물도보고 좋아요 체험하는것도 많고 굿", "rating": null, "author": "캠퍼177857", "date": ""}, {"source": "camfit", "text": "시설 깨끗하고 아이 놀기 좋습니다\r\n즐겨찾는 캠핑장 입니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "리버뷰가 끝내줍니다. 낚시도 하시던데 다음에 도전해보겠습니다", "rating": null, "author": "캠퍼456487", "date": ""}, {"source": "camfit", "text": "작년 한글날 캠핑~\r\n만휴림 싸이트 아주 넓고 좋았습니다\r\n처음이었어요 이렇게 여유롭게 즐긴 캠핑이.. \r\n중딩도 초딩도 다 만족하는 수영장 일단 너무 좋구요,,\r\n뷰~캬~캠은 편의시설가까운게 최고라여기며 뷰는 늘 뒷전이었는데 와우~이런맛이군요..뻥뚫린 시야에 초록초록과 맑은 하늘..너무 너무 행복했습니다\r\n올 여름휴가는 여기!! 에용~~^^", "rating": null, "author": "캠퍼78663", "date": ""}, {"source": "camfit", "text": "진짜 너무 좋아요 !!\r\n매번 가는 캠핑장 입니다 강추 시설 너무 깨끗하고 너무 좋아요", "rating": null, "author": "캠퍼703930", "date": ""}, {"source": "camfit", "text": "모든게 완벽한 캠핑장!!! 개별화장실은 너무 깨끗하고\r\n사이트도 엄청넓음\r\n캠핑장에있는 강아지들도 사람좋아하고 강아지들이 뛰어놀수있는\r\n공간도있어 좋음\r\n새벽에 닭이 우는데 ㅋㅋㅋㅋ 저희가족은 그냥 그려려니해서 \r\n귀마개주시는데 안해도 잘잤음\r\n담에 또 가고싶은 캠핑장!!!", "rating": null, "author": "윤빵이", "date": ""}, {"source": "camfit", "text": "명당자리에 갔던 캠핑장중 최고였어요~~", "rating": null, "author": "캠퍼520299", "date": ""}, {"source": "camfit", "text": "시설 좋고 조용한 캠핑장이었습니다. 방문의사100%", "rating": null, "author": "방가루", "date": ""}, {"source": "camfit", "text": "생각보다 아담한 캠핑장이였어요~\r\n계단형식에 옆사이트에 방해없어 좋았구요~\r\n화장실이나 개수대도 가까웠어요~\r\n지붕(?)아래에서랑 데크위에서는 화롯대사용불가하니 참고해주세요~\r\n매점도 무인으로 운영되고 있는데 카드는 안되고 입금만 가능해요~~~\r\n날씨도 좋았고  근처에 갈만한 리스트도 알려주셔서 둘째날은 수타사랑 농촌체험마을까지 가서 구경갔어요\r\n또 가고싶어서 5월달까지 예약해버렸네요", "rating": null, "author": "키다리레몬", "date": ""}, {"source": "camfit", "text": "최고였습니다. 바닷가에 채집. 바다뷰. 날씨", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "처음 다녀왔는데 좋았습니다. \r\n아이들 놀거리가 많아요", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "풍경이 정말 멋져요.\r\n화장실 개수대 모두 깨끗하고 온수도 엄청 잘 나와요.\r\n샤워실도 탈의하는 공간은 함께 쓰지만 샤워 부스가 나눠져 있어서 좋았어요.\r\n걸어서 갈만한 거리에 카페도 있고 작은 마트도 있어서 편리했어요.", "rating": null, "author": "캠퍼90538", "date": ""}, {"source": "camfit", "text": "매너타임 없음 밤까지 중국인들 기타치고 소리치고 난리남 난생처음 경험함 ㅋㅋㅋㅋㅋ", "rating": null, "author": "캠퍼692023", "date": ""}, {"source": "camfit", "text": "너무 좋아하는 캠핑장입니다 머물수록울산바위의 기를 받는 느낌~~^^ 눈호강하며 즐거운캠핑하고 왔어요", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "예약하기 힘든 이유가 다 있는법이죠 잘 쉬었다 갑ㄴㄱ다", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "조용한 분위기 즐길수있는 캠핑장이예요\r\n매너시간도 잘지키고 시설도 깔끔해요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "너무 좋았어요  \r\n화장실깨끗하고 사이트넓고 바로앞 바다라 전망도 좋아았어요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "올해 첫 캠 어디로 가지 ~ 하다가 캠프더쉼 또 방문 했어요 ㅎ ㅎ 역시 언제와도 관리 정말 잘 되있고 사장님 너무 친절하셔요. 매점도 잘 되어있어서 급히 필요한것들 다 구매 가능하구요. 곧 또 봬요 ㅎ ㅎ", "rating": null, "author": "캠퍼880932", "date": ""}, {"source": "camfit", "text": "좋아요  작년갔던곳인데 이제  올리네요\r\n거의 전세캠 하고  왔네요 사이트 널찍 널찍하고  조용하게  잘 지내다  왔습니다\r\n뒷집 고양이 인지  고양이가  너무너무  귀여웠던  기억이  있어요 ^^", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋은 캠핑장이에요. 바다/갯벌 뷰이고, 바다보다 고도가 높은 층에 있어서 멀리 좋은 뷰를 감상할 수 있었어요.", "rating": null, "author": "캠퍼806200", "date": ""}, {"source": "camfit", "text": "비가와서 아쉬웠지만 ㅠㅠ\r\n화장실 샤워장 깔끔하니 너무 좋았습니다^^", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "뷰는 끝내줍니다\r\n사장님도 친절하시고 개별 화장실이라 편하고 씻고  지냈네요 g", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_26240_dcbf8ba671.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/26244_b2d6ebf874.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_26244_b2d6ebf874.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/26241_f803dfff6f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_26241_f803dfff6f.jpg"}]}, {"source": "camfit", "text": "신생 캠핑장에 다녀왔어요 일단 캠핑장 사장님과 가족분들이 정말 친절하셔서 캠핑 내내 기분이 좋았습니다 ㅎㅎ 그리고 화장실도 청결하고 비데도 설치되어 있고 샤워실은 깔끔하고 공간분리 잘되어있고 여러 위생용품도 구비되어 있어서 대만족입니다! 개수대도 깔끔하고 전체적으로 관리를 열심히하셔서 1박2일 즐겁게 캠핑하고 왔습니다!! 그리고 매너타임에도 다들 조용하셨네요 잠도 잘 잤네요^^ 재방문 의사 ×10000000!", "author": "기리기리동", "date": 1774751603375, "zone": "A구역 (데크+파쇄석)", "site": "A03", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000050705_600e7cc224.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000050705_600e7cc224.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000050706_a379d9047f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000050706_a379d9047f.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000050712_8510558e32.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000050712_8510558e32.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000050761_529a3c1a1d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000050761_529a3c1a1d.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000050762_adf6253182.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000050762_adf6253182.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000050763_81d7e2fefa.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000050763_81d7e2fefa.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000050765_ae15a8cacc.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000050765_ae15a8cacc.jpg"}]}, {"source": "camfit", "text": "입구 찾는게 좀 힘들어서 한번 다른 길로 들어가긴했지만 오픈한 지 얼마 안 된 곳이라 그런지 전체적으로 시설이 정말 깔끔하고 정돈이 잘 되어 있어서 너무 좋았습니다 화장실이나 개수대 같은 기본 시설도 청결하게 관리되고 있었고, 사이트 간 간격도 넓찍넓찍해서 쾌적하게 이용할 수 있었어요.\r\n\r\n무엇보다 사장님이 정말 친절하셔서 기억에 남고\r\n오픈 기념으로 누잠매트리스도 증정해주셨는데 안그래도 매트 필요했는데 감사합니다!!또 저녁이 되니까 캠핑장 전체에 전구 조명이 켜지는데 분위기가 정말 예뻐서 사진 찍기에도 좋고, 감성 캠핑 느낌 제대로 나더라고요.\r\n\r\n특히 좋았던 점은 사이트가 단별로 구성되어 있어서 앞 사이트 텐트에 시야가 가리지 않고, 뻥 뚫린 뷰를 그대로 즐길 수 있었어요! 덕분에 답답함 없이 훨씬 더 여유롭고 탁 트인 느낌으로 캠핑을 즐길 수 있었어요.\r\n\r\n오픈 이벤으로 장작도 서비스로 챙겨주셔서 따로 준비하지 않아도 불멍까지 여유롭게 즐길 수 있었던 점도 좋았습니다.\r\n\r\n전체적으로 시설, 서비스, 분위기, 뷰까지 모두 만족스러웠던 캠핑장이었고, 재방문 의사 충분히 있는 곳입니다. 깔끔하고 편하게 캠핑하고 싶은 분들께 추천드리고 싶어요 👍\r\n(늦게 도착하는 바람에 사진을 많이 못찍어서 ㅠㅠㅠ)", "author": "유저 비공개", "date": 1774340805180, "zone": "A구역 (데크+파쇄석)", "site": "A04", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4235_ddf7f89fd1.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4235_ddf7f89fd1.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4231_339ca01e95.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4231_339ca01e95.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4245_a7a0d7897e.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4245_a7a0d7897e.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4246_3c1518085a.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4246_3c1518085a.jpeg"}]}], "other_reviews": [{"source": "camfit", "text": "아르보리아는 항상 좋은 추억을 만들어 준 곳이에요!", "rating": null, "author": "이애기", "date": ""}, {"source": "camfit", "text": "사장님이 친절하시고. 설명이 자세하셔서 편하게 잘놀다갑니다.\r\n충주로 다시 오게된다면 꼭 다시 여기로오고싶네요.", "rating": null, "author": "캠퍼660252", "date": ""}, {"source": "camfit", "text": "반달곰숲아이들이 놀거리많고 동물도보고 좋아요 체험하는것도 많고 굿", "rating": null, "author": "캠퍼177857", "date": ""}, {"source": "camfit", "text": "시설 깨끗하고 아이 놀기 좋습니다\r\n즐겨찾는 캠핑장 입니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "리버뷰가 끝내줍니다. 낚시도 하시던데 다음에 도전해보겠습니다", "rating": null, "author": "캠퍼456487", "date": ""}, {"source": "camfit", "text": "작년 한글날 캠핑~\r\n만휴림 싸이트 아주 넓고 좋았습니다\r\n처음이었어요 이렇게 여유롭게 즐긴 캠핑이.. \r\n중딩도 초딩도 다 만족하는 수영장 일단 너무 좋구요,,\r\n뷰~캬~캠은 편의시설가까운게 최고라여기며 뷰는 늘 뒷전이었는데 와우~이런맛이군요..뻥뚫린 시야에 초록초록과 맑은 하늘..너무 너무 행복했습니다\r\n올 여름휴가는 여기!! 에용~~^^", "rating": null, "author": "캠퍼78663", "date": ""}, {"source": "camfit", "text": "진짜 너무 좋아요 !!\r\n매번 가는 캠핑장 입니다 강추 시설 너무 깨끗하고 너무 좋아요", "rating": null, "author": "캠퍼703930", "date": ""}, {"source": "camfit", "text": "모든게 완벽한 캠핑장!!! 개별화장실은 너무 깨끗하고\r\n사이트도 엄청넓음\r\n캠핑장에있는 강아지들도 사람좋아하고 강아지들이 뛰어놀수있는\r\n공간도있어 좋음\r\n새벽에 닭이 우는데 ㅋㅋㅋㅋ 저희가족은 그냥 그려려니해서 \r\n귀마개주시는데 안해도 잘잤음\r\n담에 또 가고싶은 캠핑장!!!", "rating": null, "author": "윤빵이", "date": ""}, {"source": "camfit", "text": "명당자리에 갔던 캠핑장중 최고였어요~~", "rating": null, "author": "캠퍼520299", "date": ""}, {"source": "camfit", "text": "시설 좋고 조용한 캠핑장이었습니다. 방문의사100%", "rating": null, "author": "방가루", "date": ""}, {"source": "camfit", "text": "생각보다 아담한 캠핑장이였어요~\r\n계단형식에 옆사이트에 방해없어 좋았구요~\r\n화장실이나 개수대도 가까웠어요~\r\n지붕(?)아래에서랑 데크위에서는 화롯대사용불가하니 참고해주세요~\r\n매점도 무인으로 운영되고 있는데 카드는 안되고 입금만 가능해요~~~\r\n날씨도 좋았고  근처에 갈만한 리스트도 알려주셔서 둘째날은 수타사랑 농촌체험마을까지 가서 구경갔어요\r\n또 가고싶어서 5월달까지 예약해버렸네요", "rating": null, "author": "키다리레몬", "date": ""}, {"source": "camfit", "text": "최고였습니다. 바닷가에 채집. 바다뷰. 날씨", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "처음 다녀왔는데 좋았습니다. \r\n아이들 놀거리가 많아요", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "풍경이 정말 멋져요.\r\n화장실 개수대 모두 깨끗하고 온수도 엄청 잘 나와요.\r\n샤워실도 탈의하는 공간은 함께 쓰지만 샤워 부스가 나눠져 있어서 좋았어요.\r\n걸어서 갈만한 거리에 카페도 있고 작은 마트도 있어서 편리했어요.", "rating": null, "author": "캠퍼90538", "date": ""}, {"source": "camfit", "text": "매너타임 없음 밤까지 중국인들 기타치고 소리치고 난리남 난생처음 경험함 ㅋㅋㅋㅋㅋ", "rating": null, "author": "캠퍼692023", "date": ""}, {"source": "camfit", "text": "너무 좋아하는 캠핑장입니다 머물수록울산바위의 기를 받는 느낌~~^^ 눈호강하며 즐거운캠핑하고 왔어요", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "예약하기 힘든 이유가 다 있는법이죠 잘 쉬었다 갑ㄴㄱ다", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "조용한 분위기 즐길수있는 캠핑장이예요\r\n매너시간도 잘지키고 시설도 깔끔해요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "너무 좋았어요  \r\n화장실깨끗하고 사이트넓고 바로앞 바다라 전망도 좋아았어요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "올해 첫 캠 어디로 가지 ~ 하다가 캠프더쉼 또 방문 했어요 ㅎ ㅎ 역시 언제와도 관리 정말 잘 되있고 사장님 너무 친절하셔요. 매점도 잘 되어있어서 급히 필요한것들 다 구매 가능하구요. 곧 또 봬요 ㅎ ㅎ", "rating": null, "author": "캠퍼880932", "date": ""}, {"source": "camfit", "text": "좋아요  작년갔던곳인데 이제  올리네요\r\n거의 전세캠 하고  왔네요 사이트 널찍 널찍하고  조용하게  잘 지내다  왔습니다\r\n뒷집 고양이 인지  고양이가  너무너무  귀여웠던  기억이  있어요 ^^", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋은 캠핑장이에요. 바다/갯벌 뷰이고, 바다보다 고도가 높은 층에 있어서 멀리 좋은 뷰를 감상할 수 있었어요.", "rating": null, "author": "캠퍼806200", "date": ""}, {"source": "camfit", "text": "비가와서 아쉬웠지만 ㅠㅠ\r\n화장실 샤워장 깔끔하니 너무 좋았습니다^^", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "뷰는 끝내줍니다\r\n사장님도 친절하시고 개별 화장실이라 편하고 씻고  지냈네요  사진이  별로 없네요  눈으로만  저장 했네요~~^^\r\n다시 가고 싶네요", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋아요 시설도 깨끗하고 캠장님도 너무 친절하시고 저희 강아지 마주치고 이뻐라 해주셔서 감사합다 . 저만 알고 싶은 캠핑장이라 소문 안났으면 좋겠지만 ㅠㅠ그만큼 만족 했습니다.조만간 또 방문할 예정이용 :) 덕분에 좋은 시간 보냈습니다!    감사합니다❤️", "rating": null, "author": "캠퍼941903", "date": ""}, {"source": "camfit", "text": "첫캠핑장소였습니다👍🏻\r\n집에서 가까워 좋았고 깔끔하니 좋았습니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "4번 사이트였는데 사람이 많이 없어서\r\n데크8번으로 옮겼어요.\r\n데크팩도 없었는데 캠장님 빌려주셔서 감사합니당~\r\n사람이 없어서 화장실 혼자쓰고. 개수대도 깔끔하고 \r\n나만 노래 틀어서 시끄럽고 분위기 좋았어요\r\n혼자라 낯가림 이슈로 캠프파이어 못나가고 \r\n알콜섭취로  잠을 잤어요.  훗\r\n담에 또 조용히 솔캠하러 방문하겠습니다~~~~", "rating": null, "author": "캠퍼385453", "date": ""}, {"source": "camfit", "text": "신생캠핑장인만큼 전체적으로 깨끗하고 정비되어있어서\r\n이용하는동안 너무 편하게 잘 쉴 수 있었습니다~\r\n사이트들이 약간의 계단식형태라서 공간분리도 좋고\r\n주변이 산으로 둘러쌓여있어서 계절별로 매력있을 것 같아요\r\n매점에도 등유를 포함해서 다양하게 준비되어 있고\r\n와이파이도 준비되       <span style="color:#ff6b35">캠핏 ${camp.camfit_count}개</span>
      <br><a href="${camp.place_url}" target="_blank" style="color:#38bdf8;font-size:11px">카카오맵</a>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-pill"><span class="n" style="color:#ff6b35">${cfn}</span> 캠핏</div>
    <div class="stat-pill"><span class="n" style="color:#2db400">${naver_reviews.length}</span> 네이버</div>
    <div class="stat-pill"><span class="n" style="color:#fbbf24">${kakao_reviews.length}</span> 카카오</div>
    <div class="stat-pill"><span class="n" style="color:#38bdf8">${imgCount}</span> 사진</div>
  </div>
  <div class="source-tabs" data-camp="${camp.kid}">
    <button class="src-tab active" data-src="all" onclick="filterSrc('${camp.kid}','all',this)">전체 ${total}</button>
    <button class="src-tab" data-src="camfit" onclick="filterSrc('${camp.kid}','camfit',this)">캠핏 ${cfn}</button>
    <button class="src-tab" data-src="naver" onclick="filterSrc('${camp.kid}','naver',this)">네이버 ${naver_reviews.length}</button>
    <button class="src-tab" data-src="kakao" onclick="filterSrc('${camp.kid}','kakao',this)">카카오 ${kakao_reviews.length}</button>
  </div>
  <div id="reviews-${camp.kid}">`;

  // 캠핏 리뷰
  camp.cf_reviews.forEach(r => {
    const tags = [];
    if (r.isClean) tags.push('<span class="review-tag clean">청결함</span>');
    if (r.isKind) tags.push('<span class="review-tag kind">친절함</span>');
    if (r.isConvenient) tags.push('<span class="review-tag convenient">편의시설</span>');
    const imgs = (r.images||[]).map(img => `<img src="${img.thumb||img.url}" onclick="showLB('${img.url}')" loading="lazy">`).join('');
    const date = r.date ? new Date(r.date).toLocaleDateString('ko-KR') : '';

    h += `<div class="review-card" data-source="camfit">
      <div class="review-header">
        <span><span class="src-badge camfit">캠핏</span><span class="review-author">${r.author||'익명'}</span>${r.zone ? '<span class="review-zone">'+r.zone+(r.site?' #'+r.site:'')+'</span>' : ''}</span>
        <span class="review-meta">${date} ${r.season||''} ${r.numOfDays ? r.numOfDays+'박':''}</span>
      </div>
      ${tags.length ? '<div class="review-tags">'+tags.join('')+'</div>' : ''}
      <div class="review-text">${r.text}</div>
      ${imgs ? '<div class="review-images">'+imgs+'</div>' : ''}
    </div>`;
  });

  // 네이버+카카오 리뷰
  camp.other_reviews.forEach(r => {
    const src = r.source || 'naver';
    const srcLabel = src === 'kakao_blog' ? '카카오블로그' : src === 'kakao' ? '카카오' : '네이버';
    const srcCls = src.startsWith('kakao') ? 'kakao' : 'naver';
    h += `<div class="review-card" data-source="${srcCls}">
      <div class="review-header">
        <span><span class="src-badge ${src}">${srcLabel}</span><span class="review-author">${r.author||''}</span></span>
        <span class="review-meta">${r.date||''}</span>
      </div>
      <div class="review-text">${r.text}</div>
    </div>`;
  });

  if (total === 0) h += '<div class="no-reviews">수집된 리뷰가 없습니다</div>';

  h += '</div>';
  sec.innerHTML = h;
  content.appendChild(sec);
});

function filterSrc(kid, src, btn) {
  const tabs = btn.parentElement;
  tabs.querySelectorAll('.src-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const cards = document.querySelectorAll('#reviews-'+kid+' .review-card');
  cards.forEach(c => {
    if (src === 'all') c.style.display = '';
    else c.style.display = c.dataset.source === src ? '' : 'none';
  });
}
</script>
</body>
</html>
