nt.net/thumbnail_1000023680_28bf1ecfd6.jpg"}]}, {"source": "camfit", "text": "수영장크고 미끄럼 잼나요\r\n사람이 넘 많아서 좀...", "author": "짬뽕", "date": 1769434515650, "zone": "방갈로(취사공간o)", "site": "3번", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "지인들과이용하기에 편리했어요\r\n위쪽화장실은 정비가 필요해보였어요", "author": "짬뽕", "date": 1769434441720, "zone": "방갈로(취사공간o)", "site": "3번", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "지인들과 이용했어요\r\n사용하기 편리했어요", "author": "짬뽕", "date": 1769434355333, "zone": "방갈로4", "site": "01", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "다른곳보다 가격이 합리적이고, 매점도 친절했어요", "author": "슈쿠리", "date": 1769090419738, "zone": "계곡수영장 피크닉", "site": "37", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000021624_5ae2d2e122.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000021624_5ae2d2e122.jpg"}]}, {"source": "camfit", "text": "관광진흥법 시행규칙\r\n[시행 2025. 12. 29.] [문화체육관광부령 제622호, 2025. 12. 29., 일부개정]\r\n【제정·개정이유】 제정·개정문보기     전체 제정·개정문보기\r\n\r\n[일부개정]\r\n◇ 개정이유 및 주요내용\r\n  야영장 이용객의 편의 증진을 위해 누전차단기가 설치된 야영장 내 사방이 밀폐된 이동식 야영용 천막 안에서의 전기용품 총 사용량 제한을 600와트에서 1,100와트로 완화하려는 것임.\r\n<문화체육관광부 제공>\r\n【제정·개정문】 제정·개정이유보기     전체 제정·개정문보기\r\n\r\n\r\n⊙문화체육관광부령 제622호\r\n  관광진흥법 시행규칙 일부개정령을 다음과 같이 공포한다.\r\n    2025년 12월 29일\r\n          문화체육관광부장관 (인)\r\n\r\n관광진흥법 시행규칙 일부개정령\r\n\r\n관광진흥법 시행규칙 일부를 다음과 같이 개정한다.\r\n\r\n별표 7 제1호가목 중 \"「화재예방, 소방시설 설치ㆍ유지 및 안전관리에 관한 법률」 제9조제1항\"을 \"「소방시설 설치 및 관리에 관한 법률」 제2조제1항제6호\"로, \"같은 법 제36조제3항 또는 제39조제2항\"을 \"같은 법 제37조제3항 또는 제40조제2항\"으로 하고, 같은 호 나목 중 \"600와트\"를 \"1,100와트\"로 하며, 같은 호 마목 중 \"「화재예방, 소방시설 설치ㆍ유지 및 안전관리에 관한 법률」 제12조제1항\"을 \"「소방시설 설치 및 관리에 관한 법률」 제20조제3항\"으로 한다.\r\n\r\n          부칙\r\n이 규칙은 공포한 날부터 시행한다.\r\n\r\n이제 바뀌었네요...\r\n\r\n언능 시설 정비가 되면 좋겠습니다.", "author": "톰켓", "date": 1767746851807, "zone": "파쇄석", "site": "08-계곡앞", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "여름 물놀이하니 너무 좋았어요~~~^^", "author": "캠퍼352362", "date": 1767420376562, "zone": "파쇄석", "site": "09-계곡앞", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "즐거웠습니다^^~  노후가 좀 있지만 가깝고 저는 좋았습니다", "author": "지니캠퍼0426", "date": 1767288032450, "zone": "데크", "site": "13", "season": "winter", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "방갈로가 새로꾸며 깨끗하고 편하게 잘쉬고왔어요", "author": "짬뽕", "date": 1767041262522, "zone": "방갈로(취사공간o)", "site": "4번", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "조용하고 사장님 너무 좋와요 그리고 캥핑장 메너타임과 세면대 정리정돈도 잘 되어 있어 생활하기가 정말 편했습니다", "author": "유저 비공개", "date": 1766985977232, "zone": "파쇄석", "site": "10-계곡앞", "season": "winter", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "화장실이 너무 열악합니다ㅠ 아이들 놀이방도 지저분해요..", "author": "유저 비공개", "date": 1766970245128, "zone": "데크", "site": "09", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "- 서울이랑 가까워서 좋습니다.\r\n- 화장실, 샤워실은 많이 노후되어 있습니다.\r\n- 개수대는 보통 입니다.\r\n- 전체적으로 많이 허름하나 전기는 IoT로 철저하게 관리 하십니다.\r\n- 차단기가 내려가지 않아도 알아서 전기가 팍팍 떨어져 줍니다.\r\n- 에어텐트 바람 넣다가도 전기가 끊깁니다……", "author": "유저 비공개", "date": 1766630481172, "zone": "파쇄석", "site": "26", "season": "winter", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비가 와서 걱정하긴했지만 재미있게 다녀온것 같습니다", "author": "캠퍼728188", "date": 1766034544585, "zone": "파쇄석", "site": "05-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0838_cdf15a4c4f.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0838_cdf15a4c4f.jpeg"}]}, {"source": "camfit", "text": "한적하고 조용하고 좋았습니다~\r\n양주에 캠핑장 이용할땐 또 방문 할 것 같네요", "author": "캠퍼926221", "date": 1765463602022, "zone": "파쇄석", "site": "25", "season": "winter", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000015250_3a7065530b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000015250_3a7065530b.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000015251_6cd4983c17.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000015251_6cd4983c17.jpg"}]}, {"source": "camfit", "text": "사이트 넓고 시설도 굿 바로옆 커피숖도 있고 장박하고 싶네요", "author": "캠퍼398860", "date": 1764551573286, "zone": "파쇄석", "site": "25", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008662_9d36342d22.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008662_9d36342d22.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008664_80daa4a840.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008664_80daa4a840.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008665_6cc2113cfc.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008665_6cc2113cfc.jpg"}]}, {"source": "camfit", "text": "아이들이랑 가기좋은 캠핑장 입니다\r\n너무 잘  놀다왔어요", "author": "캠퍼483147", "date": 1763639861268, "zone": "파쇄석", "site": "22", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000070049_914724a0df.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000070049_914724a0df.jpg"}]}, {"source": "camfit", "text": "짧은 1박 2일이었지만 나름 여유로운 캠핑을 보냈어요", "author": "캠퍼212771", "date": 1763428971154, "zone": "데크", "site": "07", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029740_dede77c3b9.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029740_dede77c3b9.jpg"}]}, {"source": "camfit", "text": "작은 캠핑장 집이랑도 가까워서 만족해요~ 사람 많지않아서 좋았어용~", "author": "유저 비공개", "date": 1763262658497, "zone": "파쇄석", "site": "20", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000034297_83e5f3ea28.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000034297_83e5f3ea28.jpg"}]}, {"source": "camfit", "text": "넓고 좋은 캠핑장 입니다.\r\n자주 사용할꺼 같아요.   ^^", "author": "캠퍼665924", "date": 1763010237142, "zone": "파쇄석", "site": "10-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20251024_154449_5b3e90f551.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20251024_154449_5b3e90f551.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20251024_154457_be5de982ac.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20251024_154457_be5de982ac.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20251024_154421_98cede79ba.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20251024_154421_98cede79ba.jpg"}]}, {"source": "camfit", "text": "사장님 친절하시고 데크와 화장실이 가까워서 좋았어요\r\n온수 잘나오고 좋아요 \r\n항상 가을에만 갔는데 이제는 겨울, 여름도 가려고요", "author": "캠퍼212771", "date": 1763000738191, "zone": "데크", "site": "07", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000026785_c0b16eaad4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000026785_c0b16eaad4.jpg"}]}, {"source": "camfit", "text": "가을 단풍이 예쁜 캠핑장이예요.   단풍구경도하고 캠핑도 하고 1석2조입니다", "author": "baram1100", "date": 1762854114443, "zone": "파쇄석", "site": "21", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040598_7764af3b48.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040598_7764af3b48.jpg"}]}, {"source": "camfit", "text": "급하게 캠핑을 가고싶어서 알아보던중 아이들이 있어서 놀이방이 있으면 좋겠다 생각해서 놀이방만 보고 그냥 예약했는데 너무 만족했네요 놀이방은 좀 많이 작아요ㅠㅠ\r\n그래서 애들이 잘 못놀았지만 그네도 타고 방방이도 타고 밖에 동물도 보고 알아서 잘 놀더라구요 파쇄석 자리가 너무 맘에들어서 다음엔 계곡앞 사이트를 잡아서 여름에 놀게요!", "author": "연년생서서남매", "date": 1762787114755, "zone": "파쇄석", "site": "21", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3860_b206946701.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3860_b206946701.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3877_7662239e09.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3877_7662239e09.jpeg"}]}, {"source": "camfit", "text": "다닥다닥 붙어있긴한데 괜찮았어요.\r\n화장실이 좀 협소해요.", "author": "유니봉봉", "date": 1761123585592, "zone": "계곡수영장 피크닉", "site": "12", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "사이트(파쇄석 20번)가 넓고, 편안하게 쉬다 왔어요. 아쉬운 점은 화장실과 샤워장 리모델링이 필요해 보이네요. 씾지 못하고, 퇴실했어요... 여자 아이들이라 좀 깔끔들을 떠어서요 ㅠㅠ", "author": "캠퍼684989", "date": 1760857053488, "zone": "파쇄석", "site": "20", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029130_6e27c57be1.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029130_6e27c57be1.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029090_e193ef7598.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029090_e193ef7598.jpg"}]}, {"source": "camfit", "text": "솔캠을 처음으로 다녀왔는데 매너타임도 잘지켜지고\r\n좋았습니당.\r\n계곡물이 조금 더 많았으면 좋겠다는 생각은했지만\r\n다른 여건이 좋고 주변에 마장호수도 있어서 좋았어요!", "author": "캠퍼857746", "date": 1760764461665, "zone": "파쇄석", "site": "07-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8663_01f02feab8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8663_01f02feab8.jpeg"}]}, {"source": "camfit", "text": "나무들도 적당히 있고 앞에 개울가가 있어요 아이들 수영장도 있어요~샤워장도 많고 개별 샤워장이 있는것도 좋았어요 저는 2번 방문했는데 잘 놀다가 왔습니다", "author": "캠퍼509387", "date": 1760587368531, "zone": "파쇄석", "site": "08-계곡앞", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020441_7d06c3a920.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020441_7d06c3a920.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020436_a26fdb573b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020436_a26fdb573b.jpg"}]}, {"source": "camfit", "text": "2박3일 두번째 오토캠핑이었어요! \r\n방방이랑 키즈룸있어 좋았고 토끼와 닭 이이들이 좋아했어요.\r\n직계가족인데 당일방문 2시간 조기입실수수료 1만원 부과는 좀 아쉬웠어요. \r\n여름엔 수영장과 바로옆 계곡으로 좋을거같아요!!", "author": "유저 비공개", "date": 1760384834349, "zone": "파쇄석", "site": "10-계곡앞", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000036370_1d26c1bb15.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000036370_1d26c1bb15.jpg"}]}, {"source": "camfit", "text": "항상 가는곳입니다.늘 만족합니다ㅎㅎㅎ", "author": "캠퍼646792", "date": 1760330272452, "zone": "파쇄석", "site": "08-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000048909_16e155bb6a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000048909_16e155bb6a.jpg"}]}, {"source": "camfit", "text": "자리도 넓고 나무도 많고 좋았어요 근데 차량을 옆에주차하니 너무 주차장느낌이랄까", "author": "캠퍼268451", "date": 1760329393080, "zone": "파쇄석", "site": "21", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "앞에 계곡도 있고 깔끔한 캠핑장이였어요^^  레이트 체크아웃으로 비용 발생으로 맘이 조금 상했지만  조용하고 아이들이 좋아했어요", "author": "캠퍼709459", "date": 1760309989774, "zone": "파쇄석", "site": "03-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "전체적으로 깔끔하고\r\n매너타임도 잘 지켜져 조용하고 좋았습니다.", "author": "캠퍼897392", "date": 1760269068654, "zone": "파쇄석", "site": "16", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "여름에 꼭 와야 하는곳\r\n사장님도 친절하시고\r\n수영장 관리 잘되요", "author": "캠퍼483147", "date": 1760235431516, "zone": "파쇄석", "site": "14-계곡앞", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000062501_22bc1d6d96.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000062501_22bc1d6d96.jpg"}]}, {"source": "camfit", "text": "송천 계곡이 보이는 캠핑장 다녀왔습니다.\r\n사장님이 친절하시고 좋아요.\r\n오래된 곳이라 시설이 좀 낡긴해도 관리가 잘 되서 온수도 잘 나오고 괜찮았습니다.\r\n다만, 매너타임 지나고도 큰 소리로 통화하고, 한 사이트만 이용하는것 같은데 이틀내내 다른 가족이 이른 아침 7시쯤 방문해서 밥먹고 새벽늦게 돌아가고 하더라고요. 이런 부분은 좀 철저히 관리 해주시면 좋겠습니다!", "author": "유저 비공개", "date": 1760163368799, "zone": "파쇄석", "site": "03-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8030_54ea67c1a0.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8030_54ea67c1a0.jpeg"}]}, {"source": "camfit", "text": "추석 명절 연휴에 예약자리 없어서 겨우 찾은 곳이에요\r\n아이는 놀이방도 있고 캠핑장가서 만난 친구 많아서 재밌다고 하더라고요", "author": "스카이방", "date": 1760150991442, "zone": "데크", "site": "11", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/10425_aa9067b713.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_10425_aa9067b713.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/10510_b30052a491.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_10510_b30052a491.jpg"}]}, {"source": "camfit", "text": "급하게 예약 하고 갔던 곳인데 \r\n좀 더 명당 자리로 예약 해서 다시 한번 가고 싶어요!!!!", "author": "캠퍼904751", "date": 1760111143099, "zone": "수영장데크", "site": "I번", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5392_362aadfde0.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5392_362aadfde0.jpeg"}]}, {"source": "camfit", "text": "편안하게 잘 지내다  왔습니다\r\n집과 가까워서  자주 이용할 듯 하네요\r\n계곡도 있고 수령오래된 나무들도 있어서 운치도 있어 멀리 안가도되는점이  마음에 들었습니다~^^", "author": "캠퍼537101", "date": 1760073114115, "zone": "파쇄석", "site": "06-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000001697_fcde9a1709.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000001697_fcde9a1709.jpg"}]}, {"source": "camfit", "text": "여름에 기대 되는 캠핑장 이네요 수영장이 근사합니다", "author": "의리바드", "date": 1760004110937, "zone": "파쇄석", "site": "28", "season": "winter", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "사장님 친절하시고 큰 터치 없으심 자유로운 분위기에 아이들 놀이시설도 좋고 시냇가가 있어서 넘 힐링됨 자주 이용하고 싶은곳 임", "author": "캠퍼693337", "date": 1760000839738, "zone": "데크", "site": "04(계곡앞)", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "수도권에서 접근하기 쉬운 캠핑장입니다. 년식이 좀 있다보니 시설은 약간 노후됐지만 무리없이 사용하기 괜찮은 편입니다.\r\n트렘폴린이랑 키즈놀이방이 조그마하게 있어서 애들 거기서 놀으라하고 피칭하거나 철수준비하면 좋네요\r\n파쇄석 사이트 간격도 나쁘지 않았구요\r\n다음분을 위해 23번 데크에 행운한모금 올려두고 옵니디^^", "author": "시윤아빠85", "date": 1759994173955, "zone": "파쇄석", "site": "23", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000038446_36ff539012.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000038446_36ff539012.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000038518_c6f474d917.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000038518_c6f474d917.jpg"}]}, {"source": "camfit", "text": "좋아요\r\n2박중 첫날비가와서 타프가 노후되어 비가 샛는데 주인분께서 농업용 비닐을 빌려주셔서 살았어요.\r\n매우 친절하심\r\n시설은 노후됐다는 평이 많아서 걱정했는데\r\n따뜻한물도 잘나오고 화장실도 깨끗했어요.\r\n매너타임도 잘지켜져요.\r\n만족합니다.\r\n다만 데크 사이가 좀 다닥다닥한점은 단점이네요.\r\n그리고 둘째날 새벽 5시쯤 위에 건물?(요양원?)인가에서 카트끄는소리와 뭐 나르는소리가 크게들려서 잠을 설쳤네요.\r\n다음에 파쇄석을 이용해보려고요", "author": "예스팸", "date": 1759993687468, "zone": "데크", "site": "12", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "퍼식이 피칭하기 살짝 작았지만 나름 있을만했습니다 ㅎ\r\n캠핑장은 오래된듯하나 관리 잘해주시는것같아 깔끔하게ㅜ이용했어요\r\n데크 1~4 번까지는 통으로된 자리라 누군가 쿵 하면 다 울려서 신경쓰이더라구요\r\n저도 아이들 단도리하느라 피곤해지구요 ㅎㅎ\r\n샤워실 좁지만 뜨거운물 잘 나왔고 개수대도 뜨거운물 잘 나왔어요\r\n매번 친절하게 응대해주셔서 기분좋게 지내고왔습니다 : )", "author": "먹고놀자", "date": 1759991299420, "zone": "데크", "site": "03(계곡앞)", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6777_1c3a2102e8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6777_1c3a2102e8.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6766_c4619cb8eb.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6766_c4619cb8eb.jpeg"}]}, {"source": "camfit", "text": "화장실도 깨끗하고 데크도 넓어서 4인 가족 충분이 잘 즐기고 답니다~~", "author": "유저 비공개", "date": 1759990045961, "zone": "데크", "site": "06", "season": "fall", "numOfDays": 3, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8029_f4359d0513.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8029_f4359d0513.jpeg"}]}, {"source": "camfit", "text": "난방이 너무 잘 되서 비 올때 춥지 않고 아이들이 잘 수 있어서 좋았어요~\r\n화장실도 가깝고 깨끗해서 또 이용할거에요", "author": "유저 비공개", "date": 1759989982996, "zone": "방갈로", "site": "01", "season": "fall", "numOfDays": 3, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "겨울에 조용히 지낼수 있어요!\r\n옆에는 물이 조르륵 흘러요", "author": "캠퍼305915", "date": 1759977696800, "zone": "데크", "site": "06", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4820_2a95e23901.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4820_2a95e23901.jpeg"}]}, {"source": "camfit", "text": "사이트 넓고 좋아요ㅎㅎ\r\n친정부모님과 추석에 캠핑간건데\r\n잘 쉬다 갑니다", "author": "캠퍼557514", "date": 1759906378406, "zone": "파쇄석", "site": "25", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000041489_a3c6c47205.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000041489_a3c6c47205.jpg"}]}, {"source": "camfit", "text": "친정부모님과 추석연휴 캠핑\r\n보내려고 예약했어요 \r\n비가 이틀 내내와서..아쉽긴했네요ㅜ\r\n마장호수 가려고 예약한거라..\r\n옆텐트가 두팀이서 11시이후 소등도 안하고\r\n떠들어서 잠을 늦게 잔거 말고는 잘 쉬다가 갑니다.\r\n다음에 또 올게요~~", "author": "캠퍼557514", "date": 1759906145203, "zone": "파쇄석", "site": "26", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000041491_60e4090db2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000041491_60e4090db2.jpg"}]}, {"source": "camfit", "text": "사이트 크고 옆 사이트와도 어느정도 프라이빗 하네요~^^맨끝자리여서 편의시설 모두 멀었네요~\r\n계곡 못 들어갔다온게 아쉽긴하네요.\r\n잘 쉬다 왔어요.", "author": "유저 비공개", "date": 1759902157039, "zone": "파쇄석", "site": "14-계곡앞", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/41569_f7fcb8c040.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_41569_f7fcb8c040.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/41647_25108ae883.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_41647_25108ae883.jpg"}]}, {"source": "camfit", "text": "데크 넓고 좋았는데 아침에 비만 안오면..", "author": "캠퍼60511", "date": 1759798897064, "zone": "데크", "site": "04(계곡앞)", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "부모님과 즐거운시간 보냈습니다! 아무래도 오래된 캠핑장이다보니 시설면에서 세월의 흔적이 느껴지긴하지만 아이들도 너무너무즐거웠고 어른도 행복했네요^^\r\n재방문의사 100퍼센트 있습니다!", "author": "캠퍼641911", "date": 1759570915111, "zone": "파쇄석", "site": "05-계곡앞", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3815_fc5350adef.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3815_fc5350adef.jpeg"}]}, {"source": "camfit", "text": "조카랑 가서 아주 신나게 잘 놀앗습니다", "author": "캠퍼133986", "date": 1759413050810, "zone": "계곡수영장 피크닉", "site": "07", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "수영장 너무 좋아요\r\n어른도 탈수있는 미끄럼틀 맘에들어요\r\n바로 밑에 계곡도있고 아이들이 너무좋아했어요\r\n아쉬운건 시간아 넘. 짧았어요", "author": "캠퍼838014", "date": 1759330914240, "zone": "계곡수영장 피크닉", "site": "11", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "수영장 너무 좋아요\r\n어른도 탈수있는 미끄럼틀 맘에들어요\r\n바로 밑에 계곡도있고 아이들이 너무좋아했어요\r\n아쉬운건 시간아 넘. 짧았어요", "author": "캠퍼838014", "date": 1759330900259, "zone": "계곡수영장 피크닉", "site": "12", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "당일캠프닉\r\n너무좋았습니다\r\n쉬원하고그늘져서\r\n수영장도좋았습니다", "author": "키티사랑", "date": 1756867679473, "zone": "계곡수영장 피크닉", "site": "20", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009434_ea2176d7d0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009434_ea2176d7d0.jpg"}]}, {"source": "camfit", "text": "아이들물놀이하기도 좋고 즐거운여행이였어요", "author": "캠퍼504891", "date": 1756813745577, "zone": "데크", "site": "03(계곡앞)", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6078_736e937c54.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6078_736e937c54.jpeg"}]}, {"source": "camfit", "text": "놀거리 많고 수영장 잘되어있어요.\r\n수영장은 맨발입수예요", "author": "캠퍼112871", "date": 1756784303144, "zone": "계곡수영장 피크닉", "site": "23", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/13052_ad050354f8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_13052_ad050354f8.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/13061_566e40d330.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_13061_566e40d330.jpg"}]}, {"source": "camfit", "text": "매번 가는곳입니다.화장실가까와서 너무 편하고 계곡소리 넘 좋아요~", "author": "캠퍼646792", "date": 1756779854214, "zone": "파쇄석", "site": "02-계곡앞", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000048870_60c2e7c751.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000048870_60c2e7c751.jpg"}]}, {"source": "camfit", "text": "매번가는곳입니다.사이트간격 넓어서 좋고 계곡물소리 기가맥힙니다", "author": "캠퍼646792", "date": 1756779618025, "zone": "파쇄석", "site": "02-계곡앞", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000048909_4b904e5504.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000048909_4b904e5504.jpg"}]}, {"source": "camfit", "text": "가을에 가면 단풍이 이쁠꺼같아요\r\n리모델링 조금씩하셔서 데크쪽 싸이트도 화장실 괜찮은걸로 보고왔어요", "author": "캠퍼1678", "date": 1756687866926, "zone": "파쇄석", "site": "16", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "수영장도 있고 얕은 천도있어서\r\n재밌게보냈어요.", "author": "캠퍼1678", "date": 1756687634751, "zone": "파쇄석", "site": "16", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "매너타임은 알았는데 개수대랑 샤워실 잠기는거까지는 몰라서..당황했네요.. 샤워못했으면 찝찝애서 집에 갈뻔했어요", "author": "캠퍼128305", "date": 1756683644386, "zone": "파쇄석", "site": "19", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비치볼 가지고 아이들과 친구들하고 너무 재미있게 놀았어요\r\n물도 깨끗하고 튜브타고 놀기 정말 좋아요", "author": "캠퍼141892", "date": 1756650724148, "zone": "계곡수영장 2팀전용", "site": "41", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000038818_e8451d8530.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000038818_e8451d8530.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000038817_2b6373ebee.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000038817_2b6373ebee.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000038815_1f2e2674fd.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000038815_1f2e2674fd.jpg"}]}, {"source": "camfit", "text": "미끄럼틀도 재미있고\r\n취사가 가능해서 고기랑 라면도 끓여먹고\r\n너무 재미있게 놀았습니다!", "author": "캠퍼141892", "date": 1756650647174, "zone": "계곡수영장 2팀전용", "site": "40", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "기대이상으로 좋았습니다!\r\n36갤 아기도 신나게 놀고 왔어요!\r\n술취해서 소리지르시는 분들도 계셔서 걱정됐지만\r\n11시되니 조용해졌네요 ㅋㅋㅋㅋㅋ\r\n재미있었어요~^^", "author": "캠퍼802214", "date": 1756635539850, "zone": "데크", "site": "03(계곡앞)", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "가성비 최고입니다!\r\n캠핑에 수영장, 특히미끄럼틀,  방방 아이들이 좋아합니다.\r\n아쉬운건 벌레가 좀 많아서 아이들이 화장실 가는것을 좀 무서워하네요.", "author": "캠퍼659834", "date": 1756618220020, "zone": "파쇄석", "site": "28", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "나무그늘 많고\r\n수영장 넓고 좋고\r\n매점 저렴하게 이용 가능하고\r\n넓지 않지만 발 담글수 있는 시원한 계곡있고\r\n키즈카페도 있고 방방이,그네 등 \r\n아이들 놀 곳도 있지만.\r\n많은 장점을 \r\n상쇄시키는 최악의 샤워장.\r\n화장실 옆 커튼으로 가림막. 문이 있지만\r\n열리는 순간 밖에서 보일수도 있음.\r\n문 앞이 옷 환복하는곳..\r\n샤워기는 3개 나란히 붙어 있고\r\n샤워하는 사람 바로 옆에서 환복해야 함.\r\n파란지붕밑 샤워실은 더 함.\r\n샤워장 때문에 안가고 싶은 곳", "author": "캠퍼428102", "date": 1756616514219, "zone": "데크", "site": "12", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/29987_a65dc53fd4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_29987_a65dc53fd4.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/29975_cc7124fa6e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_29975_cc7124fa6e.jpg"}]}, {"source": "camfit", "text": "너무  잘 놀다왔습니다.  \r\n9월달에도  수영장 오픈 해주셨으면 좋겠어요~~", "author": "캠퍼483147", "date": 1756443058187, "zone": "파쇄석", "site": "01-계곡앞", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000061593_71b8b0b87d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000061593_71b8b0b87d.jpg"}]}, {"source": "camfit", "text": "수영장 굿 미끄럼틀 무료 굿 \r\n매점서 간단 음식들도 주문가능 굿\r\n냉동삼겹살도 팔아요 굿", "author": "선호", "date": 1756105120763, "zone": "파쇄석", "site": "04-계곡앞", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "슬라이드가 있는 큰 수영장이 있는 캠핑장을 찾다가 방문하게 되었어요 수영장 슬라이드 자리 모두 너무 마음에 들었고 트럼폴린 키즈룸 그네도 알차게 이용 했어요. 여자 화장실 샤워실은 걱정 많이 했는데 생각보다 나쁘지 않았고 남자 샤워실이 배수가 안되고 물이 졸졸 나와서 씻기 힘들었다고 하더라구요 그래도 전반적으로 만족해서 다음 해 여름 또 방문할 것 같네요 ㅎㅎ", "author": "캠퍼850499", "date": 1755997536581, "zone": "계곡수영장 피크닉", "site": "27", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "당일 피크닉으로 재밌게 놀았어요\r\n많이 붐비지 않고 비온후 불어난 계곡물이 더 좋았네요\r\n자주 이용 하려구요^^", "author": "캠퍼387028", "date": 1755763049527, "zone": "계곡수영장 피크닉", "site": "07", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029264_938147e2e0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029264_938147e2e0.jpg"}]}, {"source": "camfit", "text": "애들이랑 잘놀다 왔습니다.\r\n다음주도 또 예약 예정입니다.\r\n이번에 계곡내려가는 길인지모르고 타프 넓게 쳤다가\r\n방문객분들께 피해를 드렸네요. 죄송합니다~\r\n9번 10번 잡으시는분들은 참고해주세요~\r\n중간에 계곡 내려가는 길입니다.", "author": "캠퍼217760", "date": 1755578071447, "zone": "파쇄석", "site": "10-계곡앞", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000011559_fcff123684.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000011559_fcff123684.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000011502_dac64569e6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000011502_dac64569e6.jpg"}]}, {"source": "camfit", "text": "작년에는 5월달에갔다가 올해여름에다시가자생각하고 갔다왔는데...\r\n아이가너무좋아했어요 수영장과 미끄럼들과  계곡도갈수있고요\r\n아이들놀이방도  깨끗하고 시원해요\r\n캠장님과 관계자분들도 너무친절하세요^^\r\n내년에도  또갑니다^^\r\n서울에서도1시간거리라서   가깝고  좋아요  시설도 리모델링 해서 깨끗해요\r\n아이들과같이 가기에는 너무좋습니다^^\r\n아이들만의시간도같고 어른들만의시간도같고  좋았어요^^", "author": "나하맘^^", "date": 1755427740519, "zone": "데크", "site": "12", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "재밌게 잘 보내고 왔네요 시설이 노후된감은 있는데 그렇게 불편하진 않았습니다 재방문 의사 있습니다", "author": "캠퍼706260", "date": 1755313531456, "zone": "파쇄석", "site": "03-계곡앞", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000023345_e5e9cb18f0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000023345_e5e9cb18f0.jpg"}]}, {"source": "camfit", "text": "큰수영장으로 아이들이 원없이 물놀이 즐겼답니다~ \r\n아이들 놀거리도 많고 다 좋았는데~~\r\n개미가 너무 많았어요ㅠㅠ", "author": "캠퍼530275", "date": 1755228287844, "zone": "파쇄석", "site": "28", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "피크닉이용했는데 너무 좋았습니다 :)", "author": "초코파이맘", "date": 1754794694294, "zone": "계곡수영장 2팀전용", "site": "38", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "3년연속 다니는데~아이들데리고 가볍게 놀기좋아요. 물놀이하고 고기구워먹기 편해요. 작년대비 화장실, 샤워실은 약간 깨끗해진것같아여. 리셉센이랑 수영장안전가이드분은 친절하세요. 올해는 계곡에 물이 좀 많아졌네요.", "author": "유저 비공개", "date": 1754576333315, "zone": "계곡수영장 피크닉", "site": "15", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1753851947427_1f42b9243e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1753851947427_1f42b9243e.jpg"}]}, {"source": "camfit", "text": "적당한 가격에 잘놀다 왔어요 재방문 의사 있습니,다", "author": "캠퍼28139", "date": 1754545316487, "zone": "계곡수영장 피크닉", "site": "09", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000025050_422cbc7bb8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000025050_422cbc7bb8.jpg"}]}, {"source": "camfit", "text": "너무좋아요! 아이들이 놀만한곳이 넘많아서 즐기기좋았어요. 저희사이트는 나무로 그늘이 많은편이구요. 아침엔 해가들고, 오후에는 완전 그늘이에요! 수영장엔 피크닉 즐기러오신분들이 너무 많아서, 못놀았구요. 대신 그늘로 햇빛이들지않는 뒤쪽 계곡에서 물고기잡고 놀았어요! 안내데스크에서 골뱅이랑 치킨도 팔아서 맛나게먹었어요! 에어컨 나오는 놀이방도있습니다! 넘좋은 피서지네요!", "author": "마공자", "date": 1754269923037, "zone": "파쇄석", "site": "07-계곡앞", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000108545_2f029f3071.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000108545_2f029f3071.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000108525_cea34e2954.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000108525_cea34e2954.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000108521_0b069dad32.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000108521_0b069dad32.jpg"}]}, {"source": "camfit", "text": "비가 정말 많이 온날 첫 우중캠핑 목적으로 방문했는데\r\n거짓말처럼 텐트접는날은 해가 쨍쨍했네요\r\n송천캠핑장 옥수수 최고에요!!! \r\n파쇄석 방문했는데 개수대 화장실 모두 가깝고 좋았습니다!", "author": "캠퍼836877", "date": 1754231222177, "zone": "파쇄석", "site": "04-계곡앞", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754230831779_de36aeb715.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754230831779_de36aeb715.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754230831651_ea543ef761.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754230831651_ea543ef761.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754230832223_bfd9fa58f2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754230832223_bfd9fa58f2.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754230831581_827d6179e6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754230831581_827d6179e6.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754230832099_21f3013409.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754230832099_21f3013409.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754230832157_f1dc12ee69.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754230832157_f1dc12ee69.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/2025_08_03_23_21_f1e10eb4da.mp4", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/2025_08_03_23_21_f1e10eb4da.mp4"}]}, {"source": "camfit", "text": "어른들이 타도 재밌는 미끄럼틀이에요😂\r\n캠핑장도 관리가 잘되고있고 수영장,계곡까지\r\n모두 만족스러웠습니다!\r\n필요한 제품들은 합리적인 금액으로\r\n매점에서 구매가능하며 이번달 또 예약되어 있습니다ㅎㅎ", "author": "캠퍼836877", "date": 1754230399376, "zone": "데크", "site": "12", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/2025_08_03_18_55_3d889c7f8b.mp4", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/2025_08_03_18_55_3d889c7f8b.mp4"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754214935950_771619c287.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754214935950_771619c287.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754214949480_d2c46b0f69.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754214949480_d2c46b0f69.jpg"}]}, {"source": "camfit", "text": "집이랑가까워서 자주가요\r\n성수기 캠핑에 수영장까지 해서 65면 저는 괜찮은것 같습니다.\r\n데크쪽에 화장실 새로 리모델링  해서 괜찮은거같아요.\r\n방가로도 싹 리모델링 하셨더라구요.\r\n전기는 600와트 넘기면 바로 차단기 떨어집니다.   제가 갖고있는게  600이넘는지 계속떨어졌어요. 싸이트에 쓰레기가 좀 있는데 \r\n그부분좀 신경써주시면 더 좋을것같아요.\r\n그리고  매점 소주2500원 너무좋아요", "author": "캠퍼1678", "date": 1754208655458, "zone": "파쇄석", "site": "15-계곡앞", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1754185673229_10429a334e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1754185673229_10429a334e.jpg"}]}, {"source": "camfit", "text": "수영장도 무료로 이용할 수 있고 사이토 엄청 넓어서\r\n잘 즐기고 왔어요.\r\n한여름 열대야를 못 느낄정도로  시원하게 잤어요.^^\r\n다시 가고싶은 캠핑장 이였어요.^^", "author": "캠퍼559212", "date": 1754112894695, "zone": "파쇄석", "site": "15-계곡앞", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7955_1f307a44cb.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7955_1f307a44cb.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/dji_fly_20250802_074804_837_1754088511749_photo_optimized_c44ff056df.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_dji_fly_20250802_074804_837_1754088511749_photo_optimized_c44ff056df.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/dji_fly_20250802_074314_832_1754088489835_photo_optimized_ab5a43d542.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_dji_fly_20250802_074314_832_1754088489835_photo_optimized_ab5a43d542.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7948_8a30b79cd5.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7948_8a30b79cd5.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7946_7bf9d242c7.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7946_7bf9d242c7.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7932_c816d02cdb.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7932_c816d02cdb.jpeg"}]}, {"source": "camfit", "text": "사장님 친절하시고~\r\n파쇄석도 넓고 좋았습니다\r\n화장실도 샤워실도 만족했어요\r\n다음에 또 오고 싶은 캠핑장이에요...^^", "author": "캠퍼626440", "date": 1754108574018, "zone": "파쇄석", "site": "12-계곡앞", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "좋은 점.\r\n1.사진으로 보면 수영장과 파쇄석 사이트 거리가 멀어 보였는데 가까워서 좋았습니다. \r\n2.수영장이 매우 넓고 깨끗함. 미끄럼틀까지 있으니 애들의 만족도가 매우 좋았어요!\r\n\r\n아쉬운점.\r\n1.샤워실만 리모델링 된다면 정말 좋을 거 같아요.", "author": "캠퍼823323", "date": 1750774823635, "zone": "파쇄석", "site": "26", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "계곡이 바로 옆에 있어 물소리가 너무 듣기 좋았어요\r\n수영장에 들어간 아이들은 나올 생각을 안해 3시간 연장하고 원없이 수영하고 가려고요\r\n사장님도 친절하시고 시설도 괜찮고 온수도 잘나옵니다\r\n자주 와야겠어요", "author": "캠퍼829131", "date": 1750734349385, "zone": "파쇄석", "site": "03-계곡앞", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000013796_a48e79c587.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000013796_a48e79c587.jpg"}]}, {"source": "camfit", "text": "너무 좋았습니다~ 시설이 전체적으로 나쁘지 않고요 수영장 옆에서 삼겹살이라니 ㅎㅎ \r\n바로옆엔 계곡이 흐르고 아이들 놀기에도 참 좋습니다 또 방문할 의사 있습니다!!", "author": "유저 비공개", "date": 1750597041476, "zone": "계곡수영장 피크닉", "site": "09", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018295_aed1088cbc.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018295_aed1088cbc.jpg"}]}, {"source": "camfit", "text": "아이와 함께 다녀왔어요. 시설은 오래됐지만 관리를 잘 해주셔서 불편함없었어요  특히 수영장과 슬라이드 넘 좋았고 정말 신나게 놀았어요. 여자 사장님 정말 친절하시고 슬라이드에서 장난치거나 안전수칙 안지키는 어린 친구들 못하게 하기도 하셨어요.  텐트바꾸고 첫 캠핑이라 정말 힘들었는데 힘든만큼  좋은 캠핑장 만나서 마무리 넘 잘하고 왔습니다. 양쪽으로 그룹캠을  하는 팀이었는데 한팀은 정말 아이들 관리 잘하며 매너 잘 지키시고 한팀은  정말.. 아이들소리 우는소리  혼내는소리는 이해합니다. 그런데 애들 재운다고 어른 목소리가 더크고 애들 잠들고나서 어른들 말소리... 10시부터 매너타임이지만 11시반까지 쉴새없이 이어지는 말소리..  옆텐트에 목소리가 얼마나 크게 들리는지 모르시는듯해요. 그래도 사장님이 매너타임 관리를 하셔서 12시쯤 조용해 진것 같아요. 선배님들 말처럼 진짜 옆자리를 어떤팀을 만나는지가 관건이라 하더니 정말 확실히 느끼고 왔습니다. 무튼 캠핑장은 넘 좋았어요. 아이가 또 가자해서 곧 다시 가려고합니다~~~", "author": "캠퍼812200", "date": 1750032045919, "zone": "파쇄석", "site": "11-계곡앞", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "할말 정말 많지만\r\n\r\n1.매너타임관리 X\r\n10시, 11시 소등 적혀 있으나 의미없음\r\n시끄러워서 잠 못잤음\r\n\r\n2.화장실 겸 샤워실\r\n소변1. 대변2, 샤워기2\r\n더운 날 남여 모두 줄서서 계속 대기\r\n기다리다 지침\r\n샤워 후 화장실 좁아서 다시 지침\r\n땀법벅 됨 ㅜㅜ\r\n\r\n3. 물놀이 안전관리자가 따로 있었으면\r\n\r\n멀지 않아서 가벼운 맘으로 갔으나\r\n담에 또 가지는 못 할듯", "author": "유저 비공개", "date": 1749966839909, "zone": "파쇄석", "site": "07-계곡앞", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "매너타임 핑계로 10시에 샤워실을 자물쇠로 잠그시고 계수대도 사용못하게 하고 사용했다고 처음 와보냐고 화내시고 어이없음 ...\r\n10시 이후 매너타임 적용하면서 사이트내에 뛰어다니고 소리지르고 술먹는건 단속안함.. \r\n앞뒤가 맞지않음", "author": "유저 비공개", "date": 1749966732174, "zone": "파쇄석", "site": "03-계곡앞", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "즐겁게 잘 다녀왔습니다", "author": "유저 비공개", "date": 1749875234340, "zone": "파쇄석", "site": "08-계곡앞", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "여름엔 이곳입니다^^ 수영장도 너무 잘 이용하고 화장실도 깔끔하게 청소 자주 해주시는거 같아요~! 그리고 무엇보다 친절하십니다^^", "author": "캠퍼596901", "date": 1749779123182, "zone": "파쇄석", "site": "08-계곡앞", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000017135_ae94ec142e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000017135_ae94ec142e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000017127_30f9b67925.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000017127_30f9b67925.jpg"}]}, {"source": "camfit", "text": "여긴 여름에 와야하는 거였어요\r\n수영장이 광활하네요~~\r\n서울과 가깝고\r\n매점에 있을게 다있고, 사장님이 음식을 판매하십니다 \r\n 매점과 주방이 함께있는 ㅋ \r\n1번사이트라 화장실 가깝고\r\n계곡에 들어가있는아이도 잘보이고\r\n토끼랑  닭도 있어요 ㅋ\r\n매점엔 예쁜 새도있고요\r\n꼬부랑 길을 가야하는게 어렵지만 서울근교 이렇게 좋은 캠핑장이~~", "author": "캠퍼102958", "date": 1749376549994, "zone": "파쇄석", "site": "01-계곡앞", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "기대했던것보다 훨씬 좋았어요 또 가고싶어요\r\n여자사장님 너무너무 친절하고 따수우세요\r\n고마웠어요♡", "author": "캠퍼68307", "date": 1749289265126, "zone": "계곡수영장 피크닉", "site": "08", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "회장실과 샤워실을 개선하면 더 좋을 것 같아요", "author": "캠린76", "date": 1748923894893, "zone": "데크", "site": "08", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "다녀온지 오래됐는데 제가 갔늘때는 매너타임이 잘 안지켜졌습니다", "author": "지니맘1620", "date": 1748870323328, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "저는 데크에 2박3일 있었는데요. 낮에는 맞은편 족구장에서 울리는 고함소리,확성기 사이렌 소리로 정신이 없구요 데크가 연결되어있다보니 누가뛰기라도 하면 그소리가 그대로 전해져요. 각 자리마다 전용계단이있는데도 왜 제쪽 계단을 이용하는지 이해불가..", "author": "유저 비공개", "date": 1748776656933, "zone": "데크", "site": "03(계곡앞)", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "작년 여름 당일 피크닉(물놀이)으로 다녀갔는데, 깔끔하고 좋았어요.. 올해도 무더위 아이를 위해 준비해보려고요..ㅎ", "author": "유저 비공개", "date": 1747917089409, "zone": "계곡수영장 피크닉", "site": "22", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "사장님이 친잘하시고 계고옆이라 좋습니다", "author": "유저 비공개", "date": 1747546263482, "zone": "데크", "site": "02(계곡앞)", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "사이트도 넓고 조용하니 가족 캠핑하기 좋았어요~", "author": "크라우드", "date": 1747384106239, "zone": "파쇄석", "site": "22", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "서울에서 가까워 진입하기 좋았고, 파쇄석이 두툼하고 강자갈처럼 동글동글해 좋았습니다.\r\n화장실은 매일 새벽부터 정리해주셨고, 샤워실만 리모델링하면 정말 좋을꺼 같습니다.\r\n매너타임도 잘 지켜지는 캠핑장이였습니다.\r\n계곡 수위는 낮았지만 올챙이 잡으며 아이들과 즐겁게 보냈습니다. 2박동안 장작만 3망 태우고 왔네요^^", "author": "밥돌이아빠", "date": 1746579354766, "zone": "파쇄석", "site": "10-계곡앞", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000051211_39c34d55a7.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000051211_39c34d55a7.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000051209_c8ea98e8cb.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000051209_c8ea98e8cb.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000051235_feee64db9a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000051235_feee64db9a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000051202_1773923d7e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000051202_1773923d7e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000051218_859ae38660.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000051218_859ae38660.jpg"}]}, {"source": "camfit", "text": "사이트넓고 이동동선 짧아서 좋아요~~\r\n이웃 잘못만나서 둘째날 좀 힘든거말곤 좋았습니다!\r\n6월에 수영장 오픈한다고해서 또 예약했어요^^\r\n개수대,샤워실 뜨거운물 잘 나오고 어린이 실내놀이방있어서 특히 좋아요!", "author": "유저 비공개", "date": 1746539663780, "zone": "파쇄석", "site": "27", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "사이트 갯수가 많은데 비해 화장실, 샤워실이 \r\n두칸씩밖에 없어서 좀 불편했어요.\r\n거의 대부분 가족단위로 왔는데 아이들이 줄서서\r\n기다린적도 있어서 큰볼일은 눈치보였네요ㅋㅋ\r\n그래도 사이트 주변 환경도 깨끗하고 벌레없고 \r\n나무그늘도 있어서 시원하고 좋았어요\r\n매너타임도 잘 지켜져서 즐겁게 잘 놀다왔습니다.", "author": "캠퍼108992", "date": 1746492832247, "zone": "파쇄석", "site": "18", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7441_4d2e0b0f33.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7441_4d2e0b0f33.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7440_62fa7dde23.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7440_62fa7dde23.jpeg"}]}, {"source": "camfit", "text": "화장실은 대체로 깨끗하나 좁은편이였고, \r\n여자 샤워실은 삼발이로 문이 계속 열려있는 상태고, 3명이서 나란히 설 수 있는 조금은 좁은 샤워실로 깨끗하긴 했습니다. \r\n바로 옆이 아이들 노는 곳이여서 무척이나 시끄러웠습니다\r\n예약한 데크 옆집에 아이가 있었는데 매너타임 무시하고 시끄럽게 소리지르는데도 아무도 말리지 않아 괴로웠습다..", "author": "유저 비공개", "date": 1746349725450, "zone": "데크", "site": "09", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7859_4bbfd0cf65.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7859_4bbfd0cf65.jpeg"}]}, {"source": "camfit", "text": "닭소리 주변공사소리 요양원 불빛 때캠 시설의 낙후\r\n온수는 미온수 고객용 냉장고 없어 장박은 안될 것 같아요\r\n뭐만 물어보면 어이 없어 하는 젊은 남자 사장님 불친절 \r\n캠장의 중요성 깨우치며 갑니다", "author": "유저 비공개", "date": 1746331637431, "zone": "파쇄석", "site": "14-계곡앞", "season": "spring", "numOfDays": 3, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3329_9c3f8fb964.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3329_9c3f8fb964.jpeg"}]}, {"source": "camfit", "text": "매번 찾는곳이예요. 캠핑하기 편하고 싸이트도 넓고 조용해서 자꾸 오게되네요~^^", "author": "유저 비공개", "date": 1746331113345, "zone": "파쇄석", "site": "09-계곡앞", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5571_3991a603f8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5571_3991a603f8.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5565_dda70f468d.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5565_dda70f468d.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5572_b05f15973f.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5572_b05f15973f.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5587_516aa601ef.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5587_516aa601ef.jpeg"}]}, {"source": "camfit", "text": "사이트 넓고 계곡 물소리에 힐링 많이 했습니다", "author": "봉팔군", "date": 1746010265259, "zone": "파쇄석", "site": "05-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "좋아요^^~닭들만 새벽에 울지않으면", "author": "캠퍼331971", "date": 1745227387952, "zone": "파쇄석", "site": "07-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "데크가 이어져있어서 옆에서 움직일때 울리더라두요 ㅜㅜ 바로 옆 데크 2번 사람들이 너무 무매너고 저희 계단을 차로 막아두고 철수할때도 선이랑 다 넘어서 정리하고 아침 저녁으로 애기들을 울고 너무 최악이였어요 ㅠㅠ 사장님은 너무 친절하고 좋았는데 아쉬웠어요 ㅠㅠ", "author": "유저 비공개", "date": 1739686662649, "zone": "데크", "site": "01(계곡앞)", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "조용히 잘 보내고 왔습니다. 놀이시설도 괜찮고 애들도 좋아했어요", "author": "우리아빠yo", "date": 1736167470698, "zone": "데크", "site": "06", "season": "winter", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8100_ad7e10bc85.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8100_ad7e10bc85.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8105_8e0d6f2712.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8105_8e0d6f2712.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8106_810cd807c8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8106_810cd807c8.jpeg"}]}, {"source": "camfit", "text": "조용하고 한적하니 좋아요\r\n장박이 많은데 이유가 있어요 사장님의 배려에 잘 다녀왔습니다", "author": "캠퍼37265", "date": 1735451138440, "zone": "파쇄석", "site": "22", "season": "winter", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20241228_211653_c3221a61cc.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20241228_211653_c3221a61cc.jpg"}]}, {"source": "camfit", "text": "친절하시고 개수대 따뜻한물 콸콸 잘나오구요\r\n힐링 잘하고 왔습니다\r\n다음에 또 방문할 예정입니다", "author": "캠퍼566752", "date": 1733197281044, "zone": "파쇄석", "site": "11-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "가족들과 친목도모 하기 좋았어요.", "author": "캠퍼673603", "date": 1733180820313, "zone": "방갈로", "site": "03번", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "괜찮았어요~^^ 아이들 놀 놀이시설들도 적당하고, 수영장도 있어 여름에 또 이용할 계획입니다. 사장님도 친절하시네요!", "author": "유저 비공개", "date": 1732442946323, "zone": "파쇄석", "site": "26", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "단풍이 이쁘게 들고 있는 캠핑장이였어요~\r\n화장실이 새건물(매점건물)에도 있어요.\r\n화장실 사람있으면 건물로 가면 되더라구요.\r\n건너편 캠핑장에 고성방가 하는 빌런있어서 사장님께  문자드렸는데 늦은시간에도 답변 잘 주셨습니다~  처음에 갈때보다 갈수록 맘이편한 캠핑장 입니다\r\n아 전기는와트수 칼같아서 대비잘해가셔야 합니다", "author": "캠퍼1678", "date": 1728799950362, "zone": "파쇄석", "site": "16", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3296_edd5e03943.JPG", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3296_edd5e03943.JPG"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_3298_b6517c68d0.JPG", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_3298_b6517c68d0.JPG"}]}, {"source": "camfit", "text": "사이트가 엄청 넓어서 좋고, 큰 나무도 있어서 좋아요~\r\n아이가 놀 수 있는공간있어서 좋았고, 노후된시설 관련 후기가 있어서 걱정했는데 관리는 잘 해주셔서 괜찮았어요\r\n다만 샤워실에 옷 놓는공간이 조금 불편해서 칸마다 플라스틱 바구니라도 하나씩 놔주시면 좋을것같아요^^\r\n10시되면 매너시간이라고 카톡이와서 그런지 매너시간도 잘 지켜졌구요\r\n경기도권은 차소리가 나서 시끄럽거나 목장있어서 똥냄새날수있는데 여기는 그런거 없어서 좋았어요~~파쇄석존 강추!", "author": "캠퍼425414", "date": 1728217672939, "zone": "파쇄석", "site": "26", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000037851_fd382df91b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000037851_fd382df91b.jpg"}]}, {"source": "camfit", "text": "조용히 잘쉬다 갑니다~~", "author": "집나오면 개고생", "date": 1728202916990, "zone": "데크", "site": "07", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "너무날씨도 좋았고 즐거웠어요~~같이간 일행은 텐트가 없어서 펜션 이용했는데 펜션도 있는지 처음알았네요 깨끗하고 아주 좋았습니다 잘 놀다가요", "author": "캠퍼670890", "date": 1728191433386, "zone": "파쇄석", "site": "09-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6592_67fd265766.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6592_67fd265766.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6591_5dbfe96c45.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6591_5dbfe96c45.jpeg"}]}, {"source": "camfit", "text": "시설은 조금  낡은  느낌이 있지만 \r\n청소를  깨긋히 해서 그런지  깔끔하고 \r\n좋아요   편히 쉬다가  갑니다 ~~\r\n차량 주차만 옆쪽으로  댈수있으면  조경이 잘 보여서  더 좋을거같아요", "author": "캠퍼661452", "date": 1727667476866, "zone": "파쇄석", "site": "23", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "청명한 가을날..\r\n예쁜 단풍 나무 아래..\r\n근거리에서 캠핑 잘 했어요~", "author": "캠퍼161830", "date": 1727595702902, "zone": "파쇄석", "site": "13-계곡앞", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040334_00b8202e30.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040334_00b8202e30.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040332_655d893790.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040332_655d893790.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040343_633c62b983.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040343_633c62b983.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040348_aa77bb662a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040348_aa77bb662a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040349_cad221e952.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040349_cad221e952.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040381_d3ca8ef354.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040381_d3ca8ef354.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040386_2df03a2b50.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040386_2df03a2b50.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000040396_9b0217badf.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000040396_9b0217badf.jpg"}]}, {"source": "camfit", "text": "수도권에서 가까워서 좋았고 아이들이 놀기에 좋은장소에요~\r\n주변에 관광지나 볼거 먹을것들이 많아서 좋았고 드라이브 코스로도 많이들 찾는곳이라 주변 시설들이 좋았어요!", "author": "캠퍼636878", "date": 1727064768993, "zone": "파쇄석", "site": "02-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "비바람이 많이불어 방갈로로 예약했어요~ 어린아이둘이랑 우중캠핑은 많이 힘든 기억있어서 ㅋㅋ  사이트 간격도 좁은편이기도해서요~ 방갈로는 난방과 에어컨이 있어 계절에 맞게 사용하기 좋고, 시설은 노후되었지만 너무 예민하지만 않으시면 아이들과 함께하기 좋습니다^^", "author": "유저 비공개", "date": 1726981620210, "zone": "방갈로(취사공간o)", "site": "3번", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "매번 파쇄석만 다니다 첫 데크였어요.\r\n결론적으로 전 파쇄석이 더 맞는거같아요.\r\n3팀이 같이쓰는 연결된 데크여서 밤에잘때 발소리 등 크게들렸어요. 그것빼고는.모두 괜찮!\r\n뒤에 계곡 바로 내려갈 수 있고, 몇계단 올라오는 사이트라 앞에 막는것 없고, 아이들 놀 수 있는 공간 있어서 좋았어요.", "author": "캠퍼392948", "date": 1726659552133, "zone": "데크", "site": "03(계곡앞)", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000019022_36b5033862.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000019022_36b5033862.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000019023_880d9f74f0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000019023_880d9f74f0.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000019024_e4cffdd24d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000019024_e4cffdd24d.jpg"}]}, {"source": "camfit", "text": "여기저기 알아보다가\r\n경치 좋고 물 좋고\r\n모든게 좋았습니다~^^\r\n아쉽게도 사진을 못 찍었네요", "author": "캠퍼420509", "date": 1726567656994, "zone": "계곡 당일캠프닉 ", "site": "07번", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "두번째방문이에요\r\n이번엔  다들  조용~한 분들이 오셨는지\r\n저녁되니  조용했어요 ㅎ\r\n\r\n화장실.샤워실이 조금은  신식으로  깔끔했으면하는  작은 소망이 있네요 ㅎ", "author": "캠퍼359910", "date": 1726550165152, "zone": "파쇄석", "site": "06-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000093494_3f64799d52.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000093494_3f64799d52.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000093481_44b3384f27.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000093481_44b3384f27.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000093449_c4b3723443.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000093449_c4b3723443.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000093511_b3a0d53440.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000093511_b3a0d53440.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000093667_4636282a25.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000093667_4636282a25.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000093664_912e2b1b5c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000093664_912e2b1b5c.jpg"}]}, {"source": "camfit", "text": "시람도 없고 시설도 괜찮았어요\r\n상당히 쾌적하고 캠핑하기 좋은 것 같습니다", "author": "유저 비공개", "date": 1725926382469, "zone": "파쇄석", "site": "01-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "캠핑장 사장님은 인상좋고, 자리도 좋았습니다. 하지만, 매너타임 지키지 않았고, 세벽까지 시끄러운 어른과, 우는 아이 때문에 날새고 집에서 잤습니다...", "author": "캠퍼651894", "date": 1725773889678, "zone": "파쇄석", "site": "28", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "계곡도 좋고 대부분 좋았습니다.\r\n개수대에 비치되어있는게 없어서 수세미랑 세제 등등 다 구비해가야해요! 매점에 얼음도 팔고 종류가 많아서 좋았습니다.\r\n엄청 깨끗하진않습니다. 불편할수있어요~\r\n모기향 준비해가세요(매점에도있긴함)~ \r\n물가라 벌레가 많습니다!\r\n데크가 망가진 부분이 있고 개미가 너무 많아서 살짝 아쉽긴했습니다ㅜㅎㅎ", "author": "유저 비공개", "date": 1725243142200, "zone": "데크", "site": "12", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000037336_43675aefcd.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000037336_43675aefcd.jpg"}]}, {"source": "camfit", "text": "집에서 가깝고 해서 자주 이용하는데...\r\n요새 왜 매너타임 관리가 안되는거죠? \r\n어제도 늦게까지 노래하는 옆집때문에 괴로웠습니다.\r\n부탁드립니다 ㅠ", "author": "캠퍼534416", "date": 1725168991038, "zone": "파쇄석", "site": "27", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "수영장 폐장을 적어놨어야지! 아오...공지 좀 띄우세요!", "author": "유저 비공개", "date": 1725166265259, "zone": "데크", "site": "07", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "많은 캠핑장을 다녀본 경험으로 느낌점은 비교적 이용에 만족할만 했습니다.\r\n굳이 사용자입장에서의 조언을 드리자면 샤워장에 샤워물품을 걸어둘수있는 배려가 다소 아숴웠습니다", "author": "캠퍼646462", "date": 1725166235545, "zone": "파쇄석", "site": "05-계곡앞", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "서울 근교 수영장 이용하기 좋아요.\r\n직원분들도 친절하시구요.\r\n다만 2인 기준으로 해 놓고 추가요금 받는 건 쫌..\r\n4인 기준으로 하거나 아예 요금을 올려서 받는게 낫지 않을까 싶어요.\r\n90% 이상이 가족단위인데 2인 기준에 추가 인원에 맞춰 추가요금 받는건 \r\n같은 돈 내더라도 뭔가 기분 상하는 느낌이에요.", "author": "캠퍼63479", "date": 1724833855395, "zone": "계곡수영장 피크닉", "site": "14", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/Kakao_Talk_20240722_162534410_15_6815a37739.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_Kakao_Talk_20240722_162534410_15_6815a37739.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/Kakao_Talk_20240722_162534410_20_8434018c9b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_Kakao_Talk_20240722_162534410_20_8434018c9b.jpg"}]}, {"source": "camfit", "text": "와 처음기억엔 좋은 기억으로 두번째 방문 했는데\r\n화장실에 너무 실망 하고 가네요\r\n갈때 마다 막혀있고 뚜껑열다 기겁ㅡㅡ\r\n샤워실도 너무 어둡고\r\n씻다 물 이 졸졸 나오다 세게 나오다 \r\n음... 두번째는 실망이", "author": "캠퍼637010", "date": 1724581027083, "zone": "계곡수영장 피크닉", "site": "31", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "주인장님도 친절하시고 수영장 이용이나 모든 시설이 가끔\r\n안좋은 후기를 보고  걱정햇는데 무난하니 괜찮아서 잼있게 잘 지내다가 왓습니다. 매너타임 이야기도 보이던데  운이엇는지 조은 분들 만나 조용히 잘지내고 왔어요. 한가지 불편했던건.. 개미가 너무 많아서 ㅜㅜ  어쩔수 없는 부분이라 감안하고 잘 지내고 왔습니다!!", "author": "유저 비공개", "date": 1724577664208, "zone": "파쇄석", "site": "03-계곡앞", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "사장님 친절하세요\r\n캠핑장은 좋아보여요 \r\n방갈로는 에어컨 이용하지 않을 날씨면 괜찮을거같아요", "author": "캠퍼602250", "date": 1724573887115, "zone": "방갈로(취사공간o)", "site": "2번", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "수영장 굿~\r\n옆에 계곡도 좋고 아이랑 오기 좋을것 같네요", "author": "Parkcamper08", "date": 1724452517994, "zone": "데크", "site": "04(계곡앞)", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000013622_08d968774f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000013622_08d968774f.jpg"}]}, {"source": "camfit", "text": "수용인원에비해 크기가 작아요…\r\n답답해요 앉아있으면…", "author": "유저 비공개", "date": 1724122493401, "zone": "계곡수영장 피크닉", "site": "09", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "자리가 너무 좁아요 ….대체적으로 작아요", "author": "유저 비공개", "date": 1724122409888, "zone": "계곡수영장 피크닉", "site": "11", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "리뷰보고 걱정했는데 너무좋았습니다. 파쇄석데크도 넓고 나무들이 많아서 편히쉬다왔어요~ 화장실 및 샤워실 리뷰보고 걱정되었었는데 수시로 화장실 관리해주시고 괜찮았습니다. 샤워실도 따뜻한물 잘 나오고 제 기준으론 괜찮았습니다. 수영장은 사람이 너무 많아 얼마 못놀았고 오히려 계곡서 재밌게놀았네요. 송사리도 잡고 재밌었어요.\r\n다음에 또 이용할께요!", "author": "캠퍼637051", "date": 1723964626732, "zone": "파쇄석", "site": "19", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "잘 놀다가 왔어요~ 수영장 은 그늘막이 있어서 좋았는데 벌레 나뭇잎이....둥둥\r\n화장실이랑 샤워장은 지저분해요.. 깨끗함은 포기하시는게...\r\n에어컨 틀어서 전기료를 추가적으로 받아요 참고하세요", "author": "캠퍼635240", "date": 1723961633401, "zone": "데크", "site": "11", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "별로예요..화장실 컨디션 최악\r\n샤워하다가 화딱지날뻔요\r\n물 수압은 어우.....수영은 잼있었지만\r\n그외에는 거미줄은 왜케 많나요..\r\n다음에는 안갈꺼같아요\r\n그리고 쓰레기 옆이라...방갈로라서 더 그랬을수도..\r\n있겠네요..방갈로는 비추비추비추비추", "author": "캠퍼577803", "date": 1723958259120, "zone": "방갈로(취사공간o)", "site": "3번", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "가깝고 좋은 캠핑장이라 생각합니다. 다만 매너타임 관리가 철저한 편은 아니라 간혹 옆자리 복불복이 있습니다. 피크 기간일때는 수영장 수질이 안좋아 보입니다만 어쩔수 없는 부분이겠죠~! 규모에 비해 샤워실이 작고 갯수가 적어서 살짝 불편한 수준이지만 캠핑왔는데 샤워실 있는게 어디냐는 느낌입니다. 사이트가 상당히 넓은 편이라 좋습니다. 옆의 계곡은 상태가 점점 안좋아져서 계곡에 대한 기대는 버리세요.", "author": "운빨이구할", "date": 1723952226126, "zone": "파쇄석", "site": "10-계곡앞", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "데크 조금 부서진 곳 있는데 사용하는데\r\n전혀 문제없고요 \r\n화장실은 조금 낡았지만 그럭저럭 쓸만하고요\r\n막 깨끗하고 시설 좋은 편은 아닙니다.\r\n수영장옆에 샤워실은 3칸 파쇄석쪽 샤워실 2칸 있는데\r\n대충 후다닥 씻는 정도는 괜찮습니다. \r\n\r\n수영장과 키즈놀이방 매점은 괜찮았습니다.  \r\n미끄럼틀 엄청 아이들 좋아하고요\r\n직원분들은 친절하십니다.\r\n아이들과 캠핑하는 분들은 꽤 만족할만합니다.  \r\n여성분들이나 민감한분들은 잘 고민해보세요.", "author": "유저 비공개", "date": 1723805840161, "zone": "데크", "site": "04(계곡앞)", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "방갈로는 오래된 에어컨 냄새나고요\r\n거미줄 벽에 죽은 벌레들  눅눅한 이불\r\n전기장판 들어와서 덜 꿉꿉했어요\r\n방갈로는 새로 단장 필요할 듯 하네요\r\n1박에 10만원인데 돈아깝.\r\n\r\n계곡옆이니  어느정도 벌레는 당연히 감안하시고요\r\n엄청 많은 정도는 아니라 괜찮았어요\r\n관리하시는 분들은 친절하시고 잘 안내해주십니다.", "author": "유저 비공개", "date": 1723805407351, "zone": "방갈로(취사공간o)", "site": "3번", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "아이들 놀기 넘 좋아욧~ 계곡에 수영장에~ 파전 굿!", "author": "유저 비공개", "date": 1717916579607, "zone": "파쇄석", "site": "10-계곡앞", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "수영장 너무너무 재밌게 놀다왔어요~~\r\n방갈로는 비추요..ㅜㅜ\r\n들어가자마자 팡이냄새가... 문 다열고 환기시키는데도 냄새때문에 머리가 아프더라구요..\r\n이불에도 곰팡이에 눅눅을 넘어서 축축할정도였어요\r\n이럴줄알았음 이불을 챙겨갔었어야했는데....ㅠㅠ", "author": "찡구", "date": 1717823813601, "zone": "방갈로(취사공간o)", "site": "2번", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240608_141427_c15125ef5a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240608_141427_c15125ef5a.jpg"}]}, {"source": "camfit", "text": "집에서 가깝고 계곡에서 잘 놀았어요. 올챙이 잡고 계곡에서 잘 놀았고 싸이트가 넓어서 좋았어요. 모기나 날벌레가 거의 없어서 좋네요. 화장실이 샤워실이 2칸씩만 있는것만 아쉽고 놀기 좋았어요.", "author": "캠퍼394177", "date": 1717598698318, "zone": "파쇄석", "site": "25", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "5살 아이랑 계곡에서 올챙이도 잡고 잘 놀았어요. 사이트가 넓어서 좋네요.", "author": "캠퍼394177", "date": 1717598430039, "zone": "파쇄석", "site": "25", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "송파에서 1시간반 걸리는곳인데 산에둘러 쌓여있고,\r\n새소리 계곡물흐르는 소리 좋아요~^^\r\n다만 새벽부터 닭울음소리에 잠을 좀 설쳤네요~~;;;;\r\n가까워서 2주연장 찾아왔네요~~\r\n아직은 좀 추워서 수영장을 조금밖에 이용못해서 아쉬웠네요~~", "author": "하민하이맘", "date": 1717329253792, "zone": "파쇄석", "site": "09-계곡앞", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000005861_485f20340a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000005861_485f20340a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000005848_e03e8a1257.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000005848_e03e8a1257.jpg"}]}, {"source": "camfit", "text": "매너타임 잘 지켜지고\r\n\r\n통합데크 1 ~ 4번은 단체가 좋을듯 해요...\r\n사람들이 수시로 왔다갔다 하니깐\r\n데크소음이 계속 들리고 울려요..\r\n\r\n그외엔 다 좋았습니다\r\n특히 사장님 엄청 친절하세요", "author": "인천❤️만두", "date": 1716983638169, "zone": "데크", "site": "03(계곡앞)", "season": "spring", "numOfDays": 3, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_2267_875ab50b47.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_2267_875ab50b47.jpeg"}]}, {"source": "camfit", "text": "여름을 사원하게 보낼수 있는 곳 \r\n오래된 사이트라 관리는 잘 안되어 있지만\r\n편하게 쉬다 올수 있는곳\r\n아이들이 편하게 놀수 있는 환경이 되어있습니다.", "author": "유저 비공개", "date": 1716857971416, "zone": "데크", "site": "04(계곡앞)", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "아들이 근처 경기가잡혀서 갑자기 예약하게 되었는데 \r\n생각보다 좋았습니다~\r\n나무도 우거지고 계곡물도 얕게 나마 있고 그네 방방이 토끼 도있고 수영장 오픈하면 가까워서 한번 더 오고싶을거같아요~\r\n가족단위라 매너타임도 잘지켜져서 조용해서 좋았습니다.\r\n28번은 바로옆에 분리수거가 있어서 너무아침일찍 재터는것만 빼고는 단독으로 사용하고 괜찮았어요~~\r\n화장실도 가깝고~마장호수도 가까워서 산책하고 집에왔는데도~\r\n2시가안되어서 여유롭고 좋았습니다~!\r\n또방문하겠습니다~!!", "author": "하민하이맘", "date": 1716717078577, "zone": "파쇄석", "site": "28", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000005505_225cbf5818.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000005505_225cbf5818.jpg"}]}, {"source": "camfit", "text": "사장님들도 친절하고 관리도 잘되어서 넘 좋아요..^^\r\n강가 옆이라 그리 덥지도 않아서 만족합니다..^^\r\n잘 쉬다 왔습니다..^^", "author": "캠퍼468802", "date": 1716703551233, "zone": "파쇄석", "site": "03-계곡앞", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000002468_2c202fa15a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000002468_2c202fa15a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000002467_47e5574ad6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000002467_47e5574ad6.jpg"}]}, {"source": "camfit", "text": "놀이방이 있어서 아이들이 잘 놀았어요\r\n수영장 개장하면 가보고싶네요~~^^\r\n나무가 많아 공기가 다르네요~~^^", "author": "유저 비공개", "date": 1716306057998, "zone": "파쇄석", "site": "13-계곡앞", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000007457_862c7dfa39.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000007457_862c7dfa39.jpg"}]}, {"source": "camfit", "text": "다 좋았는데 데크가 너무 울렁울렁 거려서 ㅜㅜ 잘때 옆 사람 좀만 뒤척거려도 지진난거 같았어요 ㅜㅜ\r\n데크 수리를 해야될것 같더라구요.. ㅜㅜ", "author": "캠퍼203699", "date": 1716177471301, "zone": "데크", "site": "01(계곡앞)", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "일찍 가면 추가요금 있습니다.\r\n사이트는 넓어서 개인적으로 좋았고, 사이트가 넓은 만큼 가족단위 친구캠퍼들이 2사이트 예약하여 매너타임은 잘 지켜지지 않았습니다.\r\n시설 관리가 잘 되었지만 화장실, 샤워실이 노후화된 시설이였습니다.", "author": "유저 비공개", "date": 1716117289895, "zone": "파쇄석", "site": "06-계곡앞", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010497_11df4cce3a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010497_11df4cce3a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010469_c187b52ddd.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010469_c187b52ddd.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010449_1c973453df.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010449_1c973453df.jpg"}]}, {"source": "camfit", "text": "두번째 방문인데 캠핑장에서 만난 아이들과 같이놀수 있는 실내 놀이터가 있어 넘 만족합니다! 그리고 첫 방문시 몰랐던 계곡에서 올챙이, 물고기도 잡고 시원하게 놀았네요~", "author": "캠퍼331592", "date": 1716116460424, "zone": "데크", "site": "11", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "우선 사이트끼리 너무 좁지는 않아서 괜찮았습니다.\r\n그리고 제일 중요한 전기사용~\r\n순간전력 600w …계곡있어서 아직 저녁엔 춥더라구요\r\n아이가잇어서 전기장판 작은거랑 손바닥만한 미니히터 키는데 전기떨어져서 추가요금내고 이박했습니다.\r\n미리 이정도로 떨어지는걸 알았더라면 대비를 하거나 \r\n추가요금(1박5천원) 냈을텐데 밤에 그래서 ..\r\n전기들어오는줄알고 있다가..잘때들어가보니\r\n너무추워서 전화드렸습니다.추가하니 안떨어지네요\r\n열이오를때까지 텐트가너무추워 아이랑 힘들었습니다", "author": "유저 비공개", "date": 1716104595821, "zone": "파쇄석", "site": "08-계곡앞", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "소소한게 잘 지냈어요~방방이, 작은동물원등~", "author": "캠퍼331592", "date": 1716035851350, "zone": "파쇄석", "site": "19", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비가와서 금방 철수하긴했지만 한적해서 좋았어요.\r\n실내놀이터에 저희밖에 없어서 조카들이 재미있게 놀았습니다. 여름에가게 되면 수영장도 있고 또 계곡이 있어서 좋을거 같아요.\r\n시설은 조금 오래되긴했지만 계곡보고 가는거면 갈만한거 같아요.. 실내놀이터 아이들이 잘 놀긴했는데 미끄럼틀 뒤쪽부분은 먼지가 엄청나요. 그부분은 청소를 좀 해주시면 다음 이용객분들에게 좋을거 같아요.", "author": "유저 비공개", "date": 1715852347508, "zone": "계곡 당일캠프닉 ", "site": "08번", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "비는 많이 왔었지만 이틀 즐겁게 잘 쉬다갑니다", "author": "아오오", "date": 1715830592338, "zone": "데크", "site": "01(계곡앞)", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240505_112130_3a10f356b3.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240505_112130_3a10f356b3.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240505_085148_7bc424b252.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240505_085148_7bc424b252.jpg"}]}, {"source": "camfit", "text": "가까와서 자주 가고있어요~ \r\n파쇄 사이트 자리 넓고 옆에 계곡이 있어서 아이들도 너무 좋아합니다~ 자주 이용할게요!!", "author": "캠퍼534416", "date": 1715744105845, "zone": "데크", "site": "09", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "날씨운이  따르지않아서  비와함께했지만\r\n날좋을때  계곡에 내려도 가보고\r\n놀이방.트램폴린도  있어서 아이도 즐거워하고.. \r\n 괜찮았어요..\r\n\r\n다만.. 소등시간 한참후에도..떠들고\r\n  사이트내에서  전자담배를피는  이웃을 만나서\r\n좀 그랬지만\r\n캠장님께 연락드리니  왔다가주셨어 어요\r\n(그후로도 새벽1시반까지 시끄럽긴  했음)\r\n매너타임 관리는 잘해주시나\r\n따르지않았다는  ..ㅎ ㅎ\r\n\r\n아!  샤워장  칸막이는 있어서  좋았으나\r\n드라이기2개다   고장인지  작동하지않아서 무용지물이었어요", "author": "캠퍼359910", "date": 1715088857389, "zone": "파쇄석", "site": "21", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000080417_00a7ac0f06.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000080417_00a7ac0f06.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000080437_09c774e6be.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000080437_09c774e6be.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000080522_585d652e4d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000080522_585d652e4d.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000080533_c36901de71.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000080533_c36901de71.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000080548_786d17e331.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000080548_786d17e331.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000080578_29ba22e972.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000080578_29ba22e972.jpg"}]}, {"source": "camfit", "text": "이번캠핑비가  많이 왔지만 정말좋았어요 특히 저번 로그때 화장실시건장치 수정부탁드렸는데 빠른처리해주셔서 아내도아이도 즐거운 캠핑이 된것같아좋아요 조만간 재방문하겠습니다 감사합니다", "author": "후니72", "date": 1715065033432, "zone": "데크", "site": "05", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "2박 3일중에 절반 이상이 비가와서 아쉬웠지만, 아이들이 놀기에는 좋았고, 사장님이 친절했습니다. 다만 아쉬웠던 부분은 샤워시설과 화장실을 자주 청소하시는데도 시설이 낙후해 약간 불편했습니다.", "author": "탑캠퍼", "date": 1714983800786, "zone": "데크", "site": "02(계곡앞)", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000011416_6f426d0c09.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000011416_6f426d0c09.jpg"}]}, {"source": "camfit", "text": "토끼,새도 있어서 애들이 좋아했어요\r\n수영장은 6월 오픈이고 사장님 친절하세요\r\n피크닉 자리 넓고 수영장 주변 자리는 단차가 없어서 좀 불편할수도 있을거 같아요\r\n개수대도 깨끗하고 관리가 잘되는듯요", "author": "유저 비공개", "date": 1714901855715, "zone": "계곡 당일캠프닉 ", "site": "05번", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006912_c8178110eb.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006912_c8178110eb.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006919_1f9e724dc1.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006919_1f9e724dc1.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006923_761e94f609.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006923_761e94f609.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006935_5e31fe7f26.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006935_5e31fe7f26.jpg"}]}, {"source": "camfit", "text": "사장님 친절하고 사이트 컨디션 좋았고, 화장실과 개수대는 노후되긴 했지만 수시로 관리하셔서 깨끗했습니다~~", "author": "캠퍼450733", "date": 1714514229132, "zone": "데크", "site": "12", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "음 계곡 데크 1.2.3.4 눈 때캠 전용인가바용\r\n일단 통데크는 캠 하면서 첨 겪어봤어요 ㅋㅋ\r\n와..이거 이웃 잘못만나면  쌈 각인데(데크울림 다들 아실듯..)\r\n다행인지 불행인지 2.3.4가 때캠이셔서 좀 더 시끄러워주신덕에 막다녀도 되었어요 ㅋㅋ\r\n캠장에서 룸앤티비 볼륨100첨해봤네요 ㅋㅋ\r\n맞은편 분들껜 본의아니게 죄송했습니다-\r\n\r\n설비는 …음 데크말고 파쇄석은 안가바서 몰겠어요\r\n데크는 1.2.3.4 꼭 리모델링이든 새로하든 바꺼야해요 \r\n데크팩도 안들어가요 오징어 팩도 겨우 넣엇어요\r\n부식방지(?)처리도 안하신듯 데크가 썩어서 죄 튀어올라왓구요\r\n넘 튀어나온거에 벌걸려 다칠뻔요\r\n앞에는 개미가 득시글해서 가방 다 차로 피신시켰어요\r\n데크 올라가는 계단은 세칸인데 높아서 무릎 아팟는데 거기다 논슬립 패드 부착한게 반 이상떨어져서 큰소리가 납니다\r\n화장실도 남자화장실은 한칸에다가 심지어 불도 안켜지네요\r\n\r\n이런설비에 좋은리뷰 쥬신건 정말로 이해안가서 리뷰남겨요 다른분들 요즘 캠장 안가보셨나???__??\r\n같은 캠핑장비 내고 이런데 왓다가면 돈 아깝지 않나요?? 차라리 힘들어도 더 외각으로 나갈걸 했어요\r\n신기하군요 이런설비로 캠장에 비비려 하시다니 \r\n과연 여기 주인분들이 캠핑은 해보시고 운영하시는걸까\r\n진심으로 궁금했습니다\r\n막상 신생 캠장 아니라도 딴데 가보시면 양심시리실텐데 말이죠..", "author": "비니룽", "date": 1714297104605, "zone": "데크", "site": "01(계곡앞)", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9976_6437b6fd16.png", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9976_6437b6fd16.png"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9977_036ce69bf0.png", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9977_036ce69bf0.png"}]}, {"source": "camfit", "text": "집에서 너무가까웠어요~  편의시설과 가까운뽁에 자리집아 편하고 조용히 잘놀다욌습니다\r\n샤워장은 좀 아쉬웠고 4인기준이라 다자녀 아이3명인데 추가금 받더라구요 요부분만 아쉬웠네요~", "author": "모리맘🫶🏼", "date": 1713826450533, "zone": "파쇄석", "site": "28", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8582_1bc2bc3993.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8582_1bc2bc3993.jpeg"}]}, {"source": "camfit", "text": "시설이 전반적으로 낡았음. 여러팀 조인해서 오는 경우가 허다해서 시끄러운거 싫어하는사람한테는 별로일수도 있어요.\r\n앞사이트엔 4팀이 조인해서 왔더라는..\r\n방방이 덕에 아이가 신나게 잘놀긴 했어요.\r\n계곡보단 또랑 느낌이고 바로 옆 건물은 요양원..\r\n계곡뷰는 아니라고…..\r\n밤새 간판켜져있습니다 ㄷㄷ\r\n사이트내 가로등이 따로 없어요.", "author": "캠퍼179119", "date": 1713743066777, "zone": "파쇄석", "site": "15-계곡앞", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "편하게 잘쉬다왔네요~\r\n거름냄세가 조금 흠이네요", "author": "키이라이", "date": 1713680282537, "zone": "데크", "site": "06", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "22년도에 우연히 가본 송천..\r\n저는 편의시설 가까운걸 좋아해서 수영장데크로 자리했어요\r\n예민하지 않은편이라 사람들 지나다니는거,\r\n방방이소음 다 괜찮았어요\r\n아이들이 바로 옆에 노는게 보이니 되려 편했어요\r\n\r\n여름엔 화장실에서 냄새가 좀 났는데\r\n날이 시원해지니 괜찮더라구요\r\n2024년에 또 올게요~^^", "author": "황금거위", "date": 1713272528506, "zone": "수영장데크", "site": "J번", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006070_aa4c5969b8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006070_aa4c5969b8.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000006072_c5c6d55961.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000006072_c5c6d55961.jpg"}]}, {"source": "camfit", "text": "가까운거 빼고는.. 그닥.. ;;  넓은 듯 하면서도 난민캠 느낌이 나는 사이트.. 재방문 의사는 없음", "author": "캠퍼470800", "date": 1713088298446, "zone": "파쇄석", "site": "22", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000017602_d85298dc7f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_100001
