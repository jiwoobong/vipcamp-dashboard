퍼81715", "date": 1648025494441, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220318_140628_1974e1aa03.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220318_140628_1974e1aa03.jpg"}]}, {"source": "camfit", "text": "사이트에서 계수대까지 좀 멀어서 그렇지 다 좋았습니다", "author": "YNS대표", "date": 1647764126856, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/B86_B5_B68_5_A38_4_C3_D_B386_04658099_F10_D_a41817bcf0.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_B86_B5_B68_5_A38_4_C3_D_B386_04658099_F10_D_a41817bcf0.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/B4892403_D291_4_E3_F_9_EC_2_F2_AC_757_A5121_11da7c3c4b.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_B4892403_D291_4_E3_F_9_EC_2_F2_AC_757_A5121_11da7c3c4b.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/3_DC_9_C450_8_A61_4203_BE_97_C23378397_C3_C_85907c5dab.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_3_DC_9_C450_8_A61_4203_BE_97_C23378397_C3_C_85907c5dab.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/8_D798547_738_D_417_A_8_BD_5_0_BE_8_F2_F5_F2_A6_2a83168286.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_8_D798547_738_D_417_A_8_BD_5_0_BE_8_F2_F5_F2_A6_2a83168286.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/D9_B71232_16_C9_4965_B0_FC_095084146_A8_A_59637eefe5.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_D9_B71232_16_C9_4965_B0_FC_095084146_A8_A_59637eefe5.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/FEC_32738_196_E_4987_B8_AD_9816513_DEB_55_fbdedce706.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_FEC_32738_196_E_4987_B8_AD_9816513_DEB_55_fbdedce706.jpeg"}]}, {"source": "camfit", "text": "매너타임이 잘지켜지는 캠장이예요~", "author": "캠퍼30982", "date": 1647751869588, "zone": "데크", "site": "10", "season": "", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "매너타임 대부분 잘 지켜졌고,아이들 놀기에 좋아요~개수대는 따뜻한물 나오고 화장실은 따뜻한물 안나와요~", "author": "캠퍼70322", "date": 1646563681458, "zone": "데크", "site": "07", "season": "", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_20220306_155540_792_b8d2d1c41f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_20220306_155540_792_b8d2d1c41f.jpg"}]}, {"source": "camfit", "text": "작년 봄에 가고 일년만에 다시갔나봐요\r\n전에 파쇄석했을때 자리 넓어서 좋았는데 놀이방이랑 방방이 너무 멀어서 이번엔 데크해봤어요\r\n근데 놀이방을 안하네요?ㅎㅎ\r\n작년에 보니까 아는사람끼리 장박이 많아서 좀 시끄럽고했는데 데크쪽은 괜찮네요^^ 장박이 그래도 많은거같은데 애들이 조용한듯 😆", "author": "캠퍼17042", "date": 1646549175360, "zone": "데크", "site": "06", "season": "", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220305_194657_e87947a135.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220305_194657_e87947a135.jpg"}]}], "other_reviews": [{"source": "camfit", "text": "아르보리아는 항상 좋은 추억을 만들어 준 곳이에요!", "rating": null, "author": "이애기", "date": ""}, {"source": "camfit", "text": "사장님이 친절하시고. 설명이 자세하셔서 편하게 잘놀다갑니다.\r\n충주로 다시 오게된다면 꼭 다시 여기로오고싶네요.", "rating": null, "author": "캠퍼660252", "date": ""}, {"source": "camfit", "text": "반달곰숲아이들이 놀거리많고 동물도보고 좋아요 체험하는것도 많고 굿", "rating": null, "author": "캠퍼177857", "date": ""}, {"source": "camfit", "text": "시설 깨끗하고 아이 놀기 좋습니다\r\n즐겨찾는 캠핑장 입니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "리버뷰가 끝내줍니다. 낚시도 하시던데 다음에 도전해보겠습니다", "rating": null, "author": "캠퍼456487", "date": ""}, {"source": "camfit", "text": "작년 한글날 캠핑~\r\n만휴림 싸이트 아주 넓고 좋았습니다\r\n처음이었어요 이렇게 여유롭게 즐긴 캠핑이.. \r\n중딩도 초딩도 다 만족하는 수영장 일단 너무 좋구요,,\r\n뷰~캬~캠은 편의시설가까운게 최고라여기며 뷰는 늘 뒷전이었는데 와우~이런맛이군요..뻥뚫린 시야에 초록초록과 맑은 하늘..너무 너무 행복했습니다\r\n올 여름휴가는 여기!! 에용~~^^", "rating": null, "author": "캠퍼78663", "date": ""}, {"source": "camfit", "text": "진짜 너무 좋아요 !!\r\n매번 가는 캠핑장 입니다 강추 시설 너무 깨끗하고 너무 좋아요", "rating": null, "author": "캠퍼703930", "date": ""}, {"source": "camfit", "text": "모든게 완벽한 캠핑장!!! 개별화장실은 너무 깨끗하고\r\n사이트도 엄청넓음\r\n캠핑장에있는 강아지들도 사람좋아하고 강아지들이 뛰어놀수있는\r\n공간도있어 좋음\r\n새벽에 닭이 우는데 ㅋㅋㅋㅋ 저희가족은 그냥 그려려니해서 \r\n귀마개주시는데 안해도 잘잤음\r\n담에 또 가고싶은 캠핑장!!!", "rating": null, "author": "윤빵이", "date": ""}, {"source": "camfit", "text": "명당자리에 갔던 캠핑장중 최고였어요~~", "rating": null, "author": "캠퍼520299", "date": ""}, {"source": "camfit", "text": "시설 좋고 조용한 캠핑장이었습니다. 방문의사100%", "rating": null, "author": "방가루", "date": ""}, {"source": "camfit", "text": "생각보다 아담한 캠핑장이였어요~\r\n계단형식에 옆사이트에 방해없어 좋았구요~\r\n화장실이나 개수대도 가까웠어요~\r\n지붕(?)아래에서랑 데크위에서는 화롯대사용불가하니 참고해주세요~\r\n매점도 무인으로 운영되고 있는데 카드는 안되고 입금만 가능해요~~~\r\n날씨도 좋았고  근처에 갈만한 리스트도 알려주셔서 둘째날은 수타사랑 농촌체험마을까지 가서 구경갔어요\r\n또 가고싶어서 5월달까지 예약해버렸네요", "rating": null, "author": "키다리레몬", "date": ""}, {"source": "camfit", "text": "최고였습니다. 바닷가에 채집. 바다뷰. 날씨", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "처음 다녀왔는데 좋았습니다. \r\n아이들 놀거리가 많아요", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "풍경이 정말 멋져요.\r\n화장실 개수대 모두 깨끗하고 온수도 엄청 잘 나와요.\r\n샤워실도 탈의하는 공간은 함께 쓰지만 샤워 부스가 나눠져 있어서 좋았어요.\r\n걸어서 갈만한 거리에 카페도 있고 작은 마트도 있어서 편리했어요.", "rating": null, "author": "캠퍼90538", "date": ""}, {"source": "camfit", "text": "매너타임 없음 밤까지 중국인들 기타치고 소리치고 난리남 난생처음 경험함 ㅋㅋㅋㅋㅋ", "rating": null, "author": "캠퍼692023", "date": ""}, {"source": "camfit", "text": "너무 좋아하는 캠핑장입니다 머물수록울산바위의 기를 받는 느낌~~^^ 눈호강하며 즐거운캠핑하고 왔어요", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "예약하기 힘든 이유가 다 있는법이죠 잘 쉬었다 갑ㄴㄱ다", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "조용한 분위기 즐길수있는 캠핑장이예요\r\n매너시간도 잘지키고 시설도 깔끔해요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "너무 좋았어요  \r\n화장실깨끗하고 사이트넓고 바로앞 바다라 전망도 좋아았어요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "올해 첫 캠 어디로 가지 ~ 하다가 캠프더쉼 또 방문 했어요 ㅎ ㅎ 역시 언제와도 관리 정말 잘 되있고 사장님 너무 친절하셔요. 매점도 잘 되어있어서 급히 필요한것들 다 구매 가능하구요. 곧 또 봬요 ㅎ ㅎ", "rating": null, "author": "캠퍼880932", "date": ""}, {"source": "camfit", "text": "좋아요  작년갔던곳인데 이제  올리네요\r\n거의 전세캠 하고  왔네요 사이트 널찍 널찍하고  조용하게  잘 지내다  왔습니다\r\n뒷집 고양이 인지  고양이가  너무너무  귀여웠던  기억이  있어요 ^^", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋은 캠핑장이에요. 바다/갯벌 뷰이고, 바다보다 고도가 높은 층에 있어서 멀리 좋은 뷰를 감상할 수 있었어요.", "rating": null, "author": "캠퍼806200", "date": ""}, {"source": "camfit", "text": "비가와서 아쉬웠지만 ㅠㅠ\r\n화장실 샤워장 깔끔하니 너무 좋았습니다^^", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "뷰는 끝내줍니다\r\n사장님도 친절하시고 개별 화장실이라 편하고 씻고  지냈네요  사진이  별로 없네요  눈으로만  저장 했네요~~^^\r\n다시 가고 싶네요", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋아요 시설도 깨끗하고 캠장님도 너무 친절하시고 저희 강아지 마주치고 이뻐라 해주셔서 감사합다 . 저만 알고 싶은 캠핑장이라 소문 안났으면 좋겠지만 ㅠㅠ그만큼 만족 했습니다.조만간 또 방문할 예정이용 :) 덕분에 좋은 시간 보냈습니다!    감사합니다❤️", "rating": null, "author": "캠퍼941903", "date": ""}, {"source": "camfit", "text": "첫캠핑장소였습니다👍🏻\r\n집에서 가까워 좋았고 깔끔하니 좋았습니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "4번 사이트였는데 사람이 많이 없어서\r\n데크8번으로 옮겼어요.\r\n데크팩도 없었는데 캠장님 빌려주셔서 감사합니당~\r\n사람이 없어서 화장실 혼자쓰고. 개수대도 깔끔하고 \r\n나만 노래 틀어서 시끄럽고 분위기 좋았어요\r\n혼자라 낯가림 이슈로 캠프파이어 못나가고 \r\n알콜섭취로  잠을 잤어요.  훗\r\n담에 또 조용히 솔캠하러 방문하겠습니다~~~~", "rating": null, "author": "캠퍼385453", "date": ""}, {"source": "camfit", "text": "신생캠핑장인만큼 전체적으로 깨끗하고 정비되어있어서\r\n이용하는동안 너무 편하게 잘 쉴 수 있었습니다~\r\n사이트들이 약간의 계단식형태라서 공간분리도 좋고\r\n주변이 산으로 둘러쌓여있어서 계절별로 매력있을 것 같아요\r\n매점에도 등유를 포함해서 다양하게 준비되어 있고\r\n와이파이도 준비되어 있어 산속이라 데이터가 안터질 때\r\n연결해서 잘 사용했네요! 조만간 또 방문하려합니다!", "rating": null, "author": "캠퍼107782", "date": ""}, {"source": "camfit", "text": "아이들위한 이벤트도 있어 즐거웠어요 \r\n캠핑장도 여유롭고 맥주도 👍", "rating": null, "author": "캠퍼370880", "date": ""}, {"source": "camfit", "text": "첫 차박이었는데 너무 좋았어서 바로 다음주 또 예약했습니다.. ㅎ", "rating": null, "author": "캠퍼942114", "date": ""}, {"source": "naver", "text": "오토캠핑, 방갈로, 데크, 파쇄석, 수영장, 워터슬라이드, 바비큐장, 와이파이, 공용시설, 키즈테마, 계곡, 장기숙박, 개별바비큐, 침대방, 온돌방, 2인실, 가족실, 체험활동, 자연학습, 워터파크", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "사이트 정보: 사이트는 매우 넓고 프라이빗하며, 단독 사이트로 사용할 수 있을 만큼 공간이 충분합니다. 평상은 수영장을 둘러싸고 있어 넉넉한 공간을 제공합니다.", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "일단 사이트가 정 ~ ~ ~ 말 넓고, 단독 사이트라고 해도 될 만큼 프라이빗하다.", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "이용객끼리 구별된 평상을 사용해서 제일 편안해보였어요. 캠핑의자를 갖고오시면 입식으로도 이용 가능해요.", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "지금 할인받고 여행 떠나요! 국내숙소 총 15만원 할인 쿠폰팩! 양주캠핑장장박추천", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "마장호수출렁다리, 청정계곡, 풋살장, 어린이놀이시설, 매점, 개별바베큐 간단한안주류 , 하절기수영장", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "양주송천캠핑장 - 양주캠핑장, 장흥캠핑장, 마장저수지, 기산저수지, 경기도 캠핑장", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "양주송천캠핑장 다녀온 후기, 사실 캠핑장 사진은 없는 후기", "rating": null, "author": "", "date": "2025-12-10"}, {"source": "naver", "text": "지난주 송추에 위치한 양주송천캠핑장으로 2박 3일 캠핑을 다녀왔습니다. 이번 캠핑이 매우 스페셜했던게... 금-토는 솔캠, 토-일은 와이프와 아이가 함께한 캠핑 이였습니다. 솔캠... 저처럼 눈팅만 하시는분들!! 용기내서 올려주세요!! 볼거리가 필요합니다!! 아, 캠핑장 후기는 다시는 안갈랍니다^^; 다음 후기로 또 뵙겠습니다. 감사합니다.", "rating": null, "author": "", "date": "2025-12-10"}, {"source": "naver", "text": "아홉번째 캠핑 : 잠시 쉬어가는 1박2일 캠핑(양주 송천 캠핑장)", "rating": null, "author": "", "date": "2024-10-29"}, {"source": "naver", "text": "깃든헤비이불 넘 포근하고 가벼워요 ㅋㅋㅋ 캠핑장 모습 영상으로 담아보았어요 금요일의 비오는 캠핑장은 조용 그 자체 였어요 ㅋㅋㅋ 오후부터 슬슬 사람들이 들어오더라구요 송천캠핑장에는 실내 놀이방이 있어요~ 그래서 비가 와도 신나게 놀수 있다는 장점이!! 비가 오길래 잠시 여기서 시간을 보냈어요 ㅋㅋㅋ 가라 포켓몬!! 하는 동작...", "rating": null, "author": "", "date": "2024-10-29"}, {"source": "naver", "text": "경기 가볼만한 곳 :: 양주송천캠핑장, 펜션 :: 취사 가능한 대형 수영장에서 당일치기피크닉, 오토캠핑, 명당 사이트", "rating": null, "author": "", "date": "2025-08-29"}, {"source": "naver", "text": "무료 ■ 캠핑장 체크인 13시, 체크아웃 12시, 사이트 내 주차 양주송천캠핑장 도착 ! ! 마장저수지 둘레길 5분 거리에 위치해 있다. 길 따라 들어오면 관리실이 보이고, 체크인 하고 예약한 사이트로 가면 된다. 여기는 데크존 크기는 4 x 7m인데, 데크 사이즈가 작아 패스했다. 양주 핫플 송천 ㅎㅎ 관리실과 매점이 같이 운영되고 있는데, 2박3일 캠핑 하는 동안, 수영장 팔찌...", "rating": null, "author": "", "date": "2025-08-29"}, {"source": "naver", "text": "안녕하세요 : ) 올해 봄 즈음 다녀오고 여름캠은 패스되었고 간만에 캠핑을 가게되었어요 ㅎ 7-9일 양주송천 , 데크사이트로 잡았구요 4*7 크기더라구요! 쿠디 5.8에 타프 치려고 생각하고있었는데 요즘 날씨를보니 비비람이 불면 우짜지싶어서요.. 노스피크 퍼시픽오션으로 가져갈까 했는데 사이즈가 애매해요 세로 길이는 맞는데 가로길이가 20cm 부족합니다 ㅠ...", "rating": null, "author": "", "date": "2025-10-06"}, {"source": "naver", "text": "수영장+캠핑을 할 수 있는 양주 송천캠핑장에서 1박 2일 하지만…;;;", "rating": null, "author": "", "date": "2025-08-25"}]}, {"kid": "21036746", "name": "일영무두리캠핑장", "rating": 3.8, "review_count": 8, "naver_visitor": 0, "naver_blog": 0, "address": "경기 양주시 장흥면 유원지로 176-77", "distance_km": 4.8, "place_url": "http://place.map.kakao.com/21036746", "camfit_count": 121, "cf_reviews": [{"source": "camfit", "text": "올해 첫 캠핑했어요~~ 거리가 가까워서 다녀왔습니다\r\n깨끗한 풀타프존이라 너무 좋았어요 \r\n단점은 바닥이 아직 정리가 덜 되어서 진흙? 이많아서 불편햇어요", "author": "캠퍼540774", "date": 1773716723150, "zone": "풀타프존", "site": "선착순 01", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "편안하게 쉬다가 왔습니다\r\n사장님 친절하시고 조용히 힐링했습니다\r\n재방문의사 있습니다", "author": "캠퍼703938", "date": 1770540636954, "zone": "풀타프존", "site": "선착순 18", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/9531_ce7f19bd2b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_9531_ce7f19bd2b.jpg"}]}, {"source": "camfit", "text": "여름만 되면 이만한 캠핑장이 없죠!  \r\n데크도 크고 수영장도 놀기좋고~!!", "author": "캠퍼252945", "date": 1765851622427, "zone": "풀타프존", "site": "선착순 08", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "할로윈 행사 재미있었어요 ㅎㅎ\r\n캠장님이 준비해주신 간식으로 아이들 모두 행복해 했습니다.\r\n언제나 정감가는 캠핑장입니다 ^^", "author": "토마토힛", "date": 1762076863082, "zone": "풀타프존", "site": "선착순 05", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6957_9aeac3057d.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6957_9aeac3057d.jpeg"}]}, {"source": "camfit", "text": "타프덕분에     비와도    잘놀았습니다.", "author": "아리아리동동", "date": 1761734694157, "zone": "풀타프존", "site": "선착순 18", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "이번엔 첫날 비가 왔지만 빗소리 들으며 운치있는 시간을 보낼 수 있었어요~^^ 아이와 힐링의 시간을 보낼 수 있어서\r\n너무 좋았답니다~ 할로윈을 맞이해 이곳저곳 아이들이 좋아할만 소품들로 세팅도 해주셨어요~무엇보다 매너타임도 너무 잘 지켜져서 피로감이 덜했던거 같아요~👍 언제나 청결에 힘쓰시는거 같아 불편함없이 잘 지내다 옵니다^^", "author": "캠퍼675560", "date": 1761030261234, "zone": "풀타프존", "site": "선착순 07", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6959_789d772f3e.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6959_789d772f3e.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6955_b5b696b810.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6955_b5b696b810.jpeg"}]}, {"source": "camfit", "text": "주말에 서울 약속이있어서 급하게알아본곳인데 너무 만족스러웠습니다~\r\n금욜에 반차쓰고 갔더니 선착순 입실이라 제일 구석자리였지만 오히려 전 좋았어요ㅎㅎ\r\n타프에 데크 다 이렇게 큰사이즈는 처음봤고, 비오는데 하나도 젖지않았어요!\r\n토욜에 비멈췄을때 아이들이 짚라인도 너무씐나게 탔고 그네도 잘탔어요~\r\n겨울 오기전에 또 오고싶은데 담달부터 공사를 하시네요ㅜㅜ\r\n데크없어지는건 아쉽지만 봄되면 다시 갈꺼에요:)", "author": "캠퍼646903", "date": 1760780693649, "zone": "풀타프존", "site": "선착순 13", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000031785_56de841758.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000031785_56de841758.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000031787_90fb14a788.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000031787_90fb14a788.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000031870_08c9c80cdf.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000031870_08c9c80cdf.jpg"}]}, {"source": "camfit", "text": "수영장 운영 종료돼서 걱정했는데\r\n아이랑 놀러가기 최고네요\r\n\r\n바구니 그네 타고 앞에 공릉천인가요? 돌멩이 던지고 낙엽 주워다가 화롯대에 던져넣기 100회 정도 한 것 같아요\r\n\r\n짚라인 타고싶었는데 우리 애들타면 망가질까봐 아숩지만 못타고 일반사이트 쪽 잔디밭에서 뛰어 놀기좋았어요\r\n\r\n사이트마다 해먹스탠드있어서 휴대용 해먹만챙겨가니 간편하기도 하지만\r\n아이가 너무 좋아하네요.\r\n\r\n저희 집에 바람 넣고타는 고무보트있는데 내년여름에 타러가도 될까요😂 수영장도 좋다고 들어서 여름에 꼭 다시 오고싶어요", "author": "민니", "date": 1760701438114, "zone": "풀타프존", "site": "선착순 05", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000027568_18acf98bb8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000027568_18acf98bb8.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000027572_82c48100cb.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000027572_82c48100cb.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000027576_bb23977182.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000027576_bb23977182.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000026797_dac33461e9.arw", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/1000026797_dac33461e9.arw"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000026807_292b63b0ee.arw", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/1000026807_292b63b0ee.arw"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000026656_afe174bce8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000026656_afe174bce8.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000026654_b691ae9b01.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000026654_b691ae9b01.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000026673_6189d6ca60.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000026673_6189d6ca60.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000026542_006ce7e184.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000026542_006ce7e184.jpg"}]}, {"source": "camfit", "text": "행복한 캠핑했습니다~ 다음에\r\n기회되면 꼭 다시 방문하고 싶습니다~", "author": "탷철슈", "date": 1760359047918, "zone": "풀타프존", "site": "선착순 05", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "짧게 머무르기 좋았어요 방방이,그네타기,다슬기도 잡았어요", "author": "찍찍깡총음메", "date": 1759746928287, "zone": "풀타프존", "site": "선착순 03", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1185_e84770b822.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1185_e84770b822.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1215_1b1bee822a.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1215_1b1bee822a.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1240_e509cb8638.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1240_e509cb8638.jpeg"}]}, {"source": "camfit", "text": "막둥이 낳기전에 자주 갔었던 곳인데 막둥이가 4살이되고\r\n다시 찾은아띠캠핑장이에요.\r\n이전에도 좋았지만 아이들이 캠핑하기 더더 좋아졌네요.\r\n미꾸라지잡기,미션게임,버블파티등 아이들이 쉴틈없이 놀수 있어서 저에겐 자유가 찾아왔습니다.\r\n미즈캠으로 왔는데도 전혀 힘들지 않았어요.\r\n아이들은 버블파티가 가장 좋았다고 합니다.\r\n오늘 12시에 할로윈 도전해봅니다....\r\n꼭 성공할수 있기를..", "author": "캠퍼668306", "date": 1759101557978, "zone": "풀타프존", "site": "선착순 02", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000011524_0aac5639b5.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000011524_0aac5639b5.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000011527_3ea8de50dc.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000011527_3ea8de50dc.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000011413_c05ca31f25.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000011413_c05ca31f25.jpg"}]}, {"source": "camfit", "text": "무두리는 사랑입니다.♡\r\n또 방문하고 싶은 캠핑장 입니다", "author": "캠퍼344555", "date": 1759060448165, "zone": "풀타프존", "site": "선착순 05", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1749974307281_4b8c977328.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1749974307281_4b8c977328.jpg"}]}, {"source": "camfit", "text": "아이가 진짜 좋아하는\r\n캠핑장입니다.\r\n자주 애용하고 있어요~", "author": "토마토힛", "date": 1759047222471, "zone": "풀타프존", "site": "선착순 03", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6788_79c5ab1bc9.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6788_79c5ab1bc9.jpeg"}]}, {"source": "camfit", "text": "항상 기분좋은 캠핑 하고 갑니다 ^^", "author": "토마토힛", "date": 1759047175582, "zone": "풀타프존", "site": "선착순 07", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6787_2609ead3e7.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6787_2609ead3e7.jpeg"}]}, {"source": "camfit", "text": "친절하시고~대파도 꾸워먹으라고 주셔서 감사했어요~비가 와서인지 다슬기가 없어서 아쉬웠지만 물도 깨끗해서  좋았어요ㅋ 사이트 좁다는 후기있어 걱정했는데 다들 매너캠핑해주셔서 불편한거 없었어요~~데크위에 철판이있어 불멍할수 있는게 너무 좋았어요~감사합니다 또갈게요^^", "author": "니모마암", "date": 1758782184959, "zone": "풀타프존", "site": "선착순 05", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000055442_4246c535bb.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000055442_4246c535bb.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000055438_fc2ba16ed6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000055438_f {"source": "camfit", "text": "노원구에서 너무나도\r\n가까운 곳에  위치에 있고\r\n너무가깝다보니 깜박  잊은 물건이 있었는데 그때마다 두세번 집에 다녀온적이 있어요ㅋ\r\n숲을 감싸고 있는 캠핑장이라\r\n깊은 산속에 있는 듯한\r\n공기좋고 즐거운 기억을 갖은\r\n캠핑장입니다\r\n친구네가 지나가다가 놀러왔는데\r\n너무 좋은곳을 알았다고\r\n집에가서 맘카페에 올려서 소문좀 낸다고 하더라고요\r\n 수영장도 은근 괜찮고\r\n관리하시는 사장님네도\r\n모두 너무 친절하셔요\r\n\r\n조만간 또 갈게요\r\n\r\n행복을 안겨주는 캠핑장입니다\r\n\r\n아. 아쉬운점은 사이트 간격이 \r\n너무 다닥다닥 붙은 느낌?\r\n그게 조금 아숩 ^^;", "author": "캠핑조ㅇr", "date": 1758354820566, "zone": "풀타프존", "site": "선착순 05", "season": "fall", "numOfDays": 3, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000587_f70522c572.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000587_f70522c572.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000586_d56a3e5838.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000586_d56a3e5838.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000582_275afe405a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000582_275afe405a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000584_e58c4d2681.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000584_e58c4d2681.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000579_a9c952592d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000579_a9c952592d.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000571_304498d073.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000571_304498d073.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000570_2dd2d6b531.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000570_2dd2d6b531.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000551_19712bb316.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000551_19712bb316.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000553_afb8ea984b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000553_afb8ea984b.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000000598_20e44998df.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000000598_20e44998df.jpg"}]}, {"source": "camfit", "text": "깨끗하고 사장님 친절하시고 너무좋았습니다~", "author": "캠퍼366993", "date": 1758065532835, "zone": "풀타프존", "site": "선착순 11", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "아이들이 잘놀아서 다음주에 또 갑니다^^\r\n사장님 사모님 두분 다 좋으시고^^\r\n틈틈히 관리를 잘하셔서 화장실 샤워장도\r\n 만족하며 사용했어요 ^^\r\n다음주에 또 뵐게용^^", "author": "유니또유니", "date": 1756800764379, "zone": "풀타프존", "site": "선착순 03", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "곳곳에 세심한 배려를 찾을 수 있는 편안한 분위기의 캠핑장이었습니다. 수영장도 좋았고, 운동장급의 데크와 튼튼한 타프로 중간에 때려붓는 소나기가 왔어도 편안하게 지낼 수 있었어요^^ ! 다음에 또 올게요^~^", "author": "캠퍼28813", "date": 1756617143433, "zone": "풀타프존", "site": "선착순 01", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "항상 유쾌한 분위기위 캠핑장입니다.\r\n아이와 함께 즐거운 시간 보냈어요 ㅎㅎ", "author": "토마토힛", "date": 1756612412439, "zone": "풀타프존", "site": "선착순 02", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "여기 정말 좋아요\r\n1박2일 쉰나게 놀다가 왔고 수영장 진짜 커요~\r\n9월에 또 가려구요~", "author": "캠퍼869814", "date": 1756110540579, "zone": "풀타프존", "site": "선착순 12", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000075474_c7ccd16140.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000075474_c7ccd16140.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000075475_c3a1b5ccea.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000075475_c3a1b5ccea.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000075473_a1ef74d9fb.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000075473_a1ef74d9fb.jpg"}]}, {"source": "camfit", "text": "짚라인 굿 그네 굿 계곡에서 물고기잡기도 가능\r\n메뚜기도 잡아요~~", "author": "선호", "date": 1756104249638, "zone": "풀타프존", "site": "선착순 14", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "​1박 2일 동안 일영 무두리 캠핑장에서 즐거운 시간을 보내고 왔습니다.\r\n​입실 시간에 맞춰 도착하자마자 아이는 신나게 수영장으로 달려갔습니다.\r\n저희는 타프가 미리 설치된 데크 사이트 덕분에 뜨거운 햇볕을 피하며 편하게 짐을 옮기고 캠핑 준비를 마칠 수 있었습니다. 물을 좋아하는 아이는 수영장에서 지칠 줄 모르고 놀았고, 중간 쉬는 시간에는 짚라인을 타며 즐거워했습니다. 아이가 정말 좋아해서 뿌듯했네요.\r\n​저희 부부는 캠핑장에서만큼은 자연의 소리를 들으며 조용히 쉬고 싶어 하는데요, 다른 캠핑장에서는 주변 사이트의 음악 소리 때문에 힘들었던 적이 많았습니다. 하지만 일영 무두리 캠핑장은 오후 9시 이후 음악을 꺼야 하는 규정이 있어서 정말 좋았습니다. 다른 사람에게 직접 음악 소리를 줄여달라 말하기는 애매한데, 늦게라도 조용히 쉴 수 있어 좋았습니다. 개인적으로는 그 시간을 조금 더 당겨주시면 더할 나위 없을 것 같습니다. (사실, 수영하다 잠시 쉬고 싶어도 옆 사이트에서 들려오는 음악 소리가 더 괴로워서 아이와 계속 놀아줬거든요.)\r\n얼마 전에야 이 캠핑장을 알게 되어 이번이 올 여름 마지막 수영 캠핑이 될 것 같아 아쉽습니다.\r\n내년에는 더 많이 찾아와 즐거운 추억을 많이 만들고 싶네요.", "author": "유저 비공개", "date": 1756037945628, "zone": "풀타프존", "site": "선착순 14", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018232_9cb73d35f9.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018232_9cb73d35f9.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018234_d911a71b4a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018234_d911a71b4a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018530_604ffb7dc6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018530_604ffb7dc6.jpg"}]}, {"source": "camfit", "text": "저희가족에 최애 캠장^^\r\n깨끗하고 아이들 놀거리 많아 자주 가는 곳이에요\r\n방방이 현재는 없어져서 아쉽지만 그래도 또 자연에서 놀줄 아는 아이들이라 산보고 계곡보며 힐링도하고 매너타임 잘 지켜지는 곳이에요👍", "author": "써니투걸", "date": 1755510653119, "zone": "풀타프존", "site": "선착순 11", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000064301_fa3c0e46a1.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000064301_fa3c0e46a1.jpg"}]}, {"source": "camfit", "text": "잼나게 잘 다녀왔어요. 타프랑 데크가 있다는게 큰장점같아요. 다만 사이트가 좀 다닥다닥 붙어있는 느낌이라..  11월에 리모델링 하신다고 하던데 기대하고 있습니다. 수영장 에어슬라이드 넘 재미있는데 올라가는게 진짜 힘들어요. 리모델링하실때 이부분도 좀.. 고려해주셨음..  다시 갈께요.", "author": "유저 비공개", "date": 1755413285732, "zone": "풀타프존", "site": "선착순 07", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029103_3f1ca6745b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029103_3f1ca6745b.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029101_3ec29531b4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029101_3ec29531b4.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029116_3085344ab8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029116_3085344ab8.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029123_b4a1c1b58c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029123_b4a1c1b58c.jpg"}]}, {"source": "camfit", "text": "수영장이 크고 넓어서 좋았어요 계곡에서 다슬기, 물고기도 잡고 재밌게 놀았습니다 싸이트도 넓직하니 다 좋았는데 샤워시설이 너무 부족하네요 신관 본관 두군데 합쳐서 샤워기가 4개 밖에 없고 수압이 너무 약했어요", "author": "에버프리", "date": 1755412691455, "zone": "풀타프존", "site": "선착순 01", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029948_2a1e0c63ba.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029948_2a1e0c63ba.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029947_0eadced033.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029947_0eadced033.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029946_2a564f7473.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029946_2a564f7473.jpg"}]}, {"source": "camfit", "text": "아이들한테 최고의 캠핑장이에요👍\r\n하루종일 물놀이하고 먹고 물놀이하고 넘 재밋게 놀다 왔습니당 ㅎㅎ", "author": "유저 비공개", "date": 1754651302132, "zone": "풀타프존", "site": "선착순 19", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "너무 더웠던 2일과 폭우1일\r\n최고로 잘놀고 잘쉬다 왔습니당\r\n첫날 더위를 먹어서 루프박스에서 짐도 못빼고\r\n멍타는데 여사장님 대신 짐내리는거 도와주시는거보고 정신이 번쩍들었었네요\r\n사이트앞 공회전차량이나 비매너캠퍼 말씀드리면 즉각조치해주셔셔 넘 좋았구요\r\n화장실 샤워장 관리 넘 잘해주셔셔 벌레시체 하나 보기힘들었네요\r\n수영장 물도 미지근하지않고 시원하고 중간중간 쉬는시간과 이용종료후 수질관리 힘쓰시는게 보여서 감동이었네요.수영장내 미끄럼틀도 아이들이 2백번이상 이용한것같은데 위험하지않고 잼있었다네요.\r\n암튼 후기잘안쓰는데 넘친절하고 편하게 이용하고 아이들과 와이프도 대만족했는데 퇴실때 폭우로 인사못드리고 온게 아쉬워서 후기 남깁니당\r\n날좀 풀리면 또 갈게용ㅎㅅㅎ\r\n감사했습니다~~~♡", "author": "인천뽀르쉐", "date": 1754471741406, "zone": "풀타프존", "site": "선착순 10", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018824_d7310a6162.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018824_d7310a6162.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000018822_2e7d104f78.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000018822_2e7d104f78.jpg"}]}, {"source": "camfit", "text": "깨끗하고 아이들이 수영장 진짜좋아해요\r\n🌞", "author": "캠퍼259801", "date": 1748761611925, "zone": "풀타프존", "site": "선착순 08", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012697_8a026e3393.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012697_8a026e3393.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012701_0b180b06ad.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012701_0b180b06ad.jpg"}]}, {"source": "camfit", "text": "데크위에 타프가 있어서 좋아요^^\r\n사장님도 친절하십니다\r\n작년에 수영장에서 재밌게 놀았었는데\r\n올해도 수영장 오픈하시면 자주갈것같아요", "author": "피자치즈", "date": 1748182905145, "zone": "풀타프존", "site": "선착순 17", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240720_193249_37edf50396.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240720_193249_37edf50396.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1721437229446_727c6e7358.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1721437229446_727c6e7358.jpg"}]}, {"source": "camfit", "text": "아이가 즐거워하는곳 입니다~^^", "author": "유저 비공개", "date": 1748165967602, "zone": "풀타프존", "site": "선착순 16", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "조용히 힐링하다가 갑니다~~^^ 좋아요", "author": "캠퍼113992", "date": 1747623848890, "zone": "풀타프존", "site": "선착순 06", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "5.15~17  2박캠핑했는데  환경이 생각보다\r\n깨끗하고의정부가 집인데30분도 안걸리니\r\n접근과 철수가 빨라 덜피곤하네요\r\n무엇보다 캠핑장 지기님이 관리를 엄청\r\n깨끗하고 부지런히 하셔서 화장실이 이렇게\r\n청결한 곳은처음  여기는 제일 재미있는것은\r\n짚라인이 길어서 애들완전 좋아하고\r\n여름엔대형수영장에 워터슬라이드끝내줘요\r\n바닥이 전체적으로 파쇄석에데크로구성되고 사이트 천장비닐하우스 지붕차광막으로\r\n어제같이 악천후에도 비에 거의 젖지않아 편했습니다  철수도 뽀송  우중모닥불가능\r\n다음에 또올거에요", "author": "캠퍼796441", "date": 1747485353205, "zone": "풀타프존", "site": "선착순 06", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009581_32ade4352e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009581_32ade4352e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009571_89a8a268d3.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009571_89a8a268d3.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009570_6cd763e418.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009570_6cd763e418.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009566_8abd2d9729.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009566_8abd2d9729.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000009518_a1d14b4348.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000009518_a1d14b4348.jpg"}]}, {"source": "camfit", "text": "서울근교 가까운 거리에 숲속과 옆에는 강물, 아주 넓고 깨끗한 데크에 지붕은 타프존까지 우중 캠핑이었지만 더할 나위없이 저희가족 모두 아주 행복했습니다! \r\n\r\n. 참고 : 화장실 및 기타 부대시설 아주 깨끗하고 데크는 아주 넓어 리빌쉘 모든 텐트 전부 설치 가능해요. 사이트에 해먹걸이 비치되어 있습니다.", "author": "캠퍼288291", "date": 1747009878677, "zone": "풀타프존", "site": "선착순 01", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000059409_dbe61d3684.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000059409_dbe61d3684.jpg"}]}, {"source": "camfit", "text": "즐거운 6박7일 사계절이 뚜렸한 무두리캠핑장이에요.장박 끝나고 첨으로 갔는데 사이트가 가족단위여서 아이들의 웃음 소리가 끊이질 안더라구요.어린이날 선물로 주신 다육이 넘좋아요^^애들이 심사숙고해서 골랐죠.", "author": "우주초원노을", "date": 1746518208425, "zone": "풀타프존", "site": "선착순 19", "season": "spring", "numOfDays": 5, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024753_5cc79969a4.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024753_5cc79969a4.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024783_a34f5f24bd.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024783_a34f5f24bd.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024773_ee43d79ecb.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024773_ee43d79ecb.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024693_67afae3965.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024693_67afae3965.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024660_5a03ba9245.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024660_5a03ba9245.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024781_316de97eca.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024781_316de97eca.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024650_cb4fd4c69c.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024650_cb4fd4c69c.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024635_2edae49dee.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024635_2edae49dee.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024658_f64275e0ea.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024658_f64275e0ea.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000024788_b6cc075a5b.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000024788_b6cc075a5b.heic"}]}, {"source": "camfit", "text": "언제나 좋습니다.\r\n언제와도 정겹게 맞아주시는 사장님 두분 감사합니다. 깨끗하고 공기좋고 아이들이 자연과 함께 놀수 있는 곳입니다.", "author": "캠퍼528631", "date": 1746504020282, "zone": "풀타프존", "site": "선착순 06", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/17465039105334591282843895220589_352e4ca580.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_17465039105334591282843895220589_352e4ca580.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/17465039260921578608680822927652_78b32dcea0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_17465039260921578608680822927652_78b32dcea0.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/17465039403952422393481288684882_706209933e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_17465039403952422393481288684882_706209933e.jpg"}]}, {"source": "camfit", "text": "아이들데리고 캠핑가기 좋은곳이에요\r\n사장님도 친절하시고 시설도 잘되어있어오", "author": "캠퍼566752", "date": 1745280106973, "zone": "풀타프존", "site": "선착순 01", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "어떤 대형리빙쉘도 칠 수 있는 넓은 데크와 타프존이 인상 깊었어요. 초보 가족캠퍼라 집이 가까운 것이 가장 좋았어요~ 선착순 자리배정인데 금요일 4시에 갔더니 거의 만석이였어요. 사장님이 친절하세요!!!", "author": "유저 비공개", "date": 1745129708687, "zone": "풀타프존", "site": "선착순 17", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000022480_bfcb21bb8f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000022480_bfcb21bb8f.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000022291_c9395199aa.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000022291_c9395199aa.jpg"}]}, {"source": "camfit", "text": "사이트가 몇없어서 조용하고\r\n사장님이 편하게 해주셔서 동네마실간거 마냥 좋았습니다.\r\n대형 캠핑장에 비해선 조금 노후되어보이는 시설이지만\r\n부족한거 없었구요.\r\n물놀이 수영장에서 3일 내내(퇴실하는 날까지)   잘  놀았습니다^^", "author": "유저 비공개", "date": 1744638491356, "zone": "풀타프존", "site": "선착순 08", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240801_143617_20c48053ec.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240801_143617_20c48053ec.jpg"}]}, {"source": "camfit", "text": "한번간곳 두번은 거의안가는데 무두리는 두번째네요~\r\n집에서 가깝고 데크넓고 사장님친절하셔요~", "author": "캠퍼374781", "date": 1743982507214, "zone": "풀타프존", "site": "선착순 15", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "초가을이었지만 약간 더운 날씨에 아이들은 수영장에서...\r\n집근처 캠핑장이라 여유있게 쉬기 좋았고,\r\n데크도 넓다못해 광활합니다.\r\n아이들 놀 수영장도 미끄럼틀이 있어서 놀기 좋고\r\n벌래도 없네요.\r\n올 해도 시간되면 또...", "author": "새하마노", "date": 1738737732561, "zone": "풀타프존", "site": "선착순 03", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008845_9942af65ef.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008845_9942af65ef.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008846_f31904663c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008846_f31904663c.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008847_ce420d2b90.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008847_ce420d2b90.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008857_191d1a6f89.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008857_191d1a6f89.jpg"}]}, {"source": "camfit", "text": "친절한사장님이 계신\r\n아이가 좋아한 캠핑장이예요~~^^\r\n짚라인을 특히 너무 재밌게 탔네요!", "author": "캠퍼530275", "date": 1734338437525, "zone": "풀타프존", "site": "선착순 01", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "추울때 간건 처음이에요!\r\n공기도 좋고 편안하게 힐링하고 왔어요!", "author": "캠퍼713670", "date": 1731284862109, "zone": "풀타프존", "site": "선착순 16", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "1박 예약 오픈만 기다렸다가 바로 잡았어요!\r\n거리도 가깝고 단풍도 이쁘고~  날씨가 다했네요\r\n화장실 . 개수대  깨끗해요ㅎ\r\n1박은 항상 아쉬워요ㅜㅜ \r\n다음에 2박 도전~! \r\n눈 오늘 겨울에도 기대됩니당!♡", "author": "캠퍼597426", "date": 1731284179027, "zone": "풀타프존", "site": "선착순 15", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000022240_00060f1175.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000022240_00060f1175.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000022247_c65e321f66.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000022247_c65e321f66.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000022265_2be11bc174.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000022265_2be11bc174.jpg"}]}, {"source": "camfit", "text": "다녀본곳중 마음이 가장 따뜻했던곳!\r\n아이들과 함께하기 너무좋았다\r\n특기 사장님.사모님 너무 좋으셨고 관리도 깨끗해 자주이용할것같다 집에서도 거리가 가까워 너무좋았다\r\n하지만 예약하기 힘들것같아 까페 자주 들어가봐야 될듯~~~너무 기분좋았던 2박이였다^^", "author": "캠퍼363895", "date": 1731281531567, "zone": "풀타프존", "site": "선착순 19", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000058738_d923698c63.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000058738_d923698c63.jpg"}]}, {"source": "camfit", "text": "전석 타프데크석이라 넘넘 좋아요.\r\n매너타임 잘 지켜지고 깔끔한 편임.\r\n전자렌지 사용공간이 조금만 더 깨끗하면 좋겠습니다.", "author": "캠퍼405823", "date": 1730640063589, "zone": "풀타프존", "site": "선착순 05", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "무두리에서 두번째 할로윈~~~언제나 즐겁네요.아이들이 너무 좋아해서 다행이에요.\r\n막내 생일이라 칭구들도  초대하고 파티도 나름 바쁜주일이었어요. 여기 무두리캠핑장 다니고부터 아이들이 사회성이 좋아져요^^\r\n언제나 처럼  무두리는 친정같아요. 이것저것 챙겨주시고 배려해주시고 고맙습니다^^", "author": "우주초원노을", "date": 1730630837877, "zone": "풀타프존", "site": "선착순 19", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020294_78505b55b4.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020294_78505b55b4.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020283_c22d02fa35.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020283_c22d02fa35.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020325_cd4d62825c.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020325_cd4d62825c.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020303_d23d5bf658.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020303_d23d5bf658.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020332_1a0e101442.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020332_1a0e101442.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020313_ad867201b2.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020313_ad867201b2.heic"}]}, {"source": "camfit", "text": "날씨 좋은날,좋은 사람과,좋은곳에서,캠핑을해서,\r\n너무 힐링이였어요~ 사장님 두분도 세심하시고,\r\n관리가 잘 되는 집에서 그리멀지 않은 무두리캠핑장!!👍\r\n내년 봄에 또 캠핑하러 갑니다^^", "author": "캠퍼675560", "date": 1730123251803, "zone": "풀타프존", "site": "선착순 07", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9999_89a61d10fc.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9999_89a61d10fc.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9997_47fc07767c.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9997_47fc07767c.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0040_1bd04397e9.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0040_1bd04397e9.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9990_c1068cc239.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9990_c1068cc239.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0045_28ea9c6a2b.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0045_28ea9c6a2b.jpeg"}]}, {"source": "camfit", "text": "즐거운 할로윈 캠핑이었습니다.  따로 이벤트는 없다고해서 그냥 간단하게 준비해갔는데 캠핑장에 할로윈 느낌나게 꾸며놔주시구 사장님이  저녁에 사탕도 나눠주셨어요 ㅎㅎㅎ 그리고 정말 할로윈에 진심이신 캠퍼분들 많으시더라구요ㅎㅎ 덕분에 저희도 기분 내고 아이도 엄청 즐거워해서 행복했습니다. 사탕받으러 다니는 아이들 얼굴이랑 사탕나눠주시는 어른들 얼굴에 다들 미소가 한가득🫶🏼 뭔가 따뚯했어요 ㅎㅎ  그리고 캠핑장이 산에 둘러쌓여 있어서 그런지 아늑한 느낌이 들고 텐트 밖으로 보이는 단풍풍경에 소소하게 힐링도 하고 갑니다 ㅎㅎ 매너타임도 잘 지켜지고  큰  불편함없이 잘 지내다 왔어요 ㅎㅎ", "author": "캠퍼489034", "date": 1730121729877, "zone": "풀타프존", "site": "선착순 18", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6093_4eff0774cf.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6093_4eff0774cf.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6181_3d05ff4812.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6181_3d05ff4812.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6259_c50906097b.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6259_c50906097b.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5930_c65658d2dd.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5930_c65658d2dd.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5923_795e690447.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5923_795e690447.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5900_2bc5a64269.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5900_2bc5a64269.jpeg"}]}, {"source": "camfit", "text": "이번주 너무 핫!한 할로윈 캠핑이었어요~\r\n언제나 늘 그렇듯 한결 같으신 무두리 식구분들~~~다음주에도 뵐게요^^", "author": "우주초원노을", "date": 1730080482891, "zone": "풀타프존", "site": "선착순 19", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020240_61692dc98a.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020240_61692dc98a.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020231_d813b34109.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020231_d813b34109.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020208_1f015e7a56.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020208_1f015e7a56.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020209_3a0752b689.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020209_3a0752b689.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020248_7155548ae3.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020248_7155548ae3.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020222_2da989cb4b.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020222_2da989cb4b.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020245_2acdfe124c.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020245_2acdfe124c.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020246_5ac767b925.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020246_5ac767b925.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000020213_81b8795f61.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000020213_81b8795f61.heic"}]}, {"source": "camfit", "text": "이번 주말도 즐겁게 캠핑하고 왔어요~ 아이들이 이웃집들과 사이좋게 잘 놀았어요. 신경써서 할로윈 준비해주신 분들이 많아서 더 재미있었어요^^ 내년에도 저희는 신경써서 가보고 싶다는 생각을 했네요~ !", "author": "유저 비공개", "date": 1730011272502, "zone": "풀타프존", "site": "선착순 15", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "주인 여사장님 친절하세요!\r\n선착순도 별로지만, 사이트가 너무 붙어 있어서\r\n다시는 안 갈것 같아요. 난민촌 같아요..", "author": "주다파파", "date": 1729873379812, "zone": "풀타프존", "site": "선착순 06", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "두번째 이용이지만 서울과도 가깝고 항상 친절하신 사장님, 서로 배려하는 이용객들이 있어 다녀오면 기분 좋은 캠핑장", "author": "캠퍼514331", "date": 1729408087090, "zone": "풀타프존", "site": "선착순 18", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "집에서 30분 거리에 캠핑장이라 좋았어요!\r\n남편이 집에 왔다갔다 했었다는 ㅎㅎ\r\n일단 아이가 놀수있는 방방이 그네 모래놀이가 있어서 좋았어요 ㅎㅎ\r\n화장실도 정말깨끗했고 특히 변기가 어린이 커버가 있어서 응가하고 싶다고 했을때 걱정없었어요!!!\r\n보통 다른 캠핑장은 어린이 변기가 없어서 휴대용 변기랑 쉬통 가지고 다니거든요~ 여긴 아이들 데려가기 넘 좋았어요!!\r\n그리고 손씻는곳에 아이들 올라가서 씻을수 있게 계단이 있어요 이게 별거 아닌거 같지만 애들 있는집은 작은 감동이랍니다!! ㅎㅎ\r\n단점은 사이트가 너무 붙어 있었던거 같아요 ㅠㅠ\r\n옆텐트 코고는 소리 말소리도 다 들리고 사이트가 조금 떨어져 있었으면 좋겠다 아숩다 하면서 왔네요!\r\n가까우니 다음에 또 가겠습니다!!^^", "author": "chanymom77", "date": 1729070384816, "zone": "풀타프존", "site": "선착순 10", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4641_f4ecb444cc.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4641_f4ecb444cc.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4599_21a73ed732.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4599_21a73ed732.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_4585_89b1ad86ed.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_4585_89b1ad86ed.jpeg"}]}, {"source": "camfit", "text": "임시공휴일이 돼서 캠핑장이 한가했고,\r\n한적하게 잘 쉬다왔어요. 주변 밤나무가 있어 떨어진 밤도 줍고, 하늘도 맑고 푸른 날씨에 기분좋은 캠핑하고 왔습니다^^", "author": "캠퍼672849", "date": 1728703332352, "zone": "풀타프존", "site": "선착순 05", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "처음 가본곳이였는데 기대이상~ 단골확정^^\r\n3박 너무 편하기 쉬고먹고즐기고 왔어요\r\n다음 예약도했어요", "author": "유저 비공개", "date": 1728377766995, "zone": "풀타프존", "site": "선착순 10", "season": "fall", "numOfDays": 3, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000039842_adb6895c9e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/1000039842_adb6895c9e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000039773_67510047fd.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/1000039773_67510047fd.jpg"}]}, {"source": "camfit", "text": "기대이상으로 너무 편리하고 서울에서도 가깝고 정말 좋았어요~아이들이 좋아하는 그네, 트럼플린도 있고 해먹도 기본 철구조대는 6개 대여가 가능하데서 해먹천만 사가지고 아주 잘 이용했습니다 수영장이 있어서 여름에도 좋을거 같고, 타프데크존이 정말 좋은거 같습니다! 또 올께요!!", "author": "캠퍼652388", "date": 1728110092782, "zone": "풀타프존", "site": "선착순 08", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9130_2227df3567.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9130_2227df3567.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9134_6481f79b6b.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9134_6481f79b6b.jpeg"}]}, {"source": "camfit", "text": "캠핑장이 넓어서 여유롭고 데크사이트가 커서 \r\n비걱정 전혀없고요\r\n화장실, 공용샤워장 등등\r\n정말 정말 깨끗합니다.  \r\n거기에 친절하신 사장님까지 피크닉으로 처음와보고 이번에 캠핑으로  2박 잘지내다 갑니다.\r\n다음에 또 올께요. ^^\r\n앗 참고로 저녁에 노을맛집이예요.\r\n잘놀고 좋은추억 쌓고갑니다. 감사합니다", "author": "캠퍼259801", "date": 1728106010503, "zone": "풀타프존", "site": "선착순 11", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012121_2126f8cbdc.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012121_2126f8cbdc.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012124_1479d39e0c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012124_1479d39e0c.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012120_a0c404915c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012120_a0c404915c.jpg"}]}, {"source": "camfit", "text": "여름에 여기만큼 가성비좋은 캠핑장은 없어보여요~~^^", "author": "거니우니낭이럽", "date": 1722747360890, "zone": "풀타프존", "site": "선착순 10", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000002325_6596ed9146.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000002325_6596ed9146.jpg"}]}, {"source": "camfit", "text": "두번째 방문입니다\r\n여름에 아이와 물놀이하기 참 좋은 캠핑장이네요\r\n내년 여름에 또 방문할 예정입니다~", "author": "Parkcamper08", "date": 1722165308540, "zone": "풀타프존", "site": "선착순 15", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012980_251d8af08e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012980_251d8af08e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012982_5fbc24335c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012982_5fbc24335c.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012991_5efc319603.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012991_5efc319603.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000012984_1bb5e17f09.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000012984_1bb5e17f09.jpg"}]}, {"source": "camfit", "text": "가깝고 아이들 놀기에 너무너무 좋아요~\r\n사장님 사모님 너무너무 친절하시고~ \r\n타프존 진짜 넓어요~  선착순이라 늘.. 늦저녁 도착해야하는 저희는\r\n아쉽지만 그래도 그 어느자리던 편의시설이 그렇게 많이 안 멀어서 \r\n괜찮은거 같아요~ \r\n수영장 끝나기전에 꼭 한번 더 가야겠어요~\r\n나들이로도 최고예요~^^\r\n2박이 힘든 집이라 1박을 자주하지만 자리없어 포기할땐 당일피크닉 강추해요~ 절대 후회 안할듯!! ㅎㅎㅎ", "author": "데이지팍", "date": 1721698829413, "zone": "풀타프존", "site": "선착순 05", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029120_ad7ff2fcce.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029120_ad7ff2fcce.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000029123_73885e0f39.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000029123_73885e0f39.jpg"}]}, {"source": "camfit", "text": "엄청 외진 산골짜기에 있어 편의점도 없고 걱정했는데 매점에 다양하게 많은 물품이 있어서 전혀 불편함없고 사장님 내외분들이 정말정말 친절하십니다! 러그버그가 너무너무너무 많아서 힘들었지만 재밌게 잘놀고 왔어요!", "author": "캠퍼445142", "date": 1720578853674, "zone": "풀타프존", "site": "선착순 18", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "비가온다고해서 타프존으로 예약 했습니당~\r\n사이트가 넓어서 좋았어요\r\n매점내에 전자레인지사용도 가능해서 잘 썻습니다", "author": "캠퍼95313", "date": 1720404492312, "zone": "풀타프존", "site": "선착순 15", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6732_1b9b6d1463.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6732_1b9b6d1463.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6735_15bbb769e3.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6735_15bbb769e3.jpeg"}]}, {"source": "camfit", "text": "일영무두리캠핑장 처음 다녀왔습니다\r\n아이들도 너무 즐겁게 물놀이하고 샤워장 및 시설 모두 청결 해서 좋았습니다 좋은 추억 만들고 가요~~", "author": "유저 비공개", "date": 1720323416753, "zone": "풀타프존", "site": "선착순 06", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000028817_47589ef4d6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000028817_47589ef4d6.jpg"}]}, {"source": "camfit", "text": "사장님 친절하시고 전부 깨끗합니다\r\n오시는분들 매너도 좋고\r\n수영장,타프,시설 다 좋네요", "author": "캠퍼553106", "date": 1719797477294, "zone": "풀타프존", "site": "선착순 09", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000010749_6aa02b7fe3.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000010749_6aa02b7fe3.jpg"}]}, {"source": "camfit", "text": "수영장 크고 편의시설 깨끗해요. 데크 넓고 타프 높아서 시원하고 좋습니다!", "author": "유저 비공개", "date": 1717917885241, "zone": "풀타프존", "site": "선착순 12", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "저희 가족들이 너무 좋아하는 캠핑장이에요! 데크도 크고 너무 좋아요😍", "author": "캠퍼377437", "date": 1717906620853, "zone": "풀타프존", "site": "선착순 02", "season": "summer", "numOfDays": 3, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0177_614ece224e.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0177_614ece224e.jpeg"}]}, {"source": "camfit", "text": "토요일 노원 하계동쪽에서 출발해서\r\n도착하기까지 40여분정도 걸린것같아요.차 막힌거 치고는 진짜 가까운것같아요.진짜 쉽게 쉽게 올수있는곳인건 확실합니다.\r\n수영장도 있고  파쇄석이지만 자전거도 가지고와서 타는 분들도 있네요\r\n화장실,샤워장은 관리실 신건물에 하나씩있고요. 건너편쪽에도 하나씩 더있어요.진짜관리 잘되었고 사장님분들께서 쉬지않고 정리,정돈 시설관리에 전혀 소홀함이 없으시네요\r\n그리고 빈말이 아니고 정말정말 친절하십니다.솔직히 시설도  경치도 둘째고 친절히 맞아주시는것부터가 힐링의 시작이더라고요\r\n몇몇군데 요기조기 다녀봤는데\r\n여기로 정했어요\r\n요기  캠핑장이 제 마음속 캠핑장1위  입니다.사진보시면 알겠지만 \r\n왜 저녁이나 새벽에 장실갈때 파쇄석만 있으면 왠지 발걸음 떼기가 미안스럽자나요.시끄러워서 \r\n그런데 요기 캠핑자은 조용히 갈수있게  길이 잘되어있어요\r\n이런거 하나하나 사장님 네  섬세함과\r\n배려심이 돋보이셨어요.\r\n쵝오쵝오^♡^\r\n캠핑장은 사방으로 산과 강물?냇가가\r\n흐르고 있어서  서울에서 가까운데도\r\n공기가 진짜 맑아요.지금 이글 쓰는중에도 다시 가서 쉬고싶다는 ㅜㅜ\r\n\r\n사이트는 진짜 크고 넓어요.초대박\r\n여기서 약간 아쉬운게 굳이 하나를 뽑으라면  각각에 사이트는 크고 넓은데\r\n사이트와 사이트의 간격이 좁아요\r\n좁 붙어있다는게 아쉽다는..^^;\r\n그거 빼고는 넓고 크고 공기좋고풍경좋고  시설 깨끗하고..  또 그만큼 깨끗하게 만드신 부지런한 사장님\r\n모하나  빠지는게 없네요\r\n\r\n당일치기로 단합회 하러오시는분들도 많으시고 대학생들,회사  이런쪽에서도 많이 오시는것같아요.\r\n자꾸자꾸 또 가고싶다는  생각뿐입니다\r\n타프존은  데크바닥이기때문에 오징어핀이 필수인데요.다 아시겠지만 \r\n저는 모자르게 가져와서 난감했는데\r\n매장에서 판매를 해서 얼마나 다행인지 모릅니다.굿굿\r\n\r\n서울에서 가까운데 공기좋고 물좋고\r\n깨끗하니깐 산짐승.오리 온갖 새들\r\n사이트 넓고 크고.수영장도 크고 방방이도 있고 놀이터도 따로 있고\r\n주차장도 가깝고 매너타임도 굿굿굿\r\n장실.샤워장 깨끗하고.따뜻한물도 펑펑 잘나오고.최고네요\r\n제가 쉬고 있는 곳에 친구부부가 놀러와서 놀다가 갔는데요.집에갈때까지\r\n여기 너무좋다고.가까운데도 너무 경치가 좋고 시설관리 잘되어있다고\r\n맘카페에 올려서 공유해야겠다고\r\n그러네요.맘에 들었나봐요.친구네도\r\n그래서 제가 더더더 기분이가 좋아요^^\r\n사장님~~너무 친절히 잘대해주셔서\r\n너무너무 감사했어요~~♡\r\n사장님네가 친절하시니까 캠핑장 찾아오신 손님들도 하나같이 다 친절하셔서 진짜 기분좋게 쉬다왔어요\r\n\r\n이번 추석때 또 쉬기위해서 다시 찾아뵐게요\r\n그때도 잘부탁드려요\r\n감사합니다^♡^\r\n\r\n일영무두리캠핑장은 ♡입니다~~", "author": "캠핑조ㅇr", "date": 1717487907400, "zone": "풀타프존", "site": "선착순 03", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240602_190303_17ec10b318.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240602_190303_17ec10b318.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240602_113606_a0a79ad9af.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240602_113606_a0a79ad9af.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240602_170349_20d5949fa6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240602_170349_20d5949fa6.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240602_112613_d06605fa5d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240602_112613_d06605fa5d.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240602_113547_1e8087d644.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240602_113547_1e8087d644.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240602_113544_097df74e34.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240602_113544_097df74e34.jpg"}, ": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016922_94ec34f492.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016922_94ec34f492.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016927_253d74f3e4.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016927_253d74f3e4.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016919_5b95e40a80.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016919_5b95e40a80.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016950_d3aa2bb55d.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016950_d3aa2bb55d.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016921_dd8be854cf.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016921_dd8be854cf.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016920_85482b4dfa.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016920_85482b4dfa.heic"}]}, {"source": "camfit", "text": "이제 막 캠핑을 시작한 캠린이인데 천막?이 있어서 비 걱정 안해도되고 시설도 너무 잘되어있고 아이들과 함께하기 너무 좋은곳이네요. 그래서 다시 예약했습니다 ㅎㅎ.\r\n여기로 자주 캠핑 다니려고 합니다.", "author": "캠퍼566752", "date": 1717116575835, "zone": "풀타프존", "site": "선착순 11", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_5633_f3fe55b175.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_5633_f3fe55b175.jpeg"}]}, {"source": "camfit", "text": "매주 발길이 향하는 무두리캠핑장.\r\n타프존이라  비걱정 NO!시원한 나뭇바람이 살랑살랑하니 좋아요.무두리로 오세요^^", "author": "우주초원노을", "date": 1717044510935, "zone": "풀타프존", "site": "선착순 08", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016549_25d0deee3b.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016549_25d0deee3b.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016559_4ebf2c56c4.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016559_4ebf2c56c4.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016550_1feb79c8dd.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016550_1feb79c8dd.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016551_020b7c8f83.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016551_020b7c8f83.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016544_169a83c2bd.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016544_169a83c2bd.heic"}]}, {"source": "camfit", "text": "뭐든지 굿 .\r\n매주마다..매주 가고싶은  이곳.\r\n마음이  푸릇푸릇해져요.\r\n우리 아이들이 젤 좋아하는  무두리캠핑장.", "author": "우주초원노을", "date": 1717043765024, "zone": "풀타프존", "site": "선착순 14", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016868_359eb36ea5.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016868_359eb36ea5.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016849_6abd250943.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016849_6abd250943.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016861_e15577d0dd.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016861_e15577d0dd.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016863_3d7288397b.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016863_3d7288397b.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016844_8d5450427e.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016844_8d5450427e.heic"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000016876_8681de828e.heic", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000016876_8681de828e.heic"}]}, {"source": "camfit", "text": "너무 즐거운 시간이였습니다~\r\n화장실도 깨끗하고 매너타임이 잘 지켜져서 푹 쉬다 왔습니다.\r\n다만 아직 트램폴린이 수리중이라 아쉬웠습니다.\r\n큰아이. 작은아이 다 같이 이용하다 보니 다칠까 봐 걱정되었는데 다행인 건지... 첫째가 잠깐 이용했는데도 스프링에 다칠뻔해서 보기만 하다 와서 아이들이 무척 아쉬워했습니다ㅜㅜ\r\n이부분말고는 너무 좋았어서 조만간 재방문하려고하는데 그 전에 수리되어 있으면 너~~~무 좋을 거 같아요♥️", "author": "유저 비공개", "date": 1716726551976, "zone": "풀타프존", "site": "선착순 19", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "초록초록~ 지금 무두리 너무 예뻐요!\r\n무두리는 아이들이 뛰어 놀기 좋아요. \r\n날 더 더워지고 수영장도 이용하면 좋을 것 같아요~", "author": "이숑탁", "date": 1716725247715, "zone": "풀타프존", "site": "선착순 05", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_0132_e64bcb8cb9.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_0132_e64bcb8cb9.jpeg"}]}, {"source": "camfit", "text": "매너타임\r\n아주 좋아요!!\r\n그늘이 너무 많아요\r\n이제 곧 수영장 오픈할듯~", "author": "유저 비공개", "date": 1716194699228, "zone": "풀타프존", "site": "선착순 19", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비오는 어린이날 타프존이라 편히 놀다 갑니다\r\n\r\n집이랑 가까워서 자주 이용하는 캠핑⛺장", "author": "캠퍼194038", "date": 1715037869319, "zone": "풀타프존", "site": "선착순 05", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1988_3081dd720a.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1988_3081dd720a.jpeg"}]}, {"source": "camfit", "text": "늘 편안하고 정겨운 무두리 캠핑장입니다. 아이들이 즐겁게 놀 수 있어서 좋아요~ 사장님도 친절하시고 시설 관리에 항상 노력해주시는게 느껴집니다. 지붕과 데크라서 더 쾌적한 환경같아요~", "author": "유저 비공개", "date": 1714572404613, "zone": "풀타프존", "site": "선착순 12", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9460_d06ca6602e.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9460_d06ca6602e.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_9427_34b018f578.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_9427_34b018f578.jpeg"}]}, {"source": "camfit", "text": "아이하고 캠핑하기 좋은곳 역시나 친절하신 사장님내외분덕에 주말 잘쉬고 힐링받고 왔어요~~~\r\n담에또 갈께요~~~", "author": "캠퍼539332", "date": 1714287037836, "zone": "풀타프존", "site": "선착순 04", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000011749_7fd0f2a927.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000011749_7fd0f2a927.jpg"}]}], "other_reviews": [{"source": "camfit", "text": "아르보리아는 항상 좋은 추억을 만들어 준 곳이에요!", "rating": null, "author": "이애기", "date": ""}, {"source": "camfit", "text": "사장님이 친절하시고. 설명이 자세하셔서 편하게 잘놀다갑니다.\r\n충주로 다시 오게된다면 꼭 다시 여기로오고싶네요.", "rating": null, "author": "캠퍼660252", "date": ""}, {"source": "camfit", "text": "반달곰숲아이들이 놀거리많고 동물도보고 좋아요 체험하는것도 많고 굿", "rating": null, "author": "캠퍼177857", "date": ""}, {"source": "camfit", "text": "시설 깨끗하고 아이 놀기 좋습니다\r\n즐겨찾는 캠핑장 입니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "리버뷰가 끝내줍니다. 낚시도 하시던데 다음에 도전해보겠습니다", "rating": null, "author": "캠퍼456487", "date": ""}, {"source": "camfit", "text": "작년 한글날 캠핑~\r\n만휴림 싸이트 아주 넓고 좋았습니다\r\n처음이었어요 이렇게 여유롭게 즐긴 캠핑이.. \r\n중딩도 초딩도 다 만족하는 수영장 일단 너무 좋구요,,\r\n뷰~캬~캠은 편의시설가까운게 최고라여기며 뷰는 늘 뒷전이었는데 와우~이런맛이군요..뻥뚫린 시야에 초록초록과 맑은 하늘..너무 너무 행복했습니다\r\n올 여름휴가는 여기!! 에용~~^^", "rating": null, "author": "캠퍼78663", "date": ""}, {"source": "camfit", "text": "진짜 너무 좋아요 !!\r\n매번 가는 캠핑장 입니다 강추 시설 너무 깨끗하고 너무 좋아요", "rating": null, "author": "캠퍼703930", "date": ""}, {"source": "camfit", "text": "모든게 완벽한 캠핑장!!! 개별화장실은 너무 깨끗하고\r\n사이트도 엄청넓음\r\n캠핑장에있는 강아지들도 사람좋아하고 강아지들이 뛰어놀수있는\r\n공간도있어 좋음\r\n새벽에 닭이 우는데 ㅋㅋㅋㅋ 저희가족은 그냥 그려려니해서 \r\n귀마개주시는데 안해도 잘잤음\r\n담에 또 가고싶은 캠핑장!!!", "rating": null, "author": "윤빵이", "date": ""}, {"source": "camfit", "text": "명당자리에 갔던 캠핑장중 최고였어요~~", "rating": null, "author": "캠퍼520299", "date": ""}, {"source": "camfit", "text": "시설 좋고 조용한 캠핑장이었습니다. 방문의사100%", "rating": null, "author": "방가루", "date": ""}, {"source": "camfit", "text": "생각보다 아담한 캠핑장이였어요~\r\n계단형식에 옆사이트에 방해없어 좋았구요~\r\n화장실이나 개수대도 가까웠어요~\r\n지붕(?)아래에서랑 데크위에서는 화롯대사용불가하니 참고해주세요~\r\n매점도 무인으로 운영되고 있는데 카드는 안되고 입금만 가능해요~~~\r\n날씨도 좋았고  근처에 갈만한 리스트도 알려주셔서 둘째날은 수타사랑 농촌체험마을까지 가서 구경갔어요\r\n또 가고싶어서 5월달까지 예약해버렸네요", "rating": null, "author": "키다리레몬", "date": ""}, {"source": "camfit", "text": "최고였습니다. 바닷가에 채집. 바다뷰. 날씨", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "처음 다녀왔는데 좋았습니다. \r\n아이들 놀거리가 많아요", "rating": null, "author": "천둥", "date": ""}, {"source": "camfit", "text": "풍경이 정말 멋져요.\r\n화장실 개수대 모두 깨끗하고 온수도 엄청 잘 나와요.\r\n샤워실도 탈의하는 공간은 함께 쓰지만 샤워 부스가 나눠져 있어서 좋았어요.\r\n걸어서 갈만한 거리에 카페도 있고 작은 마트도 있어서 편리했어요.", "rating": null, "author": "캠퍼90538", "date": ""}, {"source": "camfit", "text": "매너타임 없음 밤까지 중국인들 기타치고 소리치고 난리남 난생처음 경험함 ㅋㅋㅋㅋㅋ", "rating": null, "author": "캠퍼692023", "date": ""}, {"source": "camfit", "text": "너무 좋아하는 캠핑장입니다 머물수록울산바위의 기를 받는 느낌~~^^ 눈호강하며 즐거운캠핑하고 왔어요", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "예약하기 힘든 이유가 다 있는법이죠 잘 쉬었다 갑ㄴㄱ다", "rating": null, "author": "드림밀", "date": ""}, {"source": "camfit", "text": "조용한 분위기 즐길수있는 캠핑장이예요\r\n매너시간도 잘지키고 시설도 깔끔해요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "너무 좋았어요  \r\n화장실깨끗하고 사이트넓고 바로앞 바다라 전망도 좋아았어요", "rating": null, "author": "한지녕고지녕고", "date": ""}, {"source": "camfit", "text": "올해 첫 캠 어디로 가지 ~ 하다가 캠프더쉼 또 방문 했어요 ㅎ ㅎ 역시 언제와도 관리 정말 잘 되있고 사장님 너무 친절하셔요. 매점도 잘 되어있어서 급히 필요한것들 다 구매 가능하구요. 곧 또 봬요 ㅎ ㅎ", "rating": null, "author": "캠퍼880932", "date": ""}, {"source": "camfit", "text": "좋아요  작년갔던곳인데 이제  올리네요\r\n거의 전세캠 하고  왔네요 사이트 널찍 널찍하고  조용하게  잘 지내다  왔습니다\r\n뒷집 고양이 인지  고양이가  너무너무  귀여웠던  기억이  있어요 ^^", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋은 캠핑장이에요. 바다/갯벌 뷰이고, 바다보다 고도가 높은 층에 있어서 멀리 좋은 뷰를 감상할 수 있었어요.", "rating": null, "author": "캠퍼806200", "date": ""}, {"source": "camfit", "text": "비가와서 아쉬웠지만 ㅠㅠ\r\n화장실 샤워장 깔끔하니 너무 좋았습니다^^", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "뷰는 끝내줍니다\r\n사장님도 친절하시고 개별 화장실이라 편하고 씻고  지냈네요  사진이  별로 없네요  눈으로만  저장 했네요~~^^\r\n다시 가고 싶네요", "rating": null, "author": "캠퍼단미", "date": ""}, {"source": "camfit", "text": "너무 좋아요 시설도 깨끗하고 캠장님도 너무 친절하시고 저희 강아지 마주치고 이뻐라 해주셔서 감사합다 . 저만 알고 싶은 캠핑장이라 소문 안났으면 좋겠지만 ㅠㅠ그만큼 만족 했습니다.조만간 또 방문할 예정이용 :) 덕분에 좋은 시간 보냈습니다!    감사합니다❤️", "rating": null, "author": "캠퍼941903", "date": ""}, {"source": "camfit", "text": "첫캠핑장소였습니다👍🏻\r\n집에서 가까워 좋았고 깔끔하니 좋았습니다", "rating": null, "author": "유저 비공개", "date": ""}, {"source": "camfit", "text": "4번 사이트였는데 사람이 많이 없어서\r\n데크8번으로 옮겼어요.\r\n데크팩도 없었는데 캠장님 빌려주셔서 감사합니당~\r\n사람이 없어서 화장실 혼자쓰고. 개수대도 깔끔하고 \r\n나만 노래 틀어서 시끄럽고 분위기 좋았어요\r\n혼자라 낯가림 이슈로 캠프파이어 못나가고 \r\n알콜섭취로  잠을 잤어요.  훗\r\n담에 또 조용히 솔캠하러 방문하겠습니다~~~~", "rating": null, "author": "캠퍼385453", "date": ""}, {"source": "camfit", "text": "신생캠핑장인만큼 전체적으로 깨끗하고 정비되어있어서\r\n이용하는동안 너무 편하게 잘 쉴 수 있었습니다~\r\n사이트들이 약간의 계단식형태라서 공간분리도 좋고\r\n주변이 산으로 둘러쌓여있어서 계절별로 매력있을 것 같아요\r\n매점에도 등유를 포함해서 다양하게 준비되어 있고\r\n와이파이도 준비되어 있어 산속이라 데이터가 안터질 때\r\n연결해서 잘 사용했네요! 조만간 또 방문하려합니다!", "rating": null, "author": "캠퍼107782", "date": ""}, {"source": "camfit", "text": "아이들위한 이벤트도 있어 즐거웠어요 \r\n캠핑장도 여유롭고 맥주도 👍", "rating": null, "author": "캠퍼370880", "date": ""}, {"source": "camfit", "text": "첫 차박이었는데 너무 좋았어서 바로 다음주 또 예약했습니다.. ㅎ", "rating": null, "author": "캠퍼942114", "date": ""}, {"source": "kakao_blog", "text": "양주 일영무두리 캠핑장 | 서울 근교 자연 속 힐링 캠핑, 아이와 타프 사이트 아래 우중 캠핑", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "[캠핑/장흥]8월캠핑 일영무두리캠핑장 / 여름추천 캠핑장 일영무두리캠핑장.", "rating": null, "author": "", "date": "2025-08-11"}, {"source": "naver", "text": "[캠핑/여름캠핑]일영무두리캠핑장 / 여름 최애캠핑장은 일영무두리캠핑장 / 여름 캠핑 패슬로우 매릭돔304", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "[여름/캠핑]일영무두리캠핑장/여름캠핑 일영무두리 / 양주 타프존 캠핑장.", "rating": null, "author": "", "date": "2024-07-23"}, {"source": "naver", "text": "24.06월말경 양주 일영무두리 캠핑장 with. 지형, 도현(아들), 지우(딸) 안녕하세요. 꿈꾸라입니다^^ 여름 무더위가 오기 전에는 캠핑 시즌이지요~ 그래서 꿈꾸라가 친구와 함께 경기도 양주 무두리 캠핑장을 다녀왔습니다. 아마 생소하신 분들도 있으실텐데요~ 서울 녹번쪽에서는 1시간 거리도 되지 않습니다 ^^ 양주 일영무두리 캠핑장 좋은 점! 1. 방방이가 있다(트램플린) 2....", "rating": null, "author": "", "date": "2024-07-23"}, {"source": "naver", "text": "첫번째 캠핑은 포천꿈에그린캠핑장 두번째 캠핑은 연천달그린캠프 세번째 캠핑은 원주한울오토캠핑장 방문객은 밤10시까지만 이용가능하고 지인, 친구, 동료 게스트는 숙박 불가하다. 또 음악은 밤9시까지만 가능, 11시부터는 매너타임이고 12시엔 취침해야한다. 일영무두리캠핑장의 나눔텃밭 텃밭이용도 가능한가보다. 단 해당 농작물 수확 기간에 따라 다르기에...", "rating": null, "author": "", "date": "2024-10-15"}, {"source": "naver", "text": "양주일영 무두리캠핑장 너무 잘 다녀왔어요 낮에는 진짜 신나게 놀았는데 새벽에 몰아치는 빗소리에 조금 무서웠네요 .. 신랑이 근무라 애둘 데리고 갔는데 빗소식에 타프와 데크존으로... 소리정도 였어서 아주 만족중입니다 집으로 돌아와보니 여기저기 너무 많은 비 피해가 있었던터라 걱정과 동시에 다행이구나 싶더라구요ㅠ 모두가 안전하고 즐거운 캠핑 되시길 바래요", "rating": null, "author": "", "date": "2025-07-22"}, {"source": "naver", "text": "양주 장흥 캠핑장 수영장 계곡 당일 피크닉 일영무두리캠핑장", "rating": null, "author": "", "date": "2024-06-08"}, {"source": "naver", "text": "곳이었어요- 일영무두리캠핑장은 당일 피크닉 존이랑 캠핑장이 나눠져 있어요 : ) 관리실과 수영장을 기준으로 왼쪽은 캠핑하시는 분들 오른쪽은 당일 피크닉을 할 수 있는 곳인데요- 보통 캠핑장에서 당일 캠핑을 하려면 캠핑장과 체크인 시간이 똑같아서 시간 적으로 아쉬울때가 많았거든요 그런데 일영무두리캠핑장은 오전 10시부터 체크인이 가능하고 저녁 9시까지...", "rating": null, "author": "", "date": "2024-06-08"}, {"source": "naver", "text": "서울근교 일영 수영장캠핑장_일영무두리캠핑장 2박3일(24.05.24~05.26)", "rating": null, "author": "", "date": "2024-05-29"}, {"source": "naver", "text": "#서울근교캠핑장 #고양시근처캠핑장 #수영장캠핑장 #고양수영장캠핑장 #일영유원지 #일영캠핑장 #코베아에버닌제리 아주아주 오래 전 온가족이 함께 캠핑을 했던 곳 그동안 연천으로 자주 가다가 집근처로 알아보던중 캠핏에 일영무두리캠핑장이 나와 예약함 우리집에서 20분거리~ 2박만 가능해 일단은 금요일 저녁에 대충 피칭하고 잠 엄청 넓다~ 아주 예전에 왔을때보다...", "rating": null, "author": "", "date": "2024-05-29"}, {"source": "naver", "text": "서울과 가까운 양주 일영유원지에 위치한 일영 무두리 캠핑장은 약 10000㎡의 넓은 대자연에서 마음껏 캠핑을 즐길 수 있는 야영장이다. 일영계곡을 끼고 있어 어린이 물놀이에 좋고 여름철에 한해 대형 수영장을 운영한다", "rating": null, "author": "", "date": ""}, {"source": "naver", "text": "서울과 경기도에서 30분이면 닿을 수 있는 양주 일영유원지에 위치한 일영무두리캠핑장은 약 3000여 평의 넓은 대자연에 자연을 느낄 수 있는 야영장이다. 야영장 바로 옆에 일영계곡을 끼고 있어 캠핑가족에게 많은 추억을 선사한다. 일영무두리캠핑장
