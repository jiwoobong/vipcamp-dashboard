7602_d85298dc7f.jpg"}]}, {"source": "camfit", "text": "벗꽃도 이쁘고 거리도 가까워 좋긴한데 새벽에 울어데는 닭들덕에 잠이 좀 부족했네요", "author": "캠퍼달걀", "date": 1713081578380, "zone": "파쇄석", "site": "15-계곡앞", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20240414_100240_26cdd85a4a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20240414_100240_26cdd85a4a.jpg"}]}, {"source": "camfit", "text": "수영장 데크쪽은 소음이\r\n너무 심햇어요", "author": "함박파파", "date": 1697933471770, "zone": "수영장데크", "site": "L번", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "매너타임 전혀 안지켜짐..관리 아예 안되는 수준이네요.. 밤에 너무 시끄러워서 다신안갈거에요. \r\n시설은 신식은 아니어도 깨끗했어요. 따뜻한물 잘나오구요.", "author": "캠퍼447351", "date": 1697857801945, "zone": "파쇄석", "site": "06-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "사장님 친절하시고 매점에 없는게 없어서 편했습니다. 개수대 온수 잘 나오고요. \r\n전기 추가 했으나. 추가 안한 옆집이랑 같이 써야하고 용량은 알아서 조절 해야 합니다.  600에 추가 500했는데 1000 안되게 틀었는데 전기 나가서 그냥 600정도만 사용했어요..일아서 조절해야합니다. 전기 추가 했어도.. 옆집이랑... 알아서. 조절.. \r\n전기 추가하지말고 쓰세요;; 돈아깝\r\n 샤워실 미흡했고(샤워안함..) 데크쪽 화장실은 낡고 조금 더러웠어요. 점심때 아기가? 변기에 똥칠 해 놓은거 대충 닦은듯 한데... 다음날까지 그대로... \r\n 옆 사이트 너무 시끄럽고 낮엔 싸우고 밤엔 떠들고. 12시 넘어 잠들때까지 떠들더라고요. \r\n 오죽하면 아이들이 너무 시끄러워.. 저 사람들 너무한다.라고 할 정도요.. 사장님께 연락 하려다 참았어요.. 매너타임 후엔 순찰 한번 돌아주심 좋을 것 같아요...", "author": "캠퍼469408", "date": 1697709193899, "zone": "데크", "site": "14", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "일요일 예약을 하니 데크라인쪽에는 한팀도 없고저희만 자게 되었습니다.. \r\n맘씨좋은 여사장님이 데크바꿔도 된다고 하셔서 8 데크로 옮겨서 세상 편하게 놀다왔습니다\r\n매너타임없이 늦게까지 영화보고, 시끄럽지 않은 조용한 아침도 맞이하고..\r\n퇴실도 여유있게 해주셔서 편하게 잘 놀다 왔습니다~\r\n다음에도 또 놀러갈께요~", "author": "유저 비공개", "date": 1697469358849, "zone": "데크", "site": "10", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008381_aa1f4cc43a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008381_aa1f4cc43a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1000008378_7d1bf6f519.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1000008378_7d1bf6f519.jpg"}]}, {"source": "camfit", "text": "두번째 방문해요~\r\n날씨가 좋아서 너무너무 좋았습니다", "author": "STYS", "date": 1697424746625, "zone": "수영장데크", "site": "E번", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7982_77c9a5cf75.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7982_77c9a5cf75.jpeg"}]}, {"source": "camfit", "text": "설마했지만 역시 좋았던 캠핑이었습니다\r\n조용하고 넓은 사이트! 편의시설과 주변 경치! 산책로까지 가깝고요^^\r\n그 중 가장 최고는 친절하신 \r\n사장님 내외분 덕분에 좋은 추억 남겼습니다", "author": "루비아빠", "date": 1697279117495, "zone": "파쇄석", "site": "14-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "아이들 놀 거리가 많고 화장실 온수도 잘 나와요\r\n사장님도 친절하신데, 큰 아이들이 많아서\r\n어린 애기들은 좀 치여서, 애들 좀 더 크면 또 오고 싶네요\r\n화장실과 샤워실이 같이 있는 건 좀 불편하고\r\n매너타임은 잘 안지켜지는데, \r\n그래도 아이들이 넘 좋아할만한 곳이에요 ㅎㅎ", "author": "캠퍼396990", "date": 1697112450952, "zone": "파쇄석", "site": "04-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "자리가 너무 마음에 들었어요\r\n생각보다 자리도 넓고 이제 나무도 단풍이 드네여~~\r\n비가 와서 밖에서 많이 놀지는 못했지만 운치있고 좋았어요~~", "author": "캠퍼289925", "date": 1696935133920, "zone": "파쇄석", "site": "06-계곡앞", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/2_B0_B7_AC_0_42_EC_4_E57_BE_57_495_D3_AA_84528_56a6848819.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_2_B0_B7_AC_0_42_EC_4_E57_BE_57_495_D3_AA_84528_56a6848819.jpeg"}]}, {"source": "camfit", "text": "아이들과 함께 온 가족들한테 좋은 장소 같아요.\r\n커플은 좀 시끄럽고 정신사나울 수 있습니다.\r\n화장실 시설은 좋은편이 아니였어요.\r\n하지만 서울에서 접근성이 좋은 곳이라\r\n급하게 예약해서 잘 놀고왔습니다", "author": "캠퍼367293", "date": 1696861623410, "zone": "수영장데크", "site": "B번", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "연휴에가서 그런지 엄청 소란스러운 캠핑이됫내요 가족단위가 많고 아이관리를 잘하는 가족이있는가 하면 아닌가족도 있어요\r\n여기는 딱 가족아니면 2팀 지인캠핑이 적당할것같아요\r\n화장실 샤워실 개수대 잘 되어있지만 화장실에서 따뜻한 물은 안나오고 개수대랑 샤워실만 따뜻한 물 나와요", "author": "유저 비공개", "date": 1696850016280, "zone": "데크", "site": "05", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "위치도 좋고 날씨도 좋아서 잘 다녀왔어요~\r\n다만 집게벌레가 데크 아래서 자꾸 올라와서 잡느라 진땀 뺐네요; 그리고 데크가 연결되어 있어 다른분들 이동하실때 쿵쿵 울리는 소리가 나네요", "author": "STYS", "date": 1696563173325, "zone": "데크", "site": "03(계곡앞)", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7769_4ba453aff2.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7769_4ba453aff2.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_7771_c149c5d1ef.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_7771_c149c5d1ef.jpeg"}]}, {"source": "camfit", "text": "2박3일 잘 보내다가 갑니다 !!! \r\n1번 사이트는 파쇄석 소리가 많이 거슬리긴 하네요. 따로 바닥에 무얼 깔아둬야 할듯 싶어요...그리고 새벽에 강아지 소리가 매우가....ㅋ 이곳저곳에서...ㅋ  이것들만 아니면 괜찮은듯싶어요 ㅋ 다음엔 다른 사이트로 한번 가고싶네요 !", "author": "유저 비공개", "date": 1696326405417, "zone": "파쇄석", "site": "01-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20231001_160929_2_84de29c0c2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20231001_160929_2_84de29c0c2.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20231001_164916_2_45343ae206.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20231001_164916_2_45343ae206.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20231001_184623_2_138562521a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20231001_184623_2_138562521a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20231002_154216_1_381f1df5ec.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20231002_154216_1_381f1df5ec.jpg"}]}, {"source": "camfit", "text": "급하게 알아보다 빈자리가 있어 갔어요~ 후기를 보니 좋다 싫다 늘 그렇듯 …데크보다는 파쇄석공간이 넓어서 파쇄석으로! 가보니 넓직~하고 깨끗하고 잘한듯^^  다른분들 후기에 덧붙여보자면 닭소리 개소리 밤낮없이 뜬금포로 들리긴하는데 크게 거슬리지 않았고, 화장실은 두칸, 그러나 냄새안나고 깨끗한 편에 휴지 떨어지지 않아서 괜찮았고, 추워서 샤워는 패스 ㅋ. 뜨신물 음청 잘나오고 수압좋고~ 저희는 전반적으로 괜찮았어요~ 아이도 그네타고 잼나다하고^^. 단 한가지 개인적으로 아쉬운점이라면 , 옆칸이 트레일러같은걸 가져오셨었는데 밤새 후웅?~~ 하는 모터소리 같은게 나서 잠자다 깨면 귀에 쏙쏙;;;  트래일러들은 한쪽으로 모아놓음 더 좋지 않을까?~~ 하는 보통 텐트치는 사람의 개인의견였습니다!  다음에 또 갈께요^^", "author": "유저 비공개", "date": 1696321943967, "zone": "파쇄석", "site": "19", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "애들이 많고 사이트가 좀 좁지만 편의점도 가깝고 친절해서 좋았습니다. 주변에 마장호수 산책도 좋았어요", "author": "스응우", "date": 1696314342526, "zone": "파쇄석", "site": "03-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_6711_e3b70bd1cb.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_6711_e3b70bd1cb.jpeg"}]}, {"source": "camfit", "text": "쾌적하고 따뜻한 물 잘 나오네요~", "author": "유저 비공개", "date": 1696309649333, "zone": "파쇄석", "site": "04-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "분위기와 사장님 다 좋으셨어요 ㅎㅎ 집 근처에 가까운 캠핑장이여서 좋았습니다.", "author": "하율이아빠", "date": 1696250353912, "zone": "파쇄석", "site": "16", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "잘 쉬고 왔어요.\r\n계곡도 있고 전체적으로 넓어서 좋아요", "author": "캠퍼460898", "date": 1696241934155, "zone": "파쇄석", "site": "22", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "2박3일동안 즐캠했습니다😀\r\n놀이방도 있어서 애들이 텐트근처로 오질않아요🫢\r\n아이도 부모도 힐링했습니다🤣", "author": "유저 비공개", "date": 1696222659099, "zone": "데크", "site": "11", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230929_180719_241e37fe9d.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230929_180719_241e37fe9d.jpg"}]}, {"source": "camfit", "text": "사진이 없지만\r\n계곡 깨끗하고 좋아요.\r\n사이트도 적당하고 관리 잘되어 있어요.\r\n매점 팥빙수 맛있어요.\r\n흡연구역이 화장실 바로 앞에 있어서 좀 요상해용.", "author": "캠퍼1253", "date": 1696138770880, "zone": "파쇄석", "site": "07-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "캠핑의 계절을 만끽하고 왔어요~~ \r\n각 사이트 넉넉하고, 벌레도 거의 없고, 즐거운 캠핑하다가 왔어요~~ \r\n다만, 샤워장이나 화장실등 편의시설은 조금 협소한편이긴해요^^;;", "author": "캠퍼197170", "date": 1696050460318, "zone": "파쇄석", "site": "22", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "아기자기하게 지내다 오기 좋은 곳 같아요", "author": "캠퍼169334", "date": 1695608189951, "zone": "데크", "site": "05", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "가을 풍경이 정말 예뻐요.\r\n사이트도 넓고 동생네 가족이랑 부모님 모시고 다녀왔는데 아이들 놀이할 곳도 있고 정말 좋은 시간 보내고 왔네요. 재방문 의사  있는데 빈자리가 없네요!", "author": "캠퍼218830", "date": 1695549349213, "zone": "파쇄석", "site": "20", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "옆 요양원에서 새벽 3~4시부터 닭이 꼬꼬댁 울기시작\r\n닭이 꼬꼬댁하니 동네 개들 멍멍멍 짖는걸로 대답해줌--;;;\r\n거즘 꼬박 날새고 9시쯤 철수해서 나올때까지 닭은 꼬꼬댁~\r\n아직도 귀에서 꼬꼬댁소리가 윙윙거리는듯..\r\n시설이나 청소환경은 그럭저럭 괜찮았지만 다시는 가고싶지않음!!", "author": "유저 비공개", "date": 1695533965317, "zone": "파쇄석", "site": "14-계곡앞", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "편의시설과 좀 멀고.. 밤새 닭, 개 울음소리때문에 잠설침..\r\n\r\n힘든 하루..", "author": "박우동", "date": 1695529158412, "zone": "파쇄석", "site": "15-계곡앞", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "피칭할 때 개똥땜에 고생했네요. 바로 전에 매너없는 견주때문에 이게 뭔고생인지. 개똥 생각지도 못하고 밟아서 신발에 차에… 이런적 처음이네요! 25사이트쪽 앞쪽에도(주차라인) 개똥이 또 있던데 이제는 개똥 확인하고 피칭 해야하나?…. 불쾌했습니다.  그리고 흡연구역은 진짜 바꾸셔야할꺼 같아요. 아이들이 놀이시설 가다가 매번 담배냄새를 맡게 되네요. 데크쪽은 흡연구역이 잘 되어 있던데 파쇄석 흡연구역은 정말 아닌거 같습니다.", "author": "캠퍼365719", "date": 1694995329668, "zone": "파쇄석", "site": "10-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "1. 간접흡연과의 전쟁\r\n     화장실 앞 좁은 길목에 흡연구역 설치로 어쩔수 없이\r\n     자연스럽게 담배연기를 흡입하게됨\r\n     대낮에 갑자기 옆사이트(지인들과 같이옴) 분들이\r\n     한잔하시다 사이트에서 담배을 태우심.(와이프가\r\n      담배피우지 말아달라고 이야기 함)\r\n2. 비오는날 새벽(12:00경) 갑자기 전기나감\r\n     4사이트에 배전반 1개로 쓰다보니 새벽에 갑자기\r\n     전기가 나가 다음날 오전에 복구됨\r\n3. 매너타임 잘 지켜짐.", "author": "유저 비공개", "date": 1694947836719, "zone": "파쇄석", "site": "20", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "사장님도 친절하고 좋아요\r\n피크닉자리도있어 파전도 라면도 팔고 좋네요^^\r\n개수대앞에 샤워실앞에 흡연구역이 많이 아쉬웠습니다.\r\n데크도 크고 조용하고 아이들이 놀수있는 공간도 많구 좋아요^^  여캠장님 욕하는 친구들 따끔하게 관리해주셔서 진심으로\r\n좋았네요", "author": "태드래곤", "date": 1694928791678, "zone": "데크", "site": "05", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "옆에 계곡도 있고 아이들 놀만한 공간도 있어서 좋네요 ^^ 2번이었는데 양옆에 나무가 있어서 텐트(코베아 몬스터)가 크긴한데 피칭이 좀 불편합니다 ㅠㅠ", "author": "유저 비공개", "date": 1694927370892, "zone": "데크", "site": "02(계곡앞)", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "평지라 아이들이 다니고 좋고 화장실이 몇칸 없지만 부족하지 않아요! 샤워실도 개인칸막이 있어서 좋구요.\r\n잼있게 놀다왔습니다. 그래서 또 재방문 합니다! ㅎㅎ", "author": "캠퍼365719", "date": 1694500356425, "zone": "파쇄석", "site": "27", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "옆에 계곡이 있어 시원하게 잘 쉬다 갑니다:)\r\n캠핑장 부근에 마장호수도 있어서 너무 좋았습니다!", "author": "캠퍼389983", "date": 1694489376672, "zone": "수영장데크", "site": "F번", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8121_61f5ae008d.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8121_61f5ae008d.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8128_059c5fd062.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8128_059c5fd062.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_8127_548440d905.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_8127_548440d905.jpeg"}]}, {"source": "camfit", "text": "캠핑도 할수 있고 당일치기 물놀이도 가능한!!\r\n일산에서 부담없는 거리에 있는\r\n아들들이 너무 좋아라하는 수영장입니다\r\n바로옆 계곡에서도 물놀이 가능하구요\r\n무엇보다 물놀이하며 구워먹는 삼겹살이\r\n최고로 맛나지요 ㅋㅋ\r\n하루죙일 먹고 물놀이하고 또또또 갈겁니다", "author": "박가네집사", "date": 1690795288000, "zone": "계곡수영장 피크닉", "site": "12", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1589_57b15bd6a7.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1589_57b15bd6a7.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1580_daf532e314.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1580_daf532e314.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1593_be8e52907a.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1593_be8e52907a.jpeg"}]}, {"source": "camfit", "text": "방문인원포함 4인이넘지 않음에도\r\n교대로 방문했던 인원 체크가 잘안되서\r\n추가금 4만원이나 달라는거 2만원냈는데\r\n주차료만원만 냈어도 됐던거 같아요..", "author": "주임님", "date": 1690689009498, "zone": "파쇄석", "site": "05-계곡앞", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "오래되긴했지만 화장실이나 샤워실등 내부 시설들이 깨끗하게 잘관리되고 있어요", "author": "쌍쌍빠", "date": 1690582075911, "zone": "방갈로(취사공간o)", "site": "2번", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비기 많이 왔지만 다음날 철수할때 해가떠서 텐트 싹 말리고 나왔어요 계곡 물소리도 좋고 한적하니 아주 좋았습니다", "author": "캠퍼355047", "date": 1689905395128, "zone": "파쇄석", "site": "28", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "하루 알차게 보냈습니다.\r\n사장님 내외분께서 아이들 위험관리와 \r\n수영모 착용및 수질관리를 철저히 해주셔서 \r\n좋았던거같습니다.\r\n깨끗하고 계곡은 물이 얼음 물이네요 ㅎ\r\n다음에 또방문하겠습니다.", "author": "우주아래", "date": 1688371785126, "zone": "계곡수영장 피크닉", "site": "14", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230702_174826_059fc27ff5.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230702_174826_059fc27ff5.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230702_160656_dc314871b5.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230702_160656_dc314871b5.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230702_174837_ddfecaa451.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230702_174837_ddfecaa451.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230702_174857_551ac403f4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230702_174857_551ac403f4.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/Screenshot_20230703_170520_Gallery_1aa5409837.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_Screenshot_20230703_170520_Gallery_1aa5409837.jpg"}]}, {"source": "camfit", "text": "이번주는 너무 더웠어요 더운 계절엔 파쇄석사이트기준으로 계곡쪽은 해가 많이 들어와서 덥습니다.\r\n파괘석사이트는 대부분 넉넉하게 넓습니다.\r\n매너타임은 한두사이트가 너무 힘들게했었지만 관리는 안되는것같습니다.\r\n쓰레기봉투 천원은.별거아니지만 맘 상하는 느낌이고요\r\n트레일러 추가요금은 무슨이유로 더받는지는.모르겠어요\r\n가격도 좀 높죠\r\n이런점이 좀 그랬고 매점가격는 양호하고 화장실은 양호 샤워실은 두칸이지만 양호했고 몰리는 시간에 따뜻한 물이 안나왔어요\r\n친절한데  어러모로 약간 야박한 느낌이예요 \r\n전체적으로 중간정도예요", "author": "피어", "date": 1687704312581, "zone": "파쇄석", "site": "04-계곡앞", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "작년부터 다닌 사람이 작성해보는 장단점 \r\n\r\n장점\r\n1. 서울에서의 접근성 (강서구 기준 1시간)\r\n2. 가족, 지인들과 모임하러 가기 좋은 캠핑장\r\n3. 초딩 저학년이 놀기에 몹시 크고 좋은 수영장(슬라이딩, 수심1미터) + 놀이시설(놀이방, 트램펄린, 그네)\r\n4. 안전요원까지는 아니지만 수영장 관리인이 지켜보고 있음\r\n\r\n단점 \r\n1. 수영장 구비한 다른 캠핑장보다 가격대가 높음 (올해 1만원 가격 인상. 2박에 16만원은 부담스러워짐)\r\n2. 수영장 수용인원 대비 몹시 부실한 샤워장 (샤워장 개수도 적고 개미오줌보다 못한 수압과 오후 6시만 되어도 무조건 찬물샤워 해야함)\r\n3. 매너타임 관리가 안됨 (밤11시나 새벽5시에도 좀 시끄러운 편)\r\n4. 다른후기들에도 적혀있지만 부수적인거에 추가요금을 계속 받아서 야박하다는 느낌을 지울 수가 없음", "author": "유저 비공개", "date": 1687697762955, "zone": "데크", "site": "14", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "캠지기분들은엄청친절하시데\r\n매너타임지나서까지큰소리로떠들어데서잠도못자고\r\n최악의캠핑이었네요 \r\n근데3팀도예약되느건가요?", "author": "캠퍼397036", "date": 1687666230192, "zone": "파쇄석", "site": "21", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비가 엄청와서 속상했지만 잘놀다갑니다\r\n사장님 특히 여사장님 친절하시구요 계곡에서 올챙이랑 도농룡잡고 놀았어요  사이트가 조금 작았지만 서울에서 가까운편입니다  샤워장은 보수가 필요할꺼같아요 너무 좁고 불편해요", "author": "캠퍼330302", "date": 1687340951411, "zone": "데크", "site": "01(계곡앞)", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230528_155949_8665639b0a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230528_155949_8665639b0a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1685283125176_47198f5770.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1685283125176_47198f5770.jpg"}]}, {"source": "camfit", "text": "사장님이 6시에 일어나셔서 주변 청소하시고 수영장 청소기 돌리시더라구요. 청소기가 물속에서 무슨청소를 하는지 열심히 돌아는다니는데 신기해서 한참 봤어요. 수영장 오픈해서 가격올린것같은데 지금 물차가워서 제대로 놀지도 못해요. 그래서 1박에8만원은 아직 아니지않나.. 싶어요.", "author": "유저 비공개", "date": 1685960470761, "zone": "파쇄석", "site": "25", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "방갈로 사용했습니다.\r\n곰팡이 냄새.\r\n벌레. 이불 관리 등 안 좋은 평이 많아 걱정했으나,\r\n\r\n물가 옆 방갈로인 점 감안하면 괜찮았습니다.\r\n환기 시키니 곧, 냄새는 사라졌습니다.\r\n\r\n위치 상으로도,\r\n관리실, 화장실, 수영장 모두 가까워서 편했습니다.\r\n\r\n옆에 계곡 물소리 듣고,\r\n아이들 노는 모습 볼 수 있어서 그 점도 너무 좋았습니다.\r\n\r\n수영장 넓고, 미끄럼틀 너무 잘 되어있어요.\r\n\r\n사장님 친절하시고, 응대 잘 해주셔서 너무 즐거웠습니다.\r\n\r\n재방문 의사 있습니다.", "author": "캠퍼369912", "date": 1685937342477, "zone": "방갈로(취사공간o)", "site": "3번", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230604_144815_1fbc72449b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230604_144815_1fbc72449b.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230604_145511_88e06ebecd.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230604_145511_88e06ebecd.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230603_154558_8a492770cb.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230603_154558_8a492770cb.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230604_144826_9f56010049.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230604_144826_9f56010049.jpg"}]}, {"source": "camfit", "text": "데크상태가 너무 안좋아요,", "author": "캠퍼108253", "date": 1685434368558, "zone": "데크", "site": "01(계곡앞)", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "데크상태가 너무 안좋아요.", "author": "캠퍼108253", "date": 1685434299645, "zone": "데크", "site": "02(계곡앞)", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "비가왔지만 잘 즐기다가 왔어요!", "author": "비단맘", "date": 1685345177073, "zone": "데크", "site": "08", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1685345136854_ae2fdfdb52.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1685345136854_ae2fdfdb52.jpg"}]}, {"source": "camfit", "text": "이쪽자리는 계곡 화장실 개수대 키즈룸 방방장 모두 가까운게 좋은데, 진짜 시끄러워요\r\n바로 뒤 펜션에 하필 술자리가 새벽같이..\r\n첫날은 노랫소리 둘째날은 술주정에 잠못이뤘지만, 계곡물소리를asmr삼아 잤습니다\r\n3박4일중 3일이 비내렸는데 빗소리보다 큰 계곡 물소리 ㅋㅋ\r\n그래도 관리잘해주신 캠장이라 잘 지내고갑니다\r\n마장호수가 가까워서 2일연속 걸었는데 너무 조하요", "author": "백호흑룡", "date": 1685339273490, "zone": "수영장데크", "site": "L번", "season": "spring", "numOfDays": 3, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/CA_8_E37_E9_510_A_44_D3_91_FE_A91555_C1411_A_812b0b5fb5.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_CA_8_E37_E9_510_A_44_D3_91_FE_A91555_C1411_A_812b0b5fb5.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/2989_F615_5_A9_F_425_E_BCDE_B0_C51_E47_C337_316b78df20.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_2989_F615_5_A9_F_425_E_BCDE_B0_C51_E47_C337_316b78df20.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/10_E19_B7_D_32_B9_4_A20_B633_63_E6_B427198_D_f3147280f6.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_10_E19_B7_D_32_B9_4_A20_B633_63_E6_B427198_D_f3147280f6.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/0_EA_7_B447_3_DC_7_4_D51_96_F7_D745234178_ED_fd31b2c82c.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_0_EA_7_B447_3_DC_7_4_D51_96_F7_D745234178_ED_fd31b2c82c.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/01009_C6_B_09_C3_4_BA_9_BF_78_4_A16_E1_CB_72_EE_8344796e0f.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_01009_C6_B_09_C3_4_BA_9_BF_78_4_A16_E1_CB_72_EE_8344796e0f.jpeg"}]}, {"source": "camfit", "text": "분명 여러사람이 다같이 이용하는 시설인데 두 사이트 예약했다는 이유 하나로 애들 뛰어다니고 비명지르고 블루투스 마이크 크게 켜서 “애들아 재밌게 놀아~!!”라고 술취해서 부추기는 미개한 부모들 옆에서 캠핑하고 왔습니다. 나무바닥이라 다른 사이트까지 바닥이 다 쿵쿵 울리는데 애들이 타인들 사이트까지 우다다 !!뛰어다니고 말리는 사람도 없고 애들끼리 고함지르고 엄마!!!아빠!!!!!소리질러대도 그와중에 으아아아앙!!!!! 우는 아이도 아무도 말리지도 않고  입실부터 퇴실까지 유해시설 수준으로 괴로웠고 부모들은 술취해서 자기들끼리 비명질러대서 시끄러웠고 애들보고 맘껏 뛰어놀라고 부추기는 모임? 부모들 너무 너무 괴롭고 계곡물소리 조차 제대로 듣고 즐기지 못하는 상황에서 견디다가 왔네요\r\n저 진짜 아이들 좋아하는데 왜 노키즈존이 붐이 일어나는지 제대로 알고왔고요\r\n다같이 이용하는 캠핑장에서 애들 교육 똑바로 시키시고 자신없으면 어른들이라도 흥청망청 취해서 정신못차리고 있지 말고 남한테 민폐끼치지 않는 교육 좀 시키세요\r\n진짜 저렇게 늙지 말아야겠다 싶었습니다\r\n캠핑장은 만족스러웠고요 그 주변 미친듯한 부모와 애들 소음이 최악이었습니다", "author": "캠퍼373800", "date": 1685290917974, "zone": "계곡수영장 피크닉", "site": "06", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "자리 좋고 편하게 잘 놀다 왔네요", "author": "주한아린파파", "date": 1685289903437, "zone": "파쇄석", "site": "02-계곡앞", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "매너타임 안지켜지는거(새벽5시부터 펜션손님들 산책하시더라구요)외에는 다 좋았어요, 저희아들은 다녀봄 캠핑중에 제일 재미있었다네요.", "author": "뉴비비", "date": 1684704914574, "zone": "데크", "site": "08", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230520_143044_4843d1883a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230520_143044_4843d1883a.jpg"}]}, {"source": "camfit", "text": "계곡물도 엄청 맑아서 아이들이 놀기에도 좋고 놀이시설도 나름 5세아들에게는 롯데월드같더라구요^^펜션이있어 늦은시간까지 야외 테이블에서 주취자들이 고성방가를 한게 아쉬웠지만 화장실,샤워실도 쾌적하고 뜨거운물도 일륜적이진못하지만 나름 관리잘되어있어요.연식대비 관리잘되있는곳.\r\n다만 매너타임이후 관리자가 관리를 아예 안하시는것같아 조금은 아쉬웠고 중간에 돌이아닌 지푸라기같은 길을 만들어주시면 저녁시간이후부터 조용히 다닐수있을것 같아요.", "author": "캠퍼349846", "date": 1684681405833, "zone": "파쇄석", "site": "02-계곡앞", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230520_193721_7fb4566d1f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230520_193721_7fb4566d1f.jpg"}]}, {"source": "camfit", "text": "잘 다녀 왔습니다!!2박 내내 캠핑장은 청결했고 \r\n아이들 놀이시설도 잘 이용했어요\r\n찬 계곡물에 발만 담구기도 했구요~\r\n사장님도 친절 하시구 좋았어요!!\r\n주변상황은 복불복이니 그려러니 해요 전 ㅋㅋ\r\n마장호수 둘레길 까지 가까워서 데크로 걸어 출렁다리도 건너가보고 좋았습니다!!", "author": "유저 비공개", "date": 1684213630755, "zone": "파쇄석", "site": "14-계곡앞", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1811_dc7949e6ff.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1811_dc7949e6ff.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1853_a10bd178e2.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1853_a10bd178e2.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_1898_7479d8bd5a.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_1898_7479d8bd5a.jpeg"}]}, {"source": "camfit", "text": "사이트가 넓어서 피칭하는데 편했어요.", "author": "캠퍼231743", "date": 1684110437678, "zone": "파쇄석", "site": "25", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230513_131526_bf1b3385d9.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230513_131526_bf1b3385d9.jpg"}]}, {"source": "camfit", "text": "아이가 너무 좋아했어요 사이트 넓고 100점중 90점 입니다. 다만 키즈캠핑으로 검색해서 갔는데 젊은 연인들이 많네요 2.3시까지 영화보고 큰소리로 떠들고~새벽에 아이들 잠투정 소리는 시끄럽다 싫어하고ㅜㅜ 저는 그냥 이해했는데 그들은 아이들이 이해가 안다나봐요 그럼 다른 조용한 커플 펜션이나 노키즈존을 찾아가시길", "author": "캠퍼221485", "date": 1684069363893, "zone": "파쇄석", "site": "27", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "산속 계곡일거라 생각했는데 요양병원과 빌라들 옆에있어요. 요양병원 상호가 밤새 켜져있어서 자려고 불을 꺼도 환했고 토요일은 공사까지해서 시끄러웠습니다.\r\n사장님 부부는 친절하시고 온수도 잘 나왔습니다. 아이들 데리고 또 올수도 있을것 같아요.", "author": "유저 비공개", "date": 1684042732823, "zone": "파쇄석", "site": "17", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "일단 단독으로 사용할 수 있는 넓은 자리가 마음에 들었어요~ 아이와 함께 갔는데 하루종일 놀이방서 노느라 텐트에 들어오질 않았답니다 ㅎㅎ;;; \r\n화장실이 두칸이라 아쉬웠으나 사람이 붐비지는 않아서 다행이였어요~\r\n여름되면 수영장.계곡에서 놀면 좋을듯^^", "author": "러블동안정티쳐", "date": 1684042473068, "zone": "파쇄석", "site": "15-계곡앞", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_20230513_070842_890_a2179fdbba.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_20230513_070842_890_a2179fdbba.jpg"}]}, {"source": "camfit", "text": "6.2m*3.6m 리빙쉘 피칭하기에 충분했습니다.", "author": "캠퍼368517", "date": 1684040265947, "zone": "데크", "site": "14", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230513_163756_52de0fac25.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230513_163756_52de0fac25.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230513_163839_7edc6114df.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230513_163839_7edc6114df.jpg"}]}, {"source": "camfit", "text": "계곡에서 올챙이도 잡고 놀이방도 있어서 애기들이랑 놀기 좋았네요.", "author": "시골남", "date": 1684038758980, "zone": "파쇄석", "site": "28", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230512_194839_eeaa42e9e4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230512_194839_eeaa42e9e4.jpg"}]}, {"source": "camfit", "text": "시설도 깨끗하지 않고\r\n관리도 그닥 … 벌레도 많아서 \r\n화장실 가기가 힘들어요 \r\n기본 첫 방문 쓰레기봉투도 구매라네요 …", "author": "유저 비공개", "date": 1683710608863, "zone": "데크", "site": "04(계곡앞)", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "거리도 가깝고 시설도 괜찬고 특히 애들 놀이 공간이 있어 좋다 ^^\r\n다만 늦게 예약하면 화장실 하고 계수대 이용시 멀~다 ㅎ 그래도 다음에 또 가고픈곳~^^", "author": "연지 아빠", "date": 1683596358375, "zone": "파쇄석", "site": "12-계곡앞", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230415_180210_deceedf662.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230415_180210_deceedf662.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230415_190949_428ae03a17.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230415_190949_428ae03a17.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20230415_175305_c3d188e852.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20230415_175305_c3d188e852.jpg"}]}, {"source": "camfit", "text": "날씨가 좋지않아 걱정했는데 그래도 지붕이 있어 비는 피할수 있었네요~ I,J수영장데크존을 두가족이 빌렸는데 데크가 넓어 좋았습니다. 다만 트램플린이 바로 옆이라 애들 노는 소리가 너무 크게 들리네요. 전반적으로 매너타임도 잘지켜지는 편이고 시설들이 가까이 있어 편했습니다. 다음에 또 방문의사 있습니다.", "author": "유저 비공개", "date": 1683449146063, "zone": "수영장데크", "site": "J번", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1683449096393_73fc5f6e27.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1683449096393_73fc5f6e27.jpg"}]}, {"source": "camfit", "text": "수영장도 간이수영장이아니어서 좋구 미끄럼틀도 봤네요 ㅎㅎ\r\n여름에 물놀이 시작하면 다시방문예정입니다\r\n앞에계곡도 있어서 여름에 진짜 최고일거같네요\r\n트램펄린이 있긴한데... 애들들어가서 노는거 보면 바닥에 닿을정도로 늘어진거 같아서 약간 불안했지만요..;;", "author": "캠퍼50366", "date": 1683434521568, "zone": "데크", "site": "10", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "자리가 넓어서 너무 편하게 이용했어요^^", "author": "캠퍼178518", "date": 1672545869376, "zone": "파쇄석", "site": "18", "season": "winter", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_20230101_123343_768_7062ec4f56.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_20230101_123343_768_7062ec4f56.jpg"}]}, {"source": "camfit", "text": "아이들이 놀거리가 많아서 좋아해요~\r\n사이트 간격이 좁아요\r\n옆에 빌런들 땜에 잠을 못잤어요\r\n매너타임 관리가 안되요....", "author": "유저 비공개", "date": 1672049784122, "zone": "파쇄석", "site": "19", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "데크가 좀 다닥다닥이에여 화장실은 가까워서 좋은데 겨울에는 뒷자리에 해가 안들어서 텐트가 마르지않아서 파쇄석으로 꺼내서 말렸어용ㅋㅋ", "author": "캠퍼217101", "date": 1670734279832, "zone": "데크", "site": "11", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/B7521_A12_31_B7_4_B8_C_A5_C6_68_C1_B56_BF_4_FE_9c2b26079f.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_B7521_A12_31_B7_4_B8_C_A5_C6_68_C1_B56_BF_4_FE_9c2b26079f.jpeg"}]}, {"source": "camfit", "text": "즐거운 할로윈 이었습니다~ 가족단위로 가기 좋아요!", "author": "유저 비공개", "date": 1669755106478, "zone": "데크", "site": "01(계곡앞)", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "아이들이 방방도 타고 놀이방에서도 놀고 동물도 보고 잘 놀았어요~ 캠핑장도 조용합니다~ 가깝고 좋네요. 오가는 길도 예쁘고 식당 카페도 많아요. 즐거운 주말 보냈어요", "author": "캠퍼289925", "date": 1669619960944, "zone": "데크", "site": "13", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "자주 갈거 같네요 \r\n깨끗하고 좋아요\r\n애들 놀거리도 풍부하구요", "author": "캠퍼249661", "date": 1669525971165, "zone": "파쇄석", "site": "12-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "일단 젊은사장님이 \r\n너무 인상도 좋으시고 친절합니다.\r\n더욱이 마음에 드는건 \r\n화장실.샤워실.개수대\r\n정말 깨끗합니다.\r\n관리를 잘하시는것 같구요.\r\n싸이트 파쇄석28번 독립적으로 쓸수있고 \r\n편의시설을 가장가깝게 이용할수있습니다ㅎ\r\n여름에 수영장오픈하면 메일 가겠습니다 ㅋㅋ\r\n토끼도있어서 풀도 주고 그네와 방방이 키즈실내놀이방도 있어서 아이들 놀기 좋구 계곡도 \r\n여름에는 정말좋을거같습니다.\r\n제가 전기매트와이불을 안가지고와서 ㅠㅠ\r\n사정을 얘기하니 걱정해주시고 친절하게 \r\n이불을 빌려주셔서 정말감사했습니다.\r\n다음에 꼭 자주자주 오겠습니다.\r\n지인들도 추천 하겠습니다~^-^~", "author": "우주아래", "date": 1669525505512, "zone": "파쇄석", "site": "28", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221127_114849_33b5d6c1d4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221127_114849_33b5d6c1d4.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221127_114845_b4d24a8c04.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221127_114845_b4d24a8c04.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221127_114711_a20be629ac.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221127_114711_a20be629ac.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221127_114708_f96ec4e493.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221127_114708_f96ec4e493.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/SNOW_20221125_162827_862_eac40e3ac2.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_SNOW_20221125_162827_862_eac40e3ac2.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1669524898752_17aeff36ce.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1669524898752_17aeff36ce.jpg"}]}, {"source": "camfit", "text": "작지만 실내놀이터가 있어서 아이 데리고 가긴 그나마 괜찮은 것 같습니다. 근데 좀 작아서...초등 1~2학년 정도까지가 한계라고 보고요.\r\n수영장은 실외 수영장이라 여름에만 이용 가능하네요.\r\n방방이도 그럭저럭 큰 방방이 있어서 아이들 7~8명 정도 들어가서 뛰는건 무난합니다. 안내판에도 7명까지만 이용하라고 안전수칙 적어놓으셨고요.\r\n\r\n파쇄석 사이트의 경우 옆사이트랑 다닥다닥 붙은 형태긴 하지만, 꽤 넓게 이용 가능하다보니 초대형 텐트가 아니라면 그래도 어느 정도 거리는 좀 띄어집니다.\r\n주차는 사이트 안에 하면 되고요. 공간을 텐트나 캠핑용품들로 많이 채워서 여의치않을 때는 따로 주차할 곳이 있으니 거기 주차하시면 됩니다. \r\n근데 별도 주차장이 그리 넉넉한 편은 아니므로 사이트 안에 주차하지 않으실 분들은 오픈하는 시간 맞춰서 오시는게 좋을 것 같긴해요.\r\n\r\n저희의 경우는, 옆사이트에 트레일러 폴딩 텐트가 하루종일 무시동히터 틀어서 평상시 소음 및 수면시 소음 문제가 있었으며, 2박이다보니 이대로는 안될거같아서 다음날 사장님한테 말씀드렸더니 옆 사이트에 전달을 해주셨고, 해당 사이트 분들도 소음을 인지하시더니 그래도 너무 추우니 밤12시까지만 켜놓고 충분히 데웠다가 끄면 안되겠냐고 하는...나름 말이 통하시는 분들이었고, 실제로 12시에는 히터 작동을 정지시켜서, 둘째날은 그래도 편안하게 수면을 취할 수 있었네요.\r\n\r\n캠핑카, 카라반만 금지시킬게 아니라 트레일러 폴딩 텐트도 냉난방으로 에어컨이나 히터 쓰는 경우는 금지할 것을...고려해보시는게 좋을 것 같습니다.\r\n\r\n샤워실은 좀...개선이 필요할 것 같아요.\r\n문 닫아도 위 아래로 바깥 바람이 숭숭 들어오는 구조라 아이 씻길 때 아이가 너무나도 추워했습니다.\r\n환기 때문에 그렇게 하신것 같은데...더 추워지면 어른들도 씻으면서 추울 것 같아요.\r\n\r\n데크도 노후화 됐다고 후기들이 보이던데, 시설을 좀 더 보수하시면 한강 윗쪽에 사는 사람들은 위치가 가까워서 더 많이 이용할 것 같아요.\r\n그리고 매너타임 다가오면 사이트들 한번 싹 돌면서 공지하시는 것도 좋을 것 같습니다.\r\n제가 두번째 방문한거였는데, 매너타임 공지 한번도 안하시더라고요.\r\n\r\n저희 사이트 옆...트레일러 말고...다른 옆 사람들은 밤 12시 넘어서도 계속 밖에서 시끄럽게 떠들어서 사람들이 많이 연락했는지 결국 캠장님이 출동해서 해결하시긴 했는데, 그 전에 돌아다니면서 혹은 방송이 되면 방송으로라도 공지하셨으면 더 좋지 않았을까 하는 아쉬움이 있습니다.\r\n\r\n규칙을 지키는 사람들만 있는건 아니니깐, 온전히 캠퍼들 자율에 맡기는 것도 좋지않아요 ㅎ\r\n\r\n그리고 철수날에 아이가 오전에 실내놀이방에서 놀다가 패딩잠바를 놓고 온걸 모르고, 그냥 철수해버렸는데요.\r\n나중에 연락드렸더니 택배 접수만 하면 포장 잘해서 보내주시겠다고 하셨고, 실제로도 꼼꼼하게 잘 포장해서 보내주셔서 너무 감사했습니다.\r\n\r\n아무래도 2박 우선으로 받으셔서 자주 가진 못할 것 같지만, 집에서 가까운 편이라 2박 갈 일이 생기면 종종 갈 것 같습니다^^", "author": "유저 비공개", "date": 1669387567811, "zone": "파쇄석", "site": "19", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "급하게 야간피칭 최대한 피해보려고 근처 가까운 순으로 잡은건데 캠핑장도 엄청 크고 애가 놀이방에 가서는 돌아오질 않아서 아늑하게 잘 지냈습니다. 다만 데크 14번은 그늘이라 텐트 결로를 말릴 방법이 없어서 타 사이트 철수 까지 대기했다가 말리고 철수했어요. 등유 파는 것도 좋았습니다. 초저녁에 도착해서 언제 텐트치고 언제 기름 사러가나 고민했는데, 다행히 매점에 팔았어요.", "author": "유저 비공개", "date": 1668919165601, "zone": "데크", "site": "14", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "날씨도 좋고 시골감성이 묻어나는 곳입니다 \r\n옹기종기 아기자기한 맛이 있네요^^", "author": "캠퍼219912", "date": 1668827350164, "zone": "데크", "site": "10", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1_CCBAE_53_DC_6_A_4_F84_8_FCD_AFAD_672_E5_D92_f5dd839564.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1_CCBAE_53_DC_6_A_4_F84_8_FCD_AFAD_672_E5_D92_f5dd839564.jpeg"}]}, {"source": "camfit", "text": "물없는 수영장 앞이라 아이들 다닐때 조금 무서워서 항상 조심시켰어요. 그것빼곤 ㅎㅎ 만족하는 캠핑장이에요. 파쇄석쪽도 가보고 싶은데... ㅋ 자리잡기가 어렵네요 ㅎ", "author": "유저 비공개", "date": 1668427932891, "zone": "수영장데크", "site": "J번", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "우선 데크2번 좁아요. 나무사이에 억지로 한사이트 만든듯해요.\r\n\r\n그리고 데크에 전사람들이 박아둔 피스 그대로있어 위험했어요.\r\n\r\n화장실, 샤워실은 전혀 관리가 안되는듯해요. 가본곳중 최고였어요.\r\n\r\n아이들이 놀만한 곳이 없으니 오실분들 참고하세요.", "author": "유저 비공개", "date": 1668345922523, "zone": "데크", "site": "02(계곡앞)", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/5_A60_AC_22_A7_A6_47_FD_BDF_9_88275_C5033_DB_ff816d2251.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_5_A60_AC_22_A7_A6_47_FD_BDF_9_88275_C5033_DB_ff816d2251.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/E946_C0_D4_E92_F_4_F13_A615_05214_F8_D3_F40_74fa87401d.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_E946_C0_D4_E92_F_4_F13_A615_05214_F8_D3_F40_74fa87401d.jpeg"}]}, {"source": "camfit", "text": "단풍이 곱게 물들었네요~ 캠장님 너무 친절하세요!\r\n계곡이 바로 아래 흐르고 있어서 여름에 오면 너무 좋을거같아요~", "author": "캠퍼115345", "date": 1667782798011, "zone": "파쇄석", "site": "11-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "예전부터 다니던 곳인데\r\n수영장 리모델링 하고는 수영장 데크 처음 이용 했는데\r\n깨끗하고 좋아요^^\r\n후기가 너무 안좋아서 걱정도 조금 했지만.....\r\n잘 먹고 놀다 옵니다 \r\n재방문 의사 200%!!!", "author": "캠퍼278724", "date": 1667711346719, "zone": "수영장데크", "site": "H번", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "경기도권이라 가까와서 좋았으나 너무 유원지에요, 사이트 간격도 좁고 마시고 떠들고 흡연도 마음대로. 추천하고싶진 않네요.", "author": "유저 비공개", "date": 1667710207436, "zone": "수영장데크", "site": "F번", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "계곡도 가깝고 수영장이 잘 갖춰져있어서 아이들 놀기엔 딱 좋았습니다. 캠프닉도 하기좋고 취사도 가능해서좋고~~ 캠핑사이트가 커서 좋았습니다. 샤워시설은 좀 더 넓고 많이 필요할듯 합니다.", "author": "HANSONcamp", "date": 1667306839315, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220703_155041_022ae25274.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220703_155041_022ae25274.jpg"}]}, {"source": "camfit", "text": "사이트가 좁고 다닥다닥 붙어있는 느낌이었지만 잘 쉬고 왔어요. 공간 때문인지 차를 길가와 평행하게 해야 했어요~ 쓰레기봉투 오는길에 마트서 샀는데 하나 더 천원주고 들어간거 뒤늦게 아까워요. 서울에서 가까운 게 가장 큰 장점인듯!", "author": "유저 비공개", "date": 1667255439015, "zone": "파쇄석", "site": "08-계곡앞", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "이벤트 캠장은 아니였지만 다들 멋지게 꾸미고 아이들이 행복해해서 좋았어요. 가을맞이인지 샤워실 화장실도 깨끗해졌더라구요~ 매너타임도 저번에비해 사장님이 일일이 확인해주셔서 잘 지켜졌어요", "author": "캠퍼82321", "date": 1667207616336, "zone": "파쇄석", "site": "06-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/98735_CA_8_81_D9_4_EB_5_9_B0_E_9_D52_CE_53379_E_0f5c17b20d.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_98735_CA_8_81_D9_4_EB_5_9_B0_E_9_D52_CE_53379_E_0f5c17b20d.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/5_BAE_5134_0_E8_E_49_F4_9_A22_C30_B2209_CE_85_a2160c5fd9.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_5_BAE_5134_0_E8_E_49_F4_9_A22_C30_B2209_CE_85_a2160c5fd9.jpeg"}]}, {"source": "camfit", "text": "캠핑장은 대체적으로 너무 좋았어요 조금만 걸어가면\r\n마장호수 산책도 하고 커피도 한잔 즐길수 있습니다\r\n다만 수영장 데크 사이트는 아이들 있는집은 피하는게\r\n좋을거 같아요 수영장 깊이가 꾀 깊은데 어린이들은\r\n뛰어 놀다 실수로 떨어질수 있을거 같아요\r\n겨울이라 물은 다 빠져 있어 떨어지면 크게 다칠거 같아요\r\n안전 그물망 같은거로 겨울에는 덮었으면 좋겠습니다\r\n다른건 만족 했어요", "author": "유저 비공개", "date": 1667176400179, "zone": "수영장데크", "site": "E번", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/D6_A1_DCB_0_9401_46_C7_9_FFA_7_F42806_F38_F8_3fa022dce3.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_D6_A1_DCB_0_9401_46_C7_9_FFA_7_F42806_F38_F8_3fa022dce3.jpeg"}]}, {"source": "camfit", "text": "후기가 몇없어서 걱정했는데 너무좋았어요~\r\n화장실 바로 앞자리였지만 냄새없었고 개수대,화장실 모두 깨끗했어요\r\n바로 옆에 방방이,실내놀이터 있어서 원없이~~놀았어요\r\n계곡도 있는데 추워서 못갔지만 다음여름에 다시 갈거에요^^\r\n좋은 이웃만나 아이들도 친구사귀고 잘쉬다왔어요\r\n내년에 만나요~^^", "author": "황금거위", "date": 1667119563818, "zone": "수영장데크", "site": "사이트", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221030_173237_2fe2f2ba3a.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221030_173237_2fe2f2ba3a.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221030_173321_47651a8e98.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221030_173321_47651a8e98.jpg"}]}, {"source": "camfit", "text": "카드로 예약이 안된다는 점은 매우 불편해요\r\n펜션쪽 손님들은 매너타임이고 뭐고 없어요", "author": "캠퍼268146", "date": 1666863778439, "zone": "수영장데크", "site": "G번", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/327742_C2_0_ED_8_453_A_BB_11_AD_444_B1_DE_3_F5_984d9ec802.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_327742_C2_0_ED_8_453_A_BB_11_AD_444_B1_DE_3_F5_984d9ec802.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/D25_FF_422_57_FF_4_C78_AC_04_3_A562_F08_D11_D_7daf72668e.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_D25_FF_422_57_FF_4_C78_AC_04_3_A562_F08_D11_D_7daf72668e.jpeg"}]}, {"source": "camfit", "text": "집이랑 가깝고 근처에 마장호수도 있어서 좋았습니다.", "author": "캠퍼265238", "date": 1666851780863, "zone": "데크", "site": "07", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/3507_C2_F8_71_E5_489_E_A01_E_13_BE_0_DA_35_C0_A_4eb3c20544.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_3507_C2_F8_71_E5_489_E_A01_E_13_BE_0_DA_35_C0_A_4eb3c20544.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/F68_EDF_43_CB_21_481_F_AFC_0_F1_B1_EFF_23794_d43ad57a25.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_F68_EDF_43_CB_21_481_F_AFC_0_F1_B1_EFF_23794_d43ad57a25.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/A2788717_CF_48_4288_BDA_0_67_A2470_BC_9_E2_1450e2e8d7.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_A2788717_CF_48_4288_BDA_0_67_A2470_BC_9_E2_1450e2e8d7.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/373_FBFB_5_C658_4_C0_D_9113_BF_1_F47_A7_A930_4f77bb0ad0.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_373_FBFB_5_C658_4_C0_D_9113_BF_1_F47_A7_A930_4f77bb0ad0.jpeg"}]}, {"source": "camfit", "text": "엄청 잘놀고 사이트도 넓고 좋았습니다.\r\n애들이 엄청 좋아했습니다.", "author": "캠퍼233852", "date": 1666587317525, "zone": "파쇄석", "site": "04-계곡앞", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/1666422459338_d2bfc5bf28.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1666422459338_d2bfc5bf28.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221022_100308_cfa541f04c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221022_100308_cfa541f04c.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221021_182907_35a75c100f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221021_182907_35a75c100f.jpg"}]}, {"source": "camfit", "text": "처음 방문한곳인데 사장님들 너무 좋으시고,분위기도 좋고 아이들이 뛰어놀고 그네도타고 놀이방시설도 되있어서 가족단위로 오면 정말 쵝오👍\r\n전에 리뷰 봤을때 화장실앞이라 더럽고 방방장 앞이라 시끄럽다는 글을 봤었는데 저 그자리 사용했는데 전혀 그런것 없이 자리도 넓고 너무 편하게 쉬고 잘 놀다 왔어요~다음에 또 가려구요~~🤗", "author": "유블리남매", "date": 1666502216856, "zone": "수영장데크", "site": "사이트", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221023_081620_141e592ec7.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221023_081620_141e592ec7.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_20221023_110356_483_22b510be5c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_20221023_110356_483_22b510be5c.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_20221023_110356_438_5f02b94216.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_20221023_110356_438_5f02b94216.jpg"}]}, {"source": "camfit", "text": "아이들이랑 가기에  정말 좋아요^^ 그만큼 인기도많은것같아요~", "author": "캠퍼257878", "date": 1666499599604, "zone": "데크", "site": "06", "season": "fall", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "화장실이 바로 너무 앞이라 당황스러웠습니다.", "author": "유저 비공개", "date": 1665966187821, "zone": "수영장데크", "site": "사이트", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/IMG_20221017_085622_329_4dd046ded1.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_IMG_20221017_085622_329_4dd046ded1.jpg"}]}, {"source": "camfit", "text": "단풍이 너무 예쁜 캠핑장이네요ㅎ\r\n관리하시는 분들도 친절하시고 즐거운 캠핑이었습니다!", "author": "캠퍼77847", "date": 1665897594595, "zone": "파쇄석", "site": "07-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221015_085856_2f9b5d04df.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221015_085856_2f9b5d04df.jpg"}]}, {"source": "camfit", "text": "집에서 한시간정도 거리에 있는 캠핑장이라 가까워서 좋았고, 단풍보면서 아침먹는거 너무 좋았고 아이들도 놀거리 있어서 더 좋았음. 매너타임 굉장히 잘 지켜져서 정말 11시 되니까 전부 소등 하는게 놀랐어요 ㅋㅋㅋ \r\n아쉬운점은 샤워실 이용시간이 정해져 있어서 시간 지나면 씻을수 없다는거.. ㅋ 데크 상태도 썩 좋지 않아서 옆데크 동생네는 오징어팩이 잘 안들어갔고, \r\n데크1.13.14번은 따로 주차를 해야해서 그부분이 좀 아쉬운감이 있었어요\r\n아 샤워실 입구에 커튼도 따로 없고 옷 갈아입을 만한 공간이 제대로 되어있지 않아서 아쉬움. \r\n쓰봉500원에 구매 해야됨!", "author": "유저 비공개", "date": 1665891457915, "zone": "데크", "site": "13", "season": "fall", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/7_DDEAF_73_8974_4_D63_9_D63_4_ACE_4_E6_D7_A24_65a5057938.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_7_DDEAF_73_8974_4_D63_9_D63_4_ACE_4_E6_D7_A24_65a5057938.jpeg"}]}, {"source": "camfit", "text": "시냇가 에서  물소리가 정겨운 장소", "author": "유저 비공개", "date": 1665422603317, "zone": "방갈로4", "site": "01", "season": "fall", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221010_113648_744c2c9c25.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221010_113648_744c2c9c25.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221010_113645_55f7e563f4.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221010_113645_55f7e563f4.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221010_113642_64e2983068.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221010_113642_64e2983068.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221010_113632_62feceb4b1.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221010_113632_62feceb4b1.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221010_113618_967612f872.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221010_113618_967612f872.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221009_143814_a27a055958.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221009_143814_a27a055958.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20221009_143818_24a9ed7273.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20221009_143818_24a9ed7273.jpg"}]}, {"source": "camfit", "text": "첫 캠핑이 중요하다고 생각했고 우중캠핑이라.. 힘들거라생각했어요.. 하지만 뭔가 우중캠핑 경험을 먼저 시작해보니 앞으로도 잘 할 수 있을거라 생각했고 이 모든게 관리도 잘 되어있고 인심좋으신 사장님들 덕분이라 생각해요. 아이들을 방치하진 않았지만 방치한것같은.. 그런느낌이랄까나요..?\r\n놀이방시설도 좋고 작게 동물들도있고 깔끔하고 \r\n파쇄석 돌 고를릴도없고 너무 좋았습니다", "author": "유저 비공개", "date": 1665392032582, "zone": "파쇄석", "site": "02-계곡앞", "season": "fall", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/DFC_97_F11_2_A83_42_D5_AFF_0_84_AAACD_26393_d06dcdfaac.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_DFC_97_F11_2_A83_42_D5_AFF_0_84_AAACD_26393_d06dcdfaac.jpeg"}]}, {"source": "camfit", "text": "수영장 넓고 슬라이드도 아이들이 잘탔어요.\r\n옆에 계곡이 있어서 물고기도 잡았구요.\r\n사이트 넓은편이었구 벌레없어서 좋았습니다.\r\n그런데 늦은 시간까지 술먹고 떠드는 사람들이 있어서 새벽에 한바탕 싸움이 났어요. \r\n10시쯤 매너타임시작때 캠장님이 나와서미리 둘러봐주면 더나은 캠핑장이 될듯합니다.", "author": "캠퍼206486", "date": 1661829941807, "zone": "파쇄석", "site": "20", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "가격이 좀 있지만 아이가 즐길수있는 요소들이 많아 만족했습니다.", "author": "유저 비공개", "date": 1661742980893, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/BB_8_D5_A4_C_1408_4_D7_B_ABCE_1476_DF_4_B4_F3_C_eb9ee49652.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_BB_8_D5_A4_C_1408_4_D7_B_ABCE_1476_DF_4_B4_F3_C_eb9ee49652.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/DA_5_E5467_A8_AF_4_C13_A6_F3_F7952_F2_D0900_9fb940fed4.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_DA_5_E5467_A8_AF_4_C13_A6_F3_F7952_F2_D0900_9fb940fed4.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/C46_AFA_32_6222_429_B_9_A3_F_E33_B2_ABA_642_D_a44f6e7421.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_C46_AFA_32_6222_429_B_9_A3_F_E33_B2_ABA_642_D_a44f6e7421.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/EB_41_C76_C_94_FF_4_B78_9_B19_F17_FE_5_DC_18_C9_b131d04831.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_EB_41_C76_C_94_FF_4_B78_9_B19_F17_FE_5_DC_18_C9_b131d04831.jpeg"}]}, {"source": "camfit", "text": "수영장이 오후에 그늘지고 미끄럼틀도 좋고 안전요원도 있고 좋아요\r\n데크 9~13번 자리는 오전~정오까진 그늘지고 오후엔 햇빛이 들어와요\r\n1시간당 7천원내고 시간 연장이 가능해서 정리할때 연장해놓고하니 맘편히 정리할수있었어요\r\n매너타임은 잘지켜지진 않는거같아요\r\n데크상태는 썩 좋진 않아요\r\n화장실은 좀 부족한거같은데 생각보다 붐비진 않았어요", "author": "그루브즈", "date": 1661739491884, "zone": "데크", "site": "10", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220827_165055_4e51551a09.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220827_165055_4e51551a09.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220827_164451_8e468cd7ca.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220827_164451_8e468cd7ca.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220828_131456_8fff31ffef.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220828_131456_8fff31ffef.jpg"}]}, {"source": "camfit", "text": "늘상 잇는일이지만 매너타임은 지켜지지않는 것땜에\r\n힘들엇네요 분위기는 좋앗는데 ㅠㅠ\r\n금요일저녁은 한산해 좋앗는데 토요일엔 사람이많아지니 \r\n새벽까지 고성에 결국 사단이 나서 힘들엇네요\r\n화장실 샤워실 계수대 깨끗\r\n성수기엔 좀 피하고싶네요", "author": "캠퍼205621", "date": 1661674165071, "zone": "파쇄석", "site": "24", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220826_195921_0c060e3993.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220826_195921_0c060e3993.jpg"}]}, {"source": "camfit", "text": "잘다녀왔어요~~\r\n다른 캠핑장들은 쓰레기봉투 그냥주던데 여긴 1000원 돈받고 1장주시네요\r\n계곡물 시원합니다 수영장물은 쏘쏘에요\r\n바닥에 이물질이 많았습니다", "author": "유저 비공개", "date": 1660566251569, "zone": "계곡수영장 피크닉", "site": "04", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "아이들이 놀수있는 시설이 있어서 선택했는데 \r\n수영장피크닉 손님들로 입구는 북적북적하고 수영장근처가 주차장이라 아이들이 많이 돌아다는곳인데 위험해보였습니다.\r\n화장실과 샤워실은 깨끗한 편이었지만 샤워실이 세개인데 물 수압이 너무 약해서 같이 사용하면 거의 물이 안나오고 찬물이 나와서 씻기 불편했습니다.\r\n사장님 친절하다는 평이 있었지만 사장님을 뵌적이 없고, 매너타임은 관리가 안되는것 같습니다.\r\n매너타임 밤10시~아침7시까지인데 \r\n늦게까지 소곤소곤 얘기하는건 이해하지만\r\n밤11시30분 지나서 다 소등할시간에 퇴실한다고\r\n짐싸느라 차 시동걸고 라이트켜고\r\n아침6시부터 짐정리하니 시끄럽워 다소 아쉬웠습니다.", "author": "캠퍼36346", "date": 1660538440992, "zone": "파쇄석", "site": "24", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "즐겁게 잘 놀다왔어요~ \r\n아이들 데리고 놀러오기 진짜 좋네요^^", "author": "태정태세비욘세", "date": 1660276306881, "zone": "데크(계곡 앞) ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/4_DDEE_709_D3_A7_467_E_A482_315_D8_B63_C085_f6bef09392.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_4_DDEE_709_D3_A7_467_E_A482_315_D8_B63_C085_f6bef09392.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/9_B1_D0_BF_7_3338_4_E52_A8_C8_72_EC_593_FFAAE_d4f1feb1a0.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_9_B1_D0_BF_7_3338_4_E52_A8_C8_72_EC_593_FFAAE_d4f1feb1a0.jpeg"}]}, {"source": "camfit", "text": "즐겁게 잘 이용했습니다", "author": "캠퍼185987", "date": 1659967438929, "zone": "계곡수영장 피크닉", "site": "07", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "잘다녀왔어요\r\n수영장도 좋고 계곡도 있어서 좋았습니다\r\n남편이 집이랑 조금 더 가까웠다면 더 자주 오고 싶다고 했어요 그런데 11시 이후 개수대와 샤워실 문이 잠기는건 \r\n너무 충격적이였어요,, 여름인데 땀도 많이나고-\r\n늦게 도착해서 피칭하고 나거나 수영장 물놀이 이후 애들 밥먹이고 불멍 한번하고 나면 ㅜㅜ 물론 매너타임이 있는건 알지만 코로나로 사람없는 시간대를 이용해서 씻고싶기도 하고 씻었어도 한번 더 씻고싶을때도 있는데 그건 좀 많이 불편했어요- 샤워실과 캠핑존 거리가 충분히 멀어서 소리같은건 안들릴거같은데요ㅠㅠ 그리고 담배피는 구역도 너무 화장실 앞이라 좀., 조금 뒷쪽이나 사람들이 많이 다니지 않는곳으로 이동해주심 좋을거같애요 그 근처엔 개수대도 있고 화장실도 있어서 자주 왔다갔다하고 아이들도 많은데 좀 그랬습니다\r\n그래도 시설 자체는관리가 잘되고 사이트가 널찍하고 아이들 놀거리도 많아서 집이랑 가까우면 장박 문의를 드려보고 싶었고 다른 캠퍼분들꺼도 추천하고싶은 곳이였습니다~^^", "author": "유저 비공개", "date": 1659875798292, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "친절하시고 잘쉬다갑니다\r\n에어컨은  시원한데 위생이 좀 아쉬웠고요 화장실 개수대관리는 괜찮았어요\r\n수영장은 살짝 냄세나서 전 중간에 나왔는데 아이들은 미끄럼틀이랑 잼있게 잘놀았고\r\n갠적으로 계곡이 물이 깨끗하고 시원해서 너무 좋았어요\r\n가격대비 착한곳이고 여름에 오기 좋은곳같아요", "author": "캠퍼182352", "date": 1659843999707, "zone": "방갈로(취사공간o)", "site": "2번", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220805_123048_03af480e98.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220805_123048_03af480e98.jpg"}]}, {"source": "camfit", "text": "휴가 피크여서 사람들이 좀 많아서 그렇지 친절하고 너무 좋았어요", "author": "캠퍼185987", "date": 1659792384619, "zone": "계곡수영장 피크닉", "site": "08", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "평일 여유롭게 즐기고 왔습니다.\r\n이곳을 이제 알았다니 참 아쉬울뿐이네요ㅎ", "author": "듀도릭스", "date": 1659697322590, "zone": "계곡수영장 피크닉", "site": "10", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220805_141411_85523f2244.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220805_141411_85523f2244.jpg"}]}, {"source": "camfit", "text": "아이들이 재미있게 잘 놀고 왔습니다.\r\n다음에 또 간다고 하네요.\r\n테크 뒷쪽이 계곡이라 \r\n시원한 바람이 불어와서 좋았어요.", "author": "캠퍼185911", "date": 1659354842520, "zone": "계곡수영장 피크닉", "site": "20", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "나무가 커서 그늘이 넓은게 제일 좋았어요. 의자에 누워서 올려다보면 나뭇잎이 보이는게 넘 기분좋아요. 벌레도 생각보다 거의 없고 개미만 좀 있었네요. 수영장도 아이가 좋아했어요. \r\n다만 캠핑장이 세로로 긴 모양이어서 화장실이나 개수대가 너무 먼 느낌이에요. 샤워실도 너무 적구요. 그래도 나무랑 물소리가 좋아서 다시 갈 의향이 있습니다.", "author": "유저 비공개", "date": 1659310831684, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "수영장에서 재미나게 놀다갑니다\r\n화장실 변기2 소변기1 /샤워장2 \r\n좁음ㅡㅜ \r\n참고하세요~~^^", "author": "유저 비공개", "date": 1659239456197, "zone": "파쇄석", "site": "19", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "아이들 노는곳이라 시설이 깨끗하고 물이 깨끗한곳을 중심으로 알아봤어요~ 여러사람이 이용하는 공용시설이지만 그에비해 화장실 등등 모든시설이 굉장히 깨끗한편이었고 특히 수질관리가 너무 잘되있었던것같아요. 뒷편 계곡물도 어린아이 놀기 딱좋고 가격대비 가성비 너무좋아요^^~ 다만 샤워장이 한칸 뿐이라서 샤워는 못하고 차안에서 옷 갈아입고 집으로왔네요~~~ㅜㅜ 캠핑장이니만큼 샤워장을 늘려주셨음좋겠어요~", "author": "캠퍼181182", "date": 1658662970321, "zone": "계곡수영장 피크닉", "site": "21", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "수영장 개장이 되었더라면 좋은자리였으나 물이 없는 수영장라인 좀 그랬어요ㅠㅠ", "author": "유저 비공개", "date": 1658228111411, "zone": "수영장데크", "site": "G번", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/53646152_0_C4_E_4840_892_E_D1306_CE_327_EF_eb35249020.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_53646152_0_C4_E_4840_892_E_D1306_CE_327_EF_eb35249020.jpeg"}]}, {"source": "camfit", "text": "솔까말- 1박 다녀왔습니다 계곡 3번 데크자리입니다.\r\n\r\n친    절: ★★★★\r\n시    설: ★\r\n청    결: ★\r\n싸이트: ★★\r\n#5점 기준 입니다#\r\n\r\n장점-사장님 친절하십니다.\r\n          넓은 수영장이랑 계곡이 있습니다.\r\n          데크 싸이즈 넓어서 좋습니다.\r\n          깊은 산중이라 조용합니다.\r\n\r\n단점-시설이 깨끗하지는 않습니다. (샤워실 포함)\r\n         -계곡 데크 자리 계곡으로 내려가는 계단이 없습니다\r\n           (지도에 표시를 꼭 해주셔야 한다고 생각합니다.)\r\n          - 데크 상태가 정말 안 좋습니다. 오래되다 보니 그럴수 있지만\r\n             데크팩은 안 들어 가는데가 더 많고 나사 팩을 사용하셔야 합니다\r\n          -계곡 옆이라 벌레가 많습니다. (데크자리에 개미는 정말 미쳤습니다)\r\n          -바로위에 백숙집이 있는데 사람들이 바글바글 합니다.\r\n            결국 저희는 식당에서 흐르는 계곡물을 받게 되는거구요\r\n            그냥조금 찝찝하긴 합니다...\r\n          -계곡이 더럽습니다 쓰레기들도 많고 약간의 악취도 납니다;;\r\n             비가 많이와서 물이 많은 편이데 이정도면 좀 멀더라도\r\n             다른 계곡 캠핑장을 추천 드립니다. (수영장은 잘 되어있어요)", "author": "에취캠", "date": 1658202734381, "zone": "데크(계곡 앞) ", "site": "사이트", "season": "summer", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/Kakao_Talk_20220719_125344161_4641af66eb.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_Kakao_Talk_20220719_125344161_4641af66eb.jpg"}]}, {"source": "camfit", "text": "첫 캠핑이었어요! #성공적 6살 남아 3인 가족인데 수영장, 계곡, 아이들 놀거리 키즈카페 트램폴린 그네 등 시설 좋았고 산속에 있는데도 화장실 많이 더럽지 않아서 좋았구요! 후기에 개미 얘기가 많아서 걱정했는데 많긴 한데 그렇게 신경쓰일 정도는 아니던데요? (참고로 벌레 무서워,싫어하고 까탈스러운편임!) 첫 캠핑이었는데 성공적이어서 너무 만족스러워요!!", "author": "캠퍼179381", "date": 1658110119849, "zone": "데크", "site": "05", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220716_193100_69f351377e.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220716_193100_69f351377e.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220716_164839_94f1f4998f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220716_164839_94f1f4998f.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220716_135911_41d0f88f9f.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220716_135911_41d0f88f9f.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220716_135724_ea295818b0.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220716_135724_ea295818b0.jpg"}]}, {"source": "camfit", "text": "수영장 좋구요\r\n캠핑장도 깔끔했습니다.\r\n매너타임도 잘지키시는 편이구요\r\n화장실,샤워장시설만 보강 하시면 아주 좋을듯 합니다!", "author": "캠퍼K", "date": 1658041611515, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "아이들 놀기 좋고 수영장 및 시설 만족 합니다\r\n그런데 개미가 많아도 너무 많습니다. \r\n더위가 아닌 개미와의 전쟁이네요ㅜ\r\n장비 정리 할 때 개미 혹시 따라오지 않나 엄청 신경쓰면서 정리했습니다.ㅜ\r\n개미 빼고는 좋은 캠핑장 입니다.^^", "author": "캠퍼137785", "date": 1656885164776, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "캠핑장은 괜찮았습니다.\n계곡도 시원하고 수영장이나 화장실 관리도 잘되고\n계시는 분들도 친절하구요~~\n그런데 여름이기도 한데 11시에 샤워실과 개수대 문잠그시는거 보고 놀랐네요.\n매너타임이 이유라고는 하지만 사이트와 떨어져있기도하고\n사이트 비용에는 그 외 부대시설도 있다고 생각합니다.\n여름 인데  그정도 배려는 해주시는게 어떨지요~\n그리고 오픈 시간도 8시던데..늦은감도 있네요~~;", "author": "캠퍼166516", "date": 1656833626926, "zone": "파쇄석 28번", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "사람이 많긴 하지만 하루 놀고 오기 참 좋네요", "author": "캠퍼171197", "date": 1656759726363, "zone": "계곡수영장 2팀전용", "site": "39", "season": "summer", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/3_B1_F0473_0_A36_4718_BA_8_D_C6_E32_C25_C5_C0_4367affb40.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_3_B1_F0473_0_A36_4718_BA_8_D_C6_E32_C25_C5_C0_4367affb40.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/AD_094_D42_D758_42_FA_B88_B_9_CD_68_BD_846_D8_54e7ccc414.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_AD_094_D42_D758_42_FA_B88_B_9_CD_68_BD_846_D8_54e7ccc414.jpeg"}]}, {"source": "camfit", "text": "처형3인 아아앙아아아아", "author": "캠퍼25587", "date": 1656284049616, "zone": "파쇄석", "site": "18", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "너무 어린 아이는 힘들 거 같고 7세 이상 어린이부터는 이보다 더 좋을 순 없을 것 같은 놀이천국이라 볼 수 있을 것 같은 캠핑장입니다. \r\n하루종일 물놀이하고 방방이하고 그네타고 올챙이잡고 계곡까지 완벽하게 하루종일 놀거리가 있습니다 ㅋㅋ 샤워실이 조금 약했던 것 외에는 더할 나위 없이 좋았습니다~ 다음 예약하고 왔는데 두번째 방문이 매우 기대됩니다~!!", "author": "오닥", "date": 1656241633942, "zone": "데크", "site": "07", "season": "summer", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/4_BFDE_4_B6_785_E_4_B5_E_B1_C3_6302680_CE_744_e5c467cc41.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_4_BFDE_4_B6_785_E_4_B5_E_B1_C3_6302680_CE_744_e5c467cc41.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/DE_3856_FB_BB_94_4_C30_82_AE_78_C6_EFE_138_B4_0806eb424a.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_DE_3856_FB_BB_94_4_C30_82_AE_78_C6_EFE_138_B4_0806eb424a.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/2_A9846_AE_27_F5_4542_BF_9_A_CD_2_FC_5_AD_7386_5d244a1a6a.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_2_A9846_AE_27_F5_4542_BF_9_A_CD_2_FC_5_AD_7386_5d244a1a6a.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/AADDDF_0_C_DE_4_D_4_C17_B5_AF_5_C8_EA_8_D88550_4284389515.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_AADDDF_0_C_DE_4_D_4_C17_B5_AF_5_C8_EA_8_D88550_4284389515.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/65_DA_350_B_83_BB_4_E3_A_8_EF_4_0_CF_19557_DFF_1_9a50af8044.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_65_DA_350_B_83_BB_4_E3_A_8_EF_4_0_CF_19557_DFF_1_9a50af8044.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/5_C580_A41_EF_66_4258_B68_A_16_C9875_CE_338_5a927c4b4d.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_5_C580_A41_EF_66_4258_B68_A_16_C9875_CE_338_5a927c4b4d.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/E239_E4_B3_21_D0_463_A_B852_A50_EF_7_DB_100_E_be367de2b4.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_E239_E4_B3_21_D0_463_A_B852_A50_EF_7_DB_100_E_be367de2b4.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/7_B916009_20_A9_426_D_957_B_F3_A519_AF_0_EA_3_b5a54132d2.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_7_B916009_20_A9_426_D_957_B_F3_A519_AF_0_EA_3_b5a54132d2.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/677_F40_DB_056_D_4339_9_B68_3_E979711002_D_33947ab838.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_677_F40_DB_056_D_4339_9_B68_3_E979711002_D_33947ab838.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/1_B93_CCDB_248_B_47_E2_AA_95_751_E8_AD_4_E639_0fd6cfdb54.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_1_B93_CCDB_248_B_47_E2_AA_95_751_E8_AD_4_E639_0fd6cfdb54.jpeg"}]}, {"source": "camfit", "text": "여태갔던 캠핑장이 너무. 다 좋은걸까요.. .\r\n장작이 무슨  12000원에 (담날 근처 가게 갔는데8000원이었음..)수영장 시간이나 방방규모도 아쉬웠어요. 파쇄석 자리는 넓지만 차로 ㅈ다 막아버리니 계곡 앞쪽이 아닌이상은 뭔가 뷰도없이 갇혀있는 느낌이라 좀 답답했어요. 애들이 저녁되도 할것도 없고 저희도 답답 심심해서 첨으로 2박3일 못채우고 전날 돌아와버림..", "author": "유저 비공개", "date": 1656213015337, "zone": "파쇄석", "site": "20", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "방갈로너무지저분해요ㅜ.벌레가너무많아요\r\n수영장은 좋은데 좀아쉽네요", "author": "캠퍼27974", "date": 1655954634302, "zone": "방갈로(취사공간o)", "site": "2번", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "화장실도 깨끗하고 좋은데 트램폴린이요..\r\n아이들이 7명이상 못들어가게하실꺼면 누군가 지키고있던지 7명이상들어갔다고 못들어가게하시면 기다리는 아이들은 하염없이 기다립니다..", "author": "캠퍼110370", "date": 1655941612459, "zone": "데크", "site": "07", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "지극히 내 자신이 기억하려고 쓰는 로그.\r\n1.벌레가 심하게 많았음. 개미지옥ㅠㅠ\r\n2.화장실은 깨끗한편.\r\n3.샤워장은 여3칸,남2칸이라 갯수가 부족.\r\n  옷입는곳이 구분이 없어서 옷입기 불편.\r\n4.사이트 자리 넓어서 여유롭게 텐트설치.\r\n5.직원분들 친절.\r\n6.수영장 넓고, 미끄럼틀 좋음.\r\n 수영장 관리자분 친절.\r\n7.방방장, 실내놀이터, 그네 있음.\r\n8.매너타임 관리부족.", "author": "유저 비공개", "date": 1655635756434, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "싸이트가 너무 붙어있어서 주말에는 별로인 캠핑장이네요\n옆 싸이트 코고는소리때문에 2일 밤잠 설치는 완전 그지같은\n경험을 해주게 했네요\n\n수영장은 때문에 그럭저럭 위안 받긴 했지만 전체 적으로\n주말에는 추천 하고 싶지안네요", "author": "유저 비공개", "date": 1655619815058, "zone": "데크", "site": "08", "season": "summer", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "어린이날 맞추어와서 정말 즐겁게 놀다 갔어요~ 저희는 벌레 별로 신경 안쓰는데 벌레 싫으신분들은 계곡쪽에 날파리가 많아요. 매너타임은 잘 안지켜져요. 엄청 시끄럽지는 않지만 예민하신분들은 불편할듯해요. 근처 마장호수도 산책하기 정말좋고 나무가 많아 그늘이 좋아 더운 날씨에 참 좋아요.", "author": "캠퍼82321", "date": 1651894366136, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": false, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/189_D293_D_C547_4306_9_C47_1_B4736509_B30_cf1993aab2.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_189_D293_D_C547_4306_9_C47_1_B4736509_B30_cf1993aab2.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/5_E725_B17_9_BBD_4_AE_8_B82_B_0_A95_A5_ABFB_66_bf71acfd9f.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_5_E725_B17_9_BBD_4_AE_8_B82_B_0_A95_A5_ABFB_66_bf71acfd9f.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/F3_E86_B71_9122_4024_9_D67_DFD_7_B7669432_037ef92ba6.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_F3_E86_B71_9122_4024_9_D67_DFD_7_B7669432_037ef92ba6.jpeg"}]}, {"source": "camfit", "text": "서울에서 1시간이면 갈 수 있고, 놀이방, 방방, 토끼 먹이주기 등 아이들이 정말 좋아해요.\r\n\r\n데크존 쪽 화장실이 작지만 수시로 청소해주셔서 깨끗했어요. \r\n\r\n싸이트 간격이 정말 좁아요. 처음 쓰레기봉투도 돈 주고 사야해요.", "author": "유저 비공개", "date": 1651537121188, "zone": "데크", "site": "13", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": []}, {"source": "camfit", "text": "두 번째 방문 한 양주송천캠핑장~\r\n\r\n역시 사장님 친절하시고 캠장 내 교통 정리를 잘 해주십니다~^^\r\n\r\n이번에는 계곡에 물이 낮아 딸아이가 조금 아쉬워 했네요..", "author": "유저 비공개", "date": 1651379067352, "zone": "데크(계곡 앞) ", "site": "사이트", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/D667_D568_1062_42_BD_A941_D18_F0_D26_C38_B_a3fd927261.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_D667_D568_1062_42_BD_A941_D18_F0_D26_C38_B_a3fd927261.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/5_FF_78122_0_DD_0_45_C2_9244_A1_E6_CE_835_A31_5bd9886e56.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_5_FF_78122_0_DD_0_45_C2_9244_A1_E6_CE_835_A31_5bd9886e56.jpeg"}]}, {"source": "camfit", "text": "처음가보는곳이라 정보도 많이 없어서 걱정했는데, 깔끔하게 관리해주시는것 같아서 좋았어요.\r\n싸이트내 차량도 넣을수있어서 편하고 좋았어요.\r\n사장님 친절하시네요. ^^\r\n소등 11시인데 금요일밤엔 새벽까지 시끄러웠어요.", "author": "이은이들캠핑", "date": 1651375369039, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220429_164132_53be0627f6.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220429_164132_53be0627f6.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220429_172755_7e0954e419.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220429_172755_7e0954e419.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220429_172739_3ec3edf761.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220429_172739_3ec3edf761.jpg"}]}, {"source": "camfit", "text": "너무나 즐거운캠핑, 또 놀러갈께요^0^", "author": "캠퍼75835", "date": 1650806269607, "zone": "파쇄석", "site": "19", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": true, "images": []}, {"source": "camfit", "text": "사장님 친절하고  화장실 깨끗하고\r\n아이들 놀기에도 좋고 \r\n너무 좋은 2박이였어요 ㅎ", "author": "캠퍼105304", "date": 1650798339740, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "수영장개장하면\r\n다시오고싶네요.^^\r\n\r\n(화장실에찬물만나오는부분은아쉬웠어요.)", "author": "유저 비공개", "date": 1650776143496, "zone": "데크", "site": "09", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "너무 넓어서 티맥스ex 가로로 치고\n앞쪽은 차두고 가운데서 너무\n넓게 잘놀았어요!! 방방이에\n놀이방까지 애들이 너무 좋아합니당!\n다만.. 대변기2개에 소변기1개는\n줄을 서게 만드네요ㅜ\n다른건 다 만족입니다!!\n또올께용~~~", "author": "캠퍼111526", "date": 1650773571919, "zone": "파쇄석", "site": "27", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220423_205947_8046c4d8b5.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220423_205947_8046c4d8b5.jpg"}]}, {"source": "camfit", "text": "파쇄석은 넓어서 좋았습니다. 편히쉬다 왔어요~", "author": "유저 비공개", "date": 1650445248679, "zone": "파쇄석", "site": "17", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "캠핑장 가서 쓰봉 돈받는곳은 첨이에요~ \r\n마트 가격도 조금 비싼편이긴 한데.. 어느 캠핑장이나 그러겠지만 유독 여긴 비싸게 느껴지네요~ \r\n아이들과 가족단위로 많이 오는데 놀이방 과 방방이 그네 있어 아이들이 너무 좋아했어요~~ \r\n조그맣게 방방이 하나 더 있었음 하요~ 많은 아이들에 비해 방방이 하나론 부족해용~ ㅎㅎㅎ화장실도 깨끗해요~ 샤워장은 화장실 과 같이 있어서 좀 그렇드라구요~ \r\n아~ 근데 음식넣을수 있는 냉장고가 따로 없어서 조금 불편… ㅠㅠ 아직은 날씨가 덥지않아 괜찮긴 했어요~", "author": "유저 비공개", "date": 1650209879614, "zone": "데크", "site": "10", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/8_AEDF_614_9286_44_DE_8331_493_A82_D4_A873_d80f43e8d0.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_8_AEDF_614_9286_44_DE_8331_493_A82_D4_A873_d80f43e8d0.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/BC_9_BDBDF_4_CF_9_4_B57_8_F2_B_C4_BA_2_DCC_821_F_f3c55b78fd.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_BC_9_BDBDF_4_CF_9_4_B57_8_F2_B_C4_BA_2_DCC_821_F_f3c55b78fd.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/E727_D90_A_C9_DE_408_F_AAB_5_8_FEA_519_B9_BCD_216b54b1d2.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_E727_D90_A_C9_DE_408_F_AAB_5_8_FEA_519_B9_BCD_216b54b1d2.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/8_DE_76692_D9_FD_43_A0_AEBB_75_E65170619_D_fcf2315ccb.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_8_DE_76692_D9_FD_43_A0_AEBB_75_E65170619_D_fcf2315ccb.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/4_A5_D78_C4_981_A_47_C8_B757_8_D29_D4_D8410_F_0ec53d4bf5.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_4_A5_D78_C4_981_A_47_C8_B757_8_D29_D4_D8410_F_0ec53d4bf5.jpeg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/13126_AE_4_F106_4_E92_A17_F_BAEF_38_BCDEB_4_120cfd8fc8.jpeg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_13126_AE_4_F106_4_E92_A17_F_BAEF_38_BCDEB_4_120cfd8fc8.jpeg"}]}, {"source": "camfit", "text": "사이트 넓고 한적하니 넘 좋았습니다.\r\n다만 사이트에 비해 화장실이 적다는생각과 새벽에 새소리 등 소음이 좀 있다는거 빼고는 넘 만족한 캠핑장이었습니다", "author": "케이운", "date": 1650201263120, "zone": "파쇄석", "site": "21", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "다좋았는데 매너타임 관리를 안하시더라구요ㅠㅠ그거빼고는 나름 만족합니다", "author": "유저 비공개", "date": 1650185736574, "zone": "파쇄석 28번", "site": "사이트", "season": "spring", "numOfDays": 2, "isClean": false, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "건너편쪽에 벚꽃이 있어서 더이쁘고\r\n넓고 진짜 좋았어요!!!!", "author": "캠퍼106913", "date": 1650171179781, "zone": "파쇄석", "site": "23", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "애들 놀기좋은 곳\r\n하지만 사이트끼리 너무 가까워서 불편\r\n데크시설이 노후됨", "author": "꾸", "date": 1649661623254, "zone": "데크", "site": "06", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220409_150928_db027c0805.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220409_150928_db027c0805.jpg"}]}, {"source": "camfit", "text": "띠동갑 두 아들 데리고 캠핑 왔네요~\r\n막둥이가 방방도 타고, 친구도 사귀어서\r\n엄청 신나게 돌다 왔습니다~  ^^\r\n담에 또 가고 싶다고 난리네요~~", "author": "캠퍼77964", "date": 1649593575355, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220402_190926_4afb60f365.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220402_190926_4afb60f365.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220402_185412_8f8c4a6eb8.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220402_185412_8f8c4a6eb8.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220402_171337_152afc20e5.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220402_171337_152afc20e5.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220402_163421_bca72f84db.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220402_163421_bca72f84db.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220403_115459_9fe5273691.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220403_115459_9fe5273691.jpg"}]}, {"source": "camfit", "text": "항상 데크만 이용하다 이번엔 자리가 없어서 방갈로를 이용했네요\r\n텐트 안치니깐 캠핑이 아닌거같지만 그래도 편하네요 ㅋㅋ\r\n난방도 잘되서 밤에 엄청 따듯하게 잤어요\r\n4~5번 온거같은데. 조만간에 데크로 또 예약하려구요", "author": "캠퍼107735", "date": 1649567476289, "zone": "방갈로(취사공간o)", "site": "2번", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220409_153745_8c06f99933.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220409_153745_8c06f99933.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220409_145959_28c364b719.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220409_145959_28c364b719.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220409_174233_5ddddb7828.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220409_174233_5ddddb7828.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220409_212008_23c73c8741.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220409_212008_23c73c8741.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220410_101827_cd069056c1.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220410_101827_cd069056c1.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220410_101930_873f564bbc.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220410_101930_873f564bbc.jpg"}]}, {"source": "camfit", "text": "조용하고 즐거운 캠핑장입니다", "author": "캠퍼83787", "date": 1649566602241, "zone": "데크(계곡 앞) ", "site": "사이트", "season": "winter", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "텐트도 못치고 고생 중이었는데 사장님이 도와주셔서 감사했습니다.\r\n초보인 저희 가족에게 아주 좋은 캠핑장이었습니다.", "author": "sandwatch12", "date": 1649396785125, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": true, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220319_230409_4426cbd391.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220319_230409_4426cbd391.jpg"}]}, {"source": "camfit", "text": "코로나로 놀이방을 운영을 안해서 아쉬웠어요 ㅠ\r\n그래도 방방이가 있어 애들이 신나했네요", "author": "캠퍼93662", "date": 1649300526112, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 1, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "데크는 다른사이트 간격이 좁아요~ 그거 외엔 잘 놀다왔습니다.", "author": "유저 비공개", "date": 1648979167896, "zone": "데크", "site": "13", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "다 좋은데 좌우로 길어서 걸어가는 시간이 좀 있고\r\n개수대 사용시간 완전 철저하십니다.\r\n개수대 샤워실은 노후되어 있지만 깨끗합니다.", "author": "캠퍼72096", "date": 1648978767416, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "winter", "numOfDays": 2, "isClean": false, "isKind": false, "isConvenient": false, "images": []}, {"source": "camfit", "text": "캠핑장  전체적으로는 조금 노후된 느낌이지만 \r\n깔끔하게 관리도 잘되고 온수도 잘나왔어요!\r\n사이트간 간격도 넓어서 편히 즐겼어요~~~", "author": "캠퍼99527", "date": 1648976645345, "zone": "파쇄석", "site": "16", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220403_101657_247bfb9aac.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220403_101657_247bfb9aac.jpg"}]}, {"source": "camfit", "text": "조용하구 좋았어요~\r\n다만 옆 아재 목소리가 커요 애들 얼마나 혼내던지;\r\n07시부터 시끄러워 잠깨구..", "author": "유저 비공개", "date": 1648381305768, "zone": "데크", "site": "05", "season": "spring", "numOfDays": 2, "isClean": true, "isKind": true, "isConvenient": true, "images": []}, {"source": "camfit", "text": "사장님 친절하시고 사이트마다 자리 넓고 쾌적했습니다!!!\n다만 옆자리 오신 분이....아침 7시부터 애를 큰 소리로 한참 혼내서 제가 혼나는 기분으로 눈을 떴네요....다 좋았는데...\n매너타임만 조금 더 잘 지켜졌다면 완벽했을 것 같아요!!", "author": "캠퍼88096", "date": 1648269274471, "zone": "계곡 당일캠프닉 ", "site": "사이트", "season": "spring", "numOfDays": 1, "isClean": true, "isKind": true, "isConvenient": false, "images": [{"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220325_201522_e5e6494201.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220325_201522_e5e6494201.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220325_195914_cc0352439b.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220325_195914_cc0352439b.jpg"}, {"url": "https://d3ifb4xbksj7jo.cloudfront.net/20220325_190111_417b090d6c.jpg", "thumb": "https://d3ifb4xbksj7jo.cloudfront.net/thumbnail_20220325_190111_417b090d6c.jpg"}]}, {"source": "camfit", "text": "장박이 많긴 했지만 지난 주에 많이 철수 하더라구요\r\n장박 분들도 조용하시고\r\n계수대 화장실 샤워장 다 깨끗하구요\r\n사이트 대박 넓어서 좋았어요\r\n리빙쉘6m 짜리 치고 3×3쉘터까지 하고 카니발 주차까지\r\n사이트 하나에서 다 해결하고 불멍 공간까지 넉넉하게 남았어요\r\n사이트 크기 보시라고 사진 한장 투척하고 갑니다", "author": "캠
